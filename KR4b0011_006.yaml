body:
  text: 鮑氏集卷第六行亰口至竹里登飜車峴冬日詠史從庾中郎㳺園山石室自礪山東望震澤登雲陽九里埭與伍侍郎别吳興黃浦亭庾中郎别送别王宣城送從弟道秀别贈傅都曹别和大傅農與僚故别送盛侍郎餞候亭與荀中書别喜雨奉勑作詠蕭史贈故人馬子喬六首採菱歌七首山行見孤桐行京口至竹里高柯危且竦鋒石横復仄複澗隱松聲重崖伏雲色氷閉寒方壯風動鳥傾翼斯志逢凋嚴孤逰值曛逼兼塗無憇鞍半菽不遑食君子樹令名細人効命力不見長河水清濁俱不息登飜車峴高山絶雲霓深谷㫁無光晝夜淪霧雨冬夏結寒霜淖坂旣馬嶺磧路又羊腸畏塗疑旅人忌轍覆行箱昇岑望原陸四眺極川梁逰子思故居離客遲新鄕新知有客慰追故逰子傷冬日嚴雲亂山起白日欲還次曛霧蔽窮天夕隂晦寒地煙霾有氛氲精光無明異風急野田空饑禽稍相棄含生共通閉懷賢敦爲利天規苟平圓寜得巳偏媚冩海有歸潮衰容不還稚君今且安歌無念老方至詠忠作史五都矝財雄三川養聲利百金不市死明經有高位亰城十二衢飛甍各鱗次仕子彯華纓㳺客竦輕轡明星晨未稀軒葢巳雲至賓御紛䬃沓鞍馬光照地寒暑在一時繁華及春媚君平獨寂寞身世兩相棄從庾中郎逰園山石室荒塗趣山楹崖隱靈一作虚室崗澗紛縈抱林障沓重密昬昏磴路深活活梁水疾幽隅秉晝燭地牖窺朝日怪石似龍章瑕璧麗錦質洞庭安可窮漏井終不溢沉空絶景聲崩危坐驚慄神化豈有方妙象竟無述至哉鍊玉人處此長自畢自礪山東望震澤瀾漫潭洞波合沓崿嶂雲漲島逺不測崗澗近難分幽篁愁暮見思鳥傷夕聞以此藉沉痾棲迹别人群結言非盡書有念豈敷文登雲陽九里埭一作塜宿心不復歸流年抱哀疾旣成雲雨人悲緒終不一徒憶江南聲空録齊后瑟方絶縈絃思豈見繞梁日與伍侍郎别民生如野鹿知愛不知命飲齕具攅聚翹陸歘驚迸傷我慕類心感爾食苹性漫漫鄢郢塗渺渺淮海逕子無金石質吾有犬馬病憂樂安可言離㑹孰能定欽哉慎所冝砥德乃爲盛貧㳺不可忘乆交念敦敬吳興黃浦亭庾中郎别風起洲渚寒雲上日無輝連山眇煙霧長波逈難依旅鴈方南過浮客未西歸巳經江海别復與親眷違奔景易有窮離䄂安可揮懽觴爲悲酌歌服成泣衣温念終不渝藻志逺存追役人多牽滯顧路慙奮飛昧心附逺翰烱言藏佩韋送别王宣城發郢流楚思渉淇興衞情旣逢青春獻復值白蘋生廣望周千里江郊藹微明簾爵自惆悵歌管爲誰清潁隂騰前藻淮陽流昔聲樹道慕高華屬路佇深馨送從弟道秀别參差生密念躑躅行思疑疑疑一作悲思戀光景密念盈一作彌歳時歳時多阻折光景乏安怡以此苦風情日夜驚懸旗登山臨朝日揚𬒮别所思浸淫旦潮廣瀾漫宿雲滋天隂懼先發路逺常早辭篇詩後相憶杯酒今無持逰子苦行役冀㑹非逺期贈傳都曹别輕鴻戲江潭孤鴈集洲沚邂逅兩相親縁念共無巳風雨好東西一隔頓萬里追憶栖宿時聲容滿心耳日落川渚寒愁雲繞天起短翮不能翔徘徊煙霧裏和傅大農與僚故别絶節無緩響傷鴈有哀音非同年歳意誰共别離心伊昔謬通塗冠屣預人林浮江望南嶽登潮窺海隂孰謂逰居淺慕美久相深萋萋春草秀嚶嚶喜候禽辰物盡明茂尊盛獨幽沉之子安所適我方栖舊岑墜歡豈更接明愛邈難㝷送盛侍郎餞候亭霑霜襲冠帶驅駕越城闉北臨出塞道南望入鄕津高墉宿寒霧平野起秋塵君爲坐堂子我乃負羇人欣悲豈等志甘苦誠異身結涕園中草憔悴悲此春與荀中書别勞舟厭長浪疲斾倦行風連翩感孤志契闊傷賤躬親交篤離愛眷戀置酒終敷文勉征念罷落慰愁容思君奇渉洧撫巳謡渡江慙無黄鶴翅安得久相從願遂宿知意不使舊山空喜雨奉勑作作營社逹群隂屯雲揜積陽河井起龍蒸日魄斂逰光族雲飛泉室震風沉羽鄕升雰浹地維傾潤㵼天潢平灑周海嶽曲潦溢川莊驚雷鳴桂渚廻㳙流玉堂珍木抽翠條炎卉濯朱芳關市欣九賦京廩開萬箱無謝堯爲君何用知栢篁詠蕭史蕭史愛少年嬴女吝童顔火粒願排棄霞霧好登攀龍飛送天路鳯起出秦關身去長不返簫聲時徃還贈故人馬子喬六首躑躅城上羊攀隅食玄草俱共日月輝昬明獨何早夕風飄野籜飛塵𬒳長道親愛難重見懷憂坐空老空灰滅更燃夕華晨更鮮春冰雖暫解冬水復還堅佳人捨我去賞愛長絶絃歡至不留日感物輒傷年松生隴坂上百尺下無枝東南望河尾西北隱崑崖野風振山籟朋鳥夜驚離悲涼貫年節䓗翠恒若斯安得草木心不怨寒暑移種橘南池上種杏北池中池北旣少露池南又多風早寒逼晚歳衰恨滿秋容湘濱有靈鳥其字曰鳴鴻一挹繒繳痛長别逺無雙皎如川上鵠赫似握中丹宿心誰不欺明白古所難慿楹觀皓露灑酒盪憂顔永念平生意窮光不忍還淹流徒攀桂延佇空結蘭雙劒將離别先在匣中鳴煙雨交將夕從此忽分形雌沉吳江裏雄飛入楚城吳江深無底楚闕有崇扄一爲天地别豈直限幽明神物終不隔千祀儻還并採菱歌七首驚舲馳桂浦息棹偃椒潭簫弄澄湘北菱歌清漢南弭榜搴蕙荑停唱紉薫若含傷拾泉花縈念採雲蕚睽闊逢暄新悽怨值妍華秋心不可盪春思亂如麻要艶雙嶼裏望美兩洲間褭褭風出浦容容日向山煙曀越障深箭迅楚江急空抱琴中悲徒望近關泣緘歎凌珠淵收慨上金堤春芳行歇落是人方未齊思今懷近憶望古懷逺識懷古復懷今長懷終無極山行見孤桐桐生藂石裏根孤地寒隂上倚崩峯勢下帶洞阿深奔泉冬激射霧雨夏霖淫未霜葉巳肅不風條自吟昏明積苦思晝夜呌哀禽棄妾望掩淚逐臣對撫心雖以慰單危悲涼不可任幸願見雕㫁爲君堂上琴鮑氏集卷第六
