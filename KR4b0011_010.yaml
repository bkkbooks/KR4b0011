body:
  text: 鮑氏集卷第十河清頌并序佛影頌凌煙樓銘并序藥奩銘飛白書勢銘瓜步山楬文石帆銘河清頌并序臣聞善談天者必徴像於人工言古者先考績於今鴻羲以降遐哉邈乎鏤山嶽雕篆素昭德垂勳可謂多矣而史編唐堯之功載格于上下樂登文王之操稱於昭于天素狐玄玉聿彰符命朴牛文蚓爰定祥曆魚鳥動色禾雉興讓皆物不盈眥而美溢金石頌聲為之而寢詩人於是不作庸非惑歟自我皇宋之承天命也仰應龍木之精俯協龜水之靈君圍帝寶粲爛瑰英固以業光曩代事華前德矣聖上天飛踐極迄茲二十有四載道化周流玄澤汪濊地平天成含生阜熙文同軓通表裏釐福曜德中區黎庶知讓觀英遐外夷貊懷惠秩禮恤勤散露臺之金賑民舒國傾御邸之粟約違迫脅奢去甚泰宴無留飲畋不盤樂物色異人優遊鯁直顯靡失心幽無怨魄精照日月事洞天情故不勞仗斧之使號令不肅而自嚴無辱鳯舉之事靈怪不召而自彰萬里神行飈塵不起農商野廬邊城偃析冀馬南金填委內府馴象棲爵充羅外苑阿紈篡組之饒衣覆宗國魚鹽𣏌梓之利傍贍荒遐士民殷富繁軼五陵宫宇宏麗崇冠三川閭閈有盈歌吹無絶朱輪疊轍華冕重肩豈徒世無窮人民獲休息朝呼韓罷酤鐡而已哉是以嘉祥纍仍福應尢盛青丘之狐丹穴之鳥栖阿閣逰禁園金芝九莖木禾六秀銅池發膏畒冝以謁薦郊廟和協律吕煙霏霧集不可勝紀然而聖上猶夙興昧旦若有望而未至宏規逺圖如有追而莫及神明之貺推而弗居也是以琬碑鏐檢盛典蕪而不治朝神省方大化抑而未許崇文協律之士藴儛頌於外坐朝陪宴之臣懷揄揚於內三靈佇眷九壤注心既有日矣歲宮乾維月邅蒼陸長河巨濟異源同清澄波萬壑潔瀾千里斯誠曠世偉觀昭啓皇明者也語曰影從表瑞從德此其效焉宣尼稱鳯鳥不不至河不出圖傳曰俟河之清人壽幾何皆傷不可見者也然則古人所不見者今殫見之矣孟軻曰千載一聖是旦暮也豈不信哉夫四皇六帝樹聲長世大寶也澤浸群生國富刑清鴻德也制禮裁樂惇風遷俗文教也誅箠羯黠束顙象闕武功也鳴禽躍魚滌穢河渠至祥也大寶鴻德文教武功其崇如此幽明同贊民祇與能厥應如彼唯天為大堯實則之皇哉唐哉疇與為抑又聞之勢之所覃者淺則美之所傳者近道之所感者深則慶之所流者逺是以豐功韙命潤色縢策盛德形容藻被歌頌察之上代則奚斯吉甫之徒鳴玉鑾於前視之中古則相如王褒之屬馳金羈於後絶景揚光清埃繼路故班固稱漢成之世奏御者千有餘篇文章之盛與三代同風由是言之斯乃臣子舊職國家通議不可輟也臣雖不敏敢不勉乎乃作頌曰窺刋崩石捃逸殘竹巢風寂寥羲埃綿邈巨生大年贍學淵聞鞶繡成景粉繢顓軒徒玩井科未覩天河亘古通今明鮮晦多千齡一見書史登歌旋我皇駕揆景方塗凌周躐殷蹶唐轢虞如彼七緯纍壁重珠高祖撥亂首物定靈更開天地再鑄群生帝御三傑龍步八垌朔南暨教海北騰聲淪深格高浹遐洞冥毚鼎遷宋玄圭告成大明方徽鴻光中微聖命誰堪皇曆攸歸謀從筮協神與民推黃旗西映紫蓋東輝納瑞螭玉升政衡機金輪豹飾珠冕龍衣正位北辰垂拱南面天下何思日用罔倦復禮歸仁觀恆通變一物有違戚言毁膳菲躬簡法厚下安宅謙德彌光損道滋益孝崇饗祀勤隆耕籍饘酎秋羊封墐春骼嬰耄兼梁鰥孤重帛體由學染俗以教遷禮導刑清樂鬯風宣分衢讓齒折訟推田野旌伏彥朝賞登賢儒訓優柔武節焱鷙文憲精弘戎容犀利樞鈐明審程彠周備吏礪平端民羞幸覬桴鼓凝埃烽驛垂轡銷我長歸為農器閩外水鄉鄣表炎國隴首西南渤尾東北赩赩嶺丹渾渾泉黑移琛雲勉轉隼卭𤏡狼歌薦功鳥談陳德治博化光民阜財盛班白行謡青綺高詠雲表幽和物章明慶麗植雕質蠢行藻性仁草晨莩德宿宵映海無隱飈山有黃落牛羊內首閭戶外拓瑞木朋生祥禽輩作薰風蕩閨飴露流閣器範神妙劑調象藥匪直也斯偉慶方溱注彼四瀆媚此雙川伏靈遙紀閟貺遐年澄波昆嶽鏡流蔥山泉室凝澱水府清涓俯瞰夷都降視驪淵朱宫濳耀紫閣隂鮮昔在爽德王風不昌乃溢乃竭或壅或亡潔源濫壑曾是未央先民永慨大道悠長雲何其實鍾我皇聞諸師説天踈聽密分介焉如響匪逺惟疾矧是皇心妙夫貞一左右天經户牗人術訏謨布簡絲言盈室穢有綿祀清豈崇日一人之慶吹萬稟和靈根方固修源重波副睿二哲帝體皇柯景雲蔚嶽秀星駢羅垂光九野騰響四遐輔車鼎足槃石虎牙世匹周室基永漢家泰階既平洪河既清大人在上區宇文明樵夫議道漁父濯纓臣照作頌鋪德樹聲佛影頌形生麁怪神照潭寂驗幽以明考心者迹六塵煩苦五道綿劇乃炳舟梁爰悟淪溺色丹貌繢留相瓊石金光絶見玉毫遺覿俾昏作朗效順去逆凌煙樓鉻并序宋臨川王起川王起臣聞慿飈薦響唱微效長垂一作乘波鑒景功少致深是以氷臺築乎魏邑鳯閣起於漢京皆所以贊生通志感恱幽情者也伏見所製凌煙樓棲置崇逈延瞰平寂即秀神皋因基地勢東臨吳甸西眺楚關奔江永寫鱗嶺相葺重樹窮天通原盡目悲積陳古賞絶舊年誠可以暉曠髙明藻撤逺心矣夫識緣感傾事待言彰匪言匪述綿世罔傳敢作銘曰巖巖崇樓藐藐層隅階基天削戶牖雲區瞰江列楹望景延除積清風露合一作含綵煙塗俯窺淮海俯眺荆吳我王結駕藻思神居冝此萬春修靈所扶藥奩銘歲霣走丸生猒隤墻時無驟得年有遐方水玉出煙靈飛一作神靈生光龜文電衣龍綵雲裳九芝八石延正蕩斜二脂六體振衰返華毛姬餌葉鳯子藏花景絶翠虬氣隱頳霞深神罕別妙竒不楊或繁虎杖或亂蛇牀故不世不可以服未逹不可以嘗眩精逆目是乃為良飛白書勢銘秋毫精徑霜素凝鮮霑此瑤波染彼松煙超工八法盡竒六文鳥企龍躍珠解泉分輕如遊霧重似崩雲絶鋒劒摧驚勢箭飛差池燕起振迅鴻歸臨危制節中險騰機圭角星芒明麗爛逸絲縈髮垂平理端密盈尺錦兩片字金溢故仙芝煩弱既匪足雙蟲虎瑣碎又安能匹君子品之是最神筆石帆銘應風剖流息石橫波下潨地紉上獵星羅吐湘引漢歙蠡吞沱西歷岷冡北㵼淮河眇森弘藹積廣連深淪天測際亘海窮隂雲族未起風柯不吟崩濤山墜鬱浪雷沉在昔鴻荒刋啓源陸表裏民邦經緯鳥服瞻貞視晦坎水巽木乃剡乃鏟既刳既斫飛深浮逺巢潭館谷涉川之利謂易則難臨淵之戒曰危乃安泊潛輕濟冥表勤言穆我戒逐留御不還徒悲猿鵠空駕滄煙君子彼想祗心載惕林簡松括水採龍鷁覘氣涉潮投祭涵璧揆檢舍圖命辰定歷二崤虎口周王夙趨九折羊腸漢惡電驅濳鱗浮翼爭景乘虛衡石頳鰩帝子察殂青山斷河后父沉軀川吏掌津敢告訪途瓜步山楬文歲舍龍紀月巡鳥張鮑子辭吳客楚指兖歸揚道出關津升高問途北眺氊鄉南矖炎國分風代川揆氣閩澤四睨天宫窮曜星絡東窺海門候景落日逰精八表駃視四遐超然永念意類交橫信哉古人有數寸之籥持千鈞之關非有其才施處勢要也瓜步山者亦江中眇小山也徒以因逈為髙據絶作雄而凌清瞰逺擅竒含秀是亦居勢使之然也故才之多少不如勢之多少逺矣仰望穹垂俯視地域涕洟江河疣贅丘嶽雖奮風漂石驚電剖山地綸維陷川鬪毀宫豪盈髮虛曾未注言況乎沉河浮海之高遺金椎璧之竒四遷八聘之䇿三黜五逐之疵販交買名之薄吮癕舐痔之卑安足議其是非鮑氏集第卷十終丙辰七夕後三日借吳趨友人宋本比挍一過
