body:
  text: 鮑氏集卷第八擬行路難十九首松柏篇并序侍宴覆舟山二首勑為栁元景作發廬山二首發長松遇雪蒜山𬒳始興王命作冬至蜀四賢詩秋日示休上人和王義興七夕贈鮑侍郎釋惠休答休上人和王護軍秋夕懷逺人春羈三日苦雨三日遊南苑歲暮悲園中秋散一作園中載散詠秋秋夕望水詠白雪擬行路難十九首奉君金巵之美酒玳瑂玉匣之雕琴七綵芙蓉之羽帳九華蒲萄之錦衾紅顔零落歲將暮寒光宛轉時欲沉願君裁悲且減思聽我抵節行路吟不見柏梁銅雀上寧聞古時清吹音洛陽名工鑄為金恃山千斫復萬鏤上刻秦女擕年仙承君清夜之歡娛列置幃裏明燭前外發龍鱗之丹綵內含麝芬之紫煙如令君心一朝異對此長歎終百年璇閨玉墀上椒閣文窗繡户垂羅幕中有一人字金蘭𬒳服纎羅采芳藿春燕差池風散梅開幃對景弄春爵含歌欖涕恆抱愁人生幾時得為樂寧作野中之雙鳬不願雲間之別鶴寫水置平地各自東西南北流人生亦有命安能行歎復坐愁酌酒以自寬舉杯斷絶歌路難心非木石豈無感吞聲躑躅不敢言君不見河邊草冬時枯死春滿道君不見城上日今暝沒盡去明朝復更出今我何時當得然一去永滅入黃泉人生苦多歡樂少意氣敷腴在盛年且願得志數相就牀頭恆有沽酒錢功名竹帛非我事存亡貴賤付皇天對案不能食拔劒擊柱長歎息丈夫生世會幾時安能蹀躞垂羽翼棄置罷官去還家自休息朝出與親辭暮還往親側弄兒牀前戲看婦機中織自古賢盡貧賤何況我輩孤且直愁思忽而至跨馬出北門舉頭四顧望但見松柏園荆棘鬱樽樽中有一息名杜䳌言是古時蜀帝魄聲音哀苦鳴不息羽毛憔悴似人髠飛走樹間逐蟲蟻豈憶往日天子尊念此死生變化非常理中心惻愴不能言中庭五株桃一株先作花陽春妖冶二三月從風簸蕩落西家西家思婦見悲惋零淚霑衣撫心歎初送我君出戶時何言淹留節回換牀席生塵明鏡垢纎腰瘦削髮蓬亂人生不得恆稱意惆悵徙倚至夜半銼蘖染黃絲黃絲歷亂不可治我昔與君始相值爾時自謂可君意結帶與我言死生好惡不相置今日見我顔色衰意中索寞與先異還君金叉玳瑁簪不忍見此亦愁思君不見舜華不終朝須臾淹冉零落銷盛年妖艷浮華輩不久亦當詣冡頭一去無還期千愁萬歲無音詞孤魂焭焭空隴間獨魄徘徊繞墳基但聞風聲野鳥吟豈憶平生盛年時為此令人多悲悒君當縱意自熙怡君不見枯籜走階庭何時復青著故莖君不見亡靈蒙享祀何時傾杯竭壼罌君當見此起憂思寧及得與時人爭人生倐忽如絶電華年盛德幾時見但令縱意存高尚㫖酒佳肴相相宴持此從朝竟夕暮差得亡憂消愁怖胡為惆悵不能巳難盡此曲令君忤今年陽初花滿林明年冬末雪盈岑推移代謝紛交轉我君邊戍獨稽沉執𬒮分别巳三載邇來寂淹無分音朝悲遂成滳暮思繞繞最傷心膏沐芳餘久不御蓬首亂鬢不設簮徒飛輕埃舞空帷粉筐黛器靡復遺自生留世苦不幸心中惕惕恆懷悲暮禽喈喈旦暮鳴最傷君子憂思情我初辭家從軍僑榮志溢氣干雲霄流浪漸冉經三齡匆有白髮素髭生今暮臨水拔巳盡明日對鏡復巳盈恐羇死為客思寄滅生空精每懷舊鄉野念我舊人多悲聲忽見過客問何我寧知我家在南城答云我曾居君鄉知君逰宦在此城我行離邑巳萬里今方羇役去逺征來時聞君婦閨中孀居獨宿有貞名亦云朝悲泣間房又聞暮思淚霑裳形容憔悴非昔恱蓬鬢衰顔不復糚見此令人有餘悲當願君懷不暫忘君不見少壯從軍去白首流離不得還故鄉窅窅日夜隔音塵斷絶阻河關朔風蕭條白雲飛胡笳哀急邉氣寒聽此愁人兮奈何登山逺望得留顔將死胡馬跡寧見妻子難男兒生世轗軻欲何道綿憂推抑起長歎君不見柏梁臺今日丘墟生草萊君不見阿房宫寒雲澤雉栖其中歌妓舞女今誰在高墳疊疊滿山隅長䄂紛紛徒世非我昔時千金軀隨酒逐樂任意去莫令含歎下黃壚君不見冰上霜表裏隂且寒雖蒙朝日照信得幾時安民生故如此誰令摧折強相看年去年來自如削白髮零落不勝冠君不見春鳥初至時百草含青俱作花寒風蕭索一旦至竟得幾時保光華日月流邁不相饒令我愁思怨恨多諸君莫歎貧富貴不由人丈夫四十彊而仕餘當二十弱冠辰莫言草木委冬雪㑹應蘇息遇陽春對酒叙長篇窮途運命委皇天但願樽中九醖滿莫惜牀頭百箇錢直得優遊卒歲一何勞辛苦事百年松柏篇并序余患腳上氣四十餘日知舊先借傳玄集以金病劇遂見還開袠適見樂府詩龜鶴篇於危病中見長逰詞惻然酸懷抱如此重病彌時不差呼吸乏喘舉目悲矣火藥間缺而擬之松柏受命獨歷代長不衰人生浮且脆鴆若晨風悲東海迸逝川西山導落暉南郊恱籍短蒿里收永歸諒無疇昔時百病起盡期志士惜牛刀忍勉自療治傾家行藥事顚沛去迎醫徒備火石苦奄至不得辭龜齡安可護岱宗限巳迫睿聖不得留為善何所益捨此赤縣居就彼黃壚宅永離九原親長與三辰隔屬纊生望盡闔棺世業埋事痛存人心恨結亡者懷祖葬既云及擴隧亦巳開室族內外哭親踈同共哀外姻逺近至名列通夜臺扶輿出殯宮低回戀庭室天地有盡期我去無還日居者今巳盡人事從此畢火歇煙既沒形銷聲亦滅鬼神來依我生人永辭訣大暮杳悠悠長時無時節鬱湮重冥下煩冤難具說安寢委沉寞戀戀念平生事業有餘結刋述未及成資儲無擔石兒女皆孩嬰一朝放捨去萬恨纏我情追憶世上事束教巳自拘明發靡怡悆夕歸多憂虞撤閒晨徑流輟宴式酒濡知今暝日苦恨失爾時娛遙遙逺民居獨埋深壤中墓前人跡滅冡上草日豐空林響鳴蜩高松結悲風長寐無覺期誰知逰者躬生存處交廣連榻舒華茵巳沒一何苦楛哉不容身昔日平居時晨夕對六親今日掩奈何一見無諧因禮席有降殺三齡速回隙几筵就收撤室宇改疇昔行女逰歸途仕子復王役家世本平常獨有亡者劇時祀望歸來四節靜塋丘孝子撫墳號父子知來不欲還心依戀欲見絶無由煩冤荒隴側肝心盡崩抽侍宴覆舟山二首勑為栁元景作息雨清上郊開雲照中縣逰軒越丹居暉燭集涼殿凌高躋飛楹追焱起流宴苑含靈群嵓庭藏物變明暉爍神都麗氣冠華甸目逺幽情周醴洽深恩遍繁霜飛玉闥愛景麗皇州清蹕戒馳路羽蓋佇宣遊神居既崇盛嵓嶮信環周禮俗陶德聲昌會溢民謳慙無勝化質謬從雲雨浮十作逰登廬山二首懸裝亂水區薄旅次山楹千巖盛阻積萬壑勢回縈巃嵸高昔貌紛純襲前名洞間窺地脉聳樹隱天經松磴上迷密雲竇下縱橫隂氷實夏結炎樹信冬榮嘈噆晨鵾思呌嘯夜猿清深崖伏化迹穹岫閟長靈乘此樂山性重以逺逰情方躋羽人途永與煙霧并訪世失隱淪從山異靈士明發振雲冠升嶠逺棲趾髙岑隔半天長崖斷千里氣霧承星辰潭壑洞江汜嶄絶類虎牙㠝岏象熊耳埋氷或百年韜樹必千祀雞鳴清澗中猿嘯白雲裏瑤波逐穴開霞石觸峯起回牙非一形參差反相似傾聽鳯管賓望釣龍子松桂盈膝前如何穢城市發長松遇雪出牛既送寒奠陵一作冥陸方浹馳振風搖地局封雪滿空枝江渠合為陸天野浩無涯飲兼凍馬骨斫氷傷役疲昆明豈不慘黍谷寧可吹蒜山𬒳始興王命作暮冬霜朔嚴地閉泉不流玄武藏木隂丹烏一作鳥還養羞勞農澤既周役車時亦休髙薄符一作浮好蒨一作清藻駕及時逰鹿苑豈淹睇兔園不足留升嶠眺日䡄臨逈望滄洲雲生玉堂裏風靡銀臺陬陂石類星懸嶼木似煙浮形勝信天府珍寶麗皇州白日回清景芳豔洽歡柔參差出寒吹飉戻江上謳王德愛文雅飛翰灑鳴球美哉物會昌衣道服光猷冬至舟遷莊甚笑水流孔急難景移風度改日至晷回換眇眇負雪鶴皎皎帶霜鴈長河結蘭紆層氷如玉岸哀哀古老容慘顔愁歲晏催促時節過逼迫聚離散美人還未央鳴筝誰與彈蜀四賢詠渤渚水浴鳬春山王抵鵲皇漢方盛明群龍滿階閣君平因世間得還守寂寞閉簾注道德開卦述天爵相如逹生㫖能屯復能躍陵令無人事毫墨時灑落褒氣有逸倫雅繢信炳博如令聖納賢金璫易羈絡良遮神明遊豈伊覃思作玄經不期賞蟲篆憂散樂首路或參差投駕均逺託身表既非我生內任一作甚豐薄秋日示休上人枯桑葉未零疲客心易驚今茲亦何早巳聞絡緯鳴回風滅且起卷蓬息復征愴愴簟上寒悽悽帳裏清物色延暮思霜露逼朝榮臨堂觀秋草東西望楚城百物方蕭瑟坐歎從此生和王義興七夕宵月向掩扉夜霧万當白寒機思孀婦秋堂泣征客匹命無單年偶影有雙夕暫交金石心須臾雲雨隔贈鮑侍郎釋惠休玳枝兮金英緑葉兮紫莖不入君玉杯低彩還自榮想君不相艷酒上視塵生當令芳意重無使盛年傾答休上人酒出野田稻菊生高岡草味貌復何竒能令君傾倒玉碗徒自羞為君愧此秋金蓋覆牙拌何為心獨愁和王護軍秋夕散漫秋雲逺蕭蕭霜月寒驚飈西北起孤鴈夜往還開軒當户牗取琴試一彈停歌不能和終曲久辛酸金氣方徑殺隆陽微且單泉涸甘并竭節徙芳歲殘生事各多少誰共知易難投章心藴千里途輕紈願託孤老暇觴思暫開餐懷逺人哀樂生有端離會起無因去事難重念恍惚似如神屬期眇起逺後遇邈無辰馳風掃遙路輕蘿含夕塵思君成首疾欲息眉不伸春羈征人歎道遐去鄉愒路邇佳期每無從淮陽非尺咫春日起遊心勞情出徙倚岫逺雲煙綿谷屈泉靡迤風巳花四散露濃條暄妍正在兹摧抑多嗟思嘶聲名邊堅豈我箱中𥿄染翰餉君琴新聲憶解子三日氣暄動思心柳青起春懷時艷憐花藥服淨俯登臺提觴野中飲愛心煙未開露色染春草泉源潔冰苔泥泥濡露條嫋嫋承風栽鳬雛掇苦薺黃鳥銜櫻梅解襟欣景預臨流競覆杯美人竟何在浮心空自摧苦雨連隂積澆灌滂沱下霖亂沉雲日夕昏驟雨望朝旦蹊濘走獸稀林寒為飛晏密霧冥下溪聚雲屯髙岸野雀無所依群雞聚空館川梁日巳廣懷人邈渺漫徒酌相思酒空急促明彈三日遊南苑採性及華月追節逐芳雲勝舊溢林疏麗日曄山文清潭圓翠會化薄緑綺紋合樽遽景斜折榮吝組芬歲暮悲霜露迭濡潤草木互榮落日夜改運周今悲復如昨晝色苦沉隂白雪夜回薄皎潔冒霜鴈飄楊出風鶴天寒多顔苦妍容逐丹壑絲罥千里心獨宿乏然諾歲暮美人還寒壺與誰酌園中秋散負疾固無豫晨襟悵已單氣人蓬門踈風數園萆殘荒墟半晚色幽庭憐夕寒既悲月戶清復切夜蟲酸流枕商聲苦騷殺年志䦨臨歌不知調發興誰與歡儻結延上清豈孤林下彈詠秋秋蘭徒晚緑流風漸不親飈我垂罳幕驚此梁上塵沉隂安可久豐景將逐淪何由忽靈化暫見別離人秋夕慮涕擁心用夜默發思機幽閨溢涼吹間庭滿清暉紫蘭花巳歇青梧葉方稀江上淒海戾漢曲驚朔霏髮斑悟壯晚物謝知歲微臨宵嗟獨對撫賞怨情違躊躇空明月惆悵徒深帷望水刷鬢垂秋日登高觀水長千澗無別源萬壑共一廣流缺巨石轉湍回急沫上苕苕嶺岸髙照照寒洲爽東歸難忖惻日世誰豫賞臨川憶古事目孱千載想河伯自矜大海若沉渺莽詠白雪白圭誠自白不如雪光妍工隨物動氣能逐勢方圓無妨玉顔媚不奪素繒鮮投心障苦節隱迹避榮年蘭焚石既斷何用恃芳堅鮑氏集卷弟八
