body:
  text: 鮑氏集卷第四擬古八首擬青青陵上柏學劉公幹體五首擬阮公夜中不能寐學陶彭澤體紹古辭七首幽蘭五首學古一作北風雪擬古八首魯客事楚王懷金襲丹素既荷主人恩又蒙令尹顧日宴罷朝歸輿馬塞衢路宗黨生光輝賓僕逺傾慕富貴人所欲道得亦何懼南國有儒生迷方獨淪誤伐木清江湄設罝守毚兔十五諷詩書篇翰靡不通弱冠參多士飛步遊秦宫一作紫宫側觀君子論預見古人風兩說窮舌端五車摧筆鋒羞當白璧貺恥受聊城功晚節從世務乘障逺和戎解佩襲犀渠卷袠奉盧弓始願力不及安知今所終幽并重騎射少年好馳逐氊帶佩雙鞬象弧插雕服獸肥春草短飛鞚越平陸朝遊鴈門上暮還樓煩宿石梁有餘徑驚雀無全目漢虜方未和邉城屢翻覆留我一白羽將以分符竹鑿井北陵隈百丈不及泉生事本瀾漫何用獨精堅幼壯重寸隂哀暮及輕年放駕息朝歌提爵止中山日夕登城隅周迥視洛川街衢積凍草城郭宿寒煙繁華悉何在宫闕久崩填空謗齊景非徒稱夷叔賢伊昔不治業倦逰觀五都海岱饒壯士蒙泗多宿儒結髮起躍馬垂白對講書呼我升上席陳觶發瓢壷管仲死巳久墓在西北隅後面崔嵬者亘公舊冡廬君來誠既晚不覩崇明初玉琬徒見傳支友義漸踈束薪幽篁裏刈黍寒澗隂朔風傷我肌號鳥驚思心歲暮井賦訖程課相追尋田租送函谷獸藁輸上林河渭氷未開關隴雪正深笞擊官有罰呵辱吏見侵不謂乘軒意伏櫪還至今河畔草未黃胡鴈巳矯翼秋蛬扶戶吟寒婦成夜織去歲征人還流傳舊相識聞君上隴時東望久歎息宿昔改衣帶朝旦異容色念此憂如何夜長愁更多明鏡塵匣中寶琴生網羅蜀漢多奇山仰望與雲平隂崖積夏雪陽谷散秋榮朝朝見雲歸夜夜聞猿鳴憂人本自悲孤客易傷情臨堂設樽酒留酌思平生石以堅為性君勿慙一作輕素誠擬青青陵上柏㳙㳙亂江泉綿綿橫海煙浮生旅昭世空事歎華年書翰幸間暇我酌子縈絃飛鑣出荆路騖服入秦川渭濱富皇居鱗館匝河山輿童唱秉椒櫂女歌采蓮孚愈鸞閣上窈窕鳯楹前娛生信非謬安用求多賢學劉公幹體五首欲宦乏王事結主逺恩私為身不為名散書徒滿帷連氷上冬月披雪拾園葵聖靈燭區外小臣良見遺曀曀寒野霧蒼蒼隂山柏樹逈霧縈集山寒野風急歲物盡淪傷孤貞為誰立賴樹自能貞不計迹幽澀胡風吹朔雪千里渡龍山集君瑤臺上飛舞兩楹前兹晨自為美當避艷陽天艷陽桃李節皎潔不成妍荷生渌泉中碧葉齊如規回風蕩流霧珠水逐條垂彪炳此金塘藻耀君王池不愁世賞絶但畏盛明移白日正中時天下共明光北園有細草當晝正含霜乖榮頓如此何用獨芬芳抽琴為爾歌絃斷不成章擬阮公夜中不能寐漏分不能卧酌酒亂繁憂惠氣慿夜清素景緣隟流鳴鶴時一聞千里絶無儔佇立為誰久寂寞空自愁學陶彭澤體奉和王義典長憂非生意短願不須多但使鑄酒滿朋舊數相過秋風七八月清露潤綺羅提琴當戶坐歎息望天河保此無傾動寧復滯風波紹古辭七首橘生湘水側菲陋人莫傳逢君金華宴得在玉几前三川窮名利京洛富妖妍恩榮難久恃隆寵易衰偏觀席妾悽愴覩翰君泫然徒抱忠孝志猶為葑菲遷昔與君别時蠶妾𥘉獻絲何言年月駛寒衣巳搗治縧繡多廢亂篇帛久塵緇離心壯為劇飛念如懸旗石席我不爽德音君勿欺瑟瑟涼海風竦竦寒山木紛紛羇思盈慊慊夜弦促訪言山海路千里歌别鶴絃絶空咨嗟形音誰賞録辛苦異人狀美貌改如玉徒畜巧言鳥不解心款曲孤鴻散江嶼連翩遵渚飛含嘶衡挂浦馳顧河朔畿攢攢徑秋木昭昭淨冬暉窗前滌歡爵帳裏縫舞衣芳歲猶自可日夜望君歸慿楹玩夜月逈眺出谷雲還山路巳逺往海不及鄰徘徊清淮汭顧慕廣江濆物情乖喜歇守操古難聞三越豐少姿容態傾動君開黛覩容以作朝顔臨鏡訪遙塗君子事河源彌祀闕還書春風掃地起飛塵生綺疏文袿為誰設羅帳空卷舒不怨身孤寂但念星隱隅暖歲節物早萬萌迎春逹春風夜㛹姢春霧明菴藹軟蘭葉可采柔桑條易捋怨咽對風景悶瞀守閨闥天傳愁民命含生但契闊憂來無行伍歷亂如覃葛幽蘭五首傾輝引暮色孤景留恩顔梅歇春欲罷期渡往不還簾委蘭蕙露帳含桃李風攬帶昔何道坐令芳節終結佩徒分明抱渠輒乖忤華落知不終空愁坐相誤眇眇蛸掛網漠漠𧖟弄絲空慙不自信怯與君劃期陳國鄭東門古今共所知長䄂暫徘徊駟馬停路岐學古一作北風雪北風十二月雪下如亂巾實是愁苦節惆悵憶一作别情親會得兩少妾同是洛陽人嬛綿好眉目間麗美腰身凝膚皎若雪明净色如神驕愛生盼矚聲媚起朱唇襟服雜緹繢首飾亂瓊珍調絃俱起舞為我唱梁塵人生貴得意懷願待君申幸傎嚴冬暮幽夜方未晨齊衾久兩說角枕巳雙陳願君早休息留歌待三春鮑氏集卷第四
