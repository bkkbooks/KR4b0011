  - {type: variant, offset: 2822, length: 0, content: '', WYG: 代陳思王京洛篇鳯樓十二重四户八綺窻繡桷金蓮花桂柱玊盤龍珠簾無隔露羅愰不勝風寳帳三千所為爾一朝容揚芬紫煙上垂綵緑雲中春吹回白日霜歌落塞鴻但懼秋塵起盛愛逐衰蓬坐視靑苔滿臥對錦筵空琴瑟縱横散舞衣不復縫古來共歇薄君意豈獨濃唯見雙黄鵠千里一相從代陸平原君子有所思行西上登雀臺東下望雲闕層閣肅天居馳道直如髪繡甍結飛霞璇題納行月築山擬蓬壼穿池類溟渤選色遍齊岱徴聲匝卭越陳鍾陪夕讌笙歌待明發年貌不可還身意㑹盈歇蟻壤漏山阿絲涙毁金骨器惡含滿欹物忌厚生没智哉衆多士服理辨昭昧代白紵曲二首朱唇動素袖舉洛陽少童一作年邯鄲女古稱緑水今白紵催絃急管為君舞窮秋九月荷葉黄北風驅雁天雨霜夜長酒多樂未央春風澹蕩俠思多天色淨渌氣妍和含桃紅蕚蘭紫芽朝日灼爍發園華巻幌結帷羅玊筵齊謳秦吹盧女絃千金顧笑買芳年代白紵舞歌詞四首奉始興三神作并啟侍郎臣鮑照啟被教作白紵舞歌詞謹竭庸陋裁為四曲附啟上呈識方淟悴思塗猥局言既無雅聲未能文不足以宣贊聖㫖抽抜妙實謹遣簡餘慙隨悚盈謹啟詞吳刀楚製為佩褘纎羅霧縠垂羽衣含商咀徴歌露晞珠履颯沓紈紬飛淒風夏起素雲回車怠馬煩客忘歸蘭膏明燭承夜暉桂宫栢寢擬天居朱爵文窻韜碧䟽象牀瑤席鎮犀渠雕屏合匝組帷一作帳舒秦箏趙瑟挾笙竿垂璫散佩盈玊除停觴不御欲誰須三星參差露霑濕絃悲管清月將入寒光蕭條候蟲急荆王流歎楚妃泣紅顔難長時易戢凝華結綵久延立非君之故豈安集池中赤鯉庖所捐琴髙乗去飛上天命逢福世丁溢恩簪金藉綺昇曲筵恩厚徳深委如山潔誠洗志期暮年烏白馬角寜足言鮑明逺集巻三}
