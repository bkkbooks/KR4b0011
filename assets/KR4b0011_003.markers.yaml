  - {type: variant, offset: 2822, length: 0, content: '', SBCK: 代陳思王京洛篇鳯樓十二重四戸八綺窓繡桷金蓮花桂柱玉盤龍珠簾無隔露羅愰不勝風寳帳三千所爲爾一朝容揚芬紫煙上垂綵緑雲中春吹回白日霜歌落塞鴻但懼秋塵越盛愛逐衰蓬坐視靑苔滿卧對錦筵空琴瑟縱横散舞衣不復縫古來共歇薄君意豈獨濃唯見雙黃鵠千里一相從代陸平原君子有所思行西出登雀䑓東下望雲闕層閣肅天居馳道直如髮繡甍結飛霞璇題納行月築山擬蓬壼穿池􅀋溟渤選色遍齊岱徴聲匝卭越陳鐘陪夕讌笙歌待明發年貌不可還身意會盈歇蟻壌漏山阿絲涙毀金骨􅄊惡含滿欹物忌厚生􅃿智哉衆多士服理辨昭昧代白紵曲二首朱脣動素䄂舉洛陽少童一作年邯鄲女古稱緑水今白紵催絃急管爲君舞窮秋九月荷葉黃北風驅鴈天􅀨霜夜長酒多樂未央春風澹蕩俠思多天色凈緑氣研和含桃紅蕚蘭紫牙朝日灼爍發園華卷幌結帷羅玉筵齊謳秦吹盧女絃千金顧􅀏買芳年代白紵舞歌詞四首奉始興王神作并啓侍郎臣鮑照啓􅀍敎作白紵舞歌詞謹竭庸陋裁爲四曲附啓上呈識方淟悴思塗猥局言旣無雅聲未能文不足以宣賛聖㫖抽㧞妙實謹遣簡餘慙隨悚盈謹啓詞吳刀楚製爲佩褘纎羅霧縠垂羽衣含商咀徴歌露晞珠􅂂颯沓紈䄂飛淒風夏起素雲囘車怠馬煩客忘歸蘭膏明燭承夜暉桂宫栢􅃦擬天居朱爵文窓韜碧䟽􅁚牀瑤席鎮犀渠雕屏合匝組帷一作帳舒秦箏趙瑟挾笙竽垂璫散佩盈玉除停觴不御欲誰湏三星差池露霑濕絃悲管清月將入寒光簫條候􅆉急荆王流歎楚妃泣紅顔難長時易戢凝華結綵乆延立非君之故豈妄集池中赤鯉庖所􅂢琴高乗去飛上天命逢福世丁溢恩簮金藉綺昇曲筵恩厚德深委如山潔誠洗志期暮年烏白馬角寜足言鮑氏集卷第三}
