  - {type: variant, offset: 25, length: 0, content: '', WYG: 水漫浩浩高山壯巍巍波瀾異往復風雲改榮衰此土非吾土慷慨當告誰從臨海王上荆初發新渚客行有苦樂但問客何行扳龍不待翼附驥絶塵冥梁珪分楚牧羽鷁指金荆雲艫掩江氾千里被連旌戾戾旦風遒嘈嘈晨鼓鳴收纜辭帝郊揚棹發皇京狐兔懷窟志犬馬戀主情撫襟同太息相顧俱涕零奉役塗未啟思歸思已盈望孤石江南多暖谷雜樹茂寒峯朱華抱白雪陽條熙朔風蚌節流綺藻輝石亂煙虹泄雲去無極馳波往不窮簫歌清漏畢徘徊朝景終浮生會當㡬歡酌每盈衷登黄鶴磯木落江渡寒鴈還風送秋臨流斷商絃瞰川悲棹謳適郢無東轅還夏有西浮三崖隱丹磴九泒引滄流淚竹感湘別弄珠懷漢遊豈伊藥餌泰得奪旅人憂岐陽守風差池玉繩高掩映一作藹瑤井沒廣岸屯宿隂懸崖棲歸月役人喜先馳軍令申早發洲迥風正悲江寒霧未歇飛雲日東西別鶴方楚越塵衣熟揮澣蓬思亂光髮在江陵歎年傷老五難未易夷三命戒淵抱方瞳起松髓頳髮疑桂腦役生良自休大患安足保開簾窺景夕備屬雲物好翾翾燕弄風嫋嫋柳垂道池瀆亂蘋萍園陵美花草節如驚灰異零落就衰老玩月城西門廨中始見西門樓纎纎如玉鈎未央東北墀姢姢似娥眉娥眉蔽珠櫳玉鈎隔瑣窓三五二八時千里與君同夜移衡漢落徘徊入户中歸華先委露別葉早辭風客遊厭苦辛仕子倦飄塵休澣自公日宴慰及私辰蜀琴抽白雪郢曲發陽春肴乾酒未闋金壺啓久淪迴軒駐輕蓋留酌待情人代挽歌獨處重冥下憶昔登髙臺傲㟁平生中不為物所裁埏門只復閉白蟻相將來生時芳蘭體小蟲今為災𤣥􅁂無復根骷髏依青苔憶昔好飲酒素盤進青梅彭韓及薕藺疇昔已成灰壯士皆死盡餘人安在哉夜聴妓二首夜來坐㡬時銀漢傾露落澄滄入閨景葳蕤被園藿絲管感暮情哀音遶梁作芳盛不可恒及歲共為樂天明坐當散琴酒駛弦酌蘭膏消耗夜轉多亂筵雜坐更絃歌傾情逐節寧不苦特為盛年惜容華梅花落中庭雜樹多偏為梅咨嗟問君何獨然念其霜中能作花露中能作實搖蕩春風媚春日念爾零落逐寒風徒有霜華無霜質欽定四庫全}
