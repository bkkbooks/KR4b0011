  - {type: variant, offset: 26, length: 0, content: '', WYG: 鮑明逺集巻八宋鮑照撰擬行路難十八首奉君金巵之美酒瑇瑁玉匣之雕琴七綵芙蓉之羽帳九華蒲萄之錦衾紅顔零落歲將暮寒光宛轉時欲沈願君裁悲且減思聴我抵節行路吟不見柏梁銅雀上寧聞古時清吹音洛陽名工鑄為金博山千斵復萬鏤上刻秦女攜手仙承君清夜之歡娛列置幃裏明燭前外發龍鱗之丹綵内含麝芬之紫煙如今君心一朝異對此長歎終百年璇閨玉墀上椒閣文窓繡户垂羅幕中有一人字金蘭被服纎羅采芳藿春燕差池風散梅開幃對景弄春爵含歌攬涕恒抱愁人生㡬時得為樂寧作野中之雙鳬不願雲間之別鶴瀉水置平地各自東西南北流人生亦有命安能行歎復坐愁酌酒以自寛舉杯斷絶歌路難心非木石豈無感吞聲躑躅不敢言君不見河邊草冬時枯死春滿道君不見城上日今暝沒盡去明朝復更出今我何時當得然一去永滅入黄泉人生苦多安樂少意氣敷腴在盛年且願得志數相就牀頭恒有沽酒錢功名竹帛非我事存亡貴賤付皇天對案不能食拔劒撃柱長歎息丈夫生世會㡬時安能蹀躞垂羽翼棄置罷官去還家自休息朝出與親辭暮還在親側弄兒牀前戲看婦機中織自古聖賢盡貧賤何況我輩孤且直愁思忽而至跨馬出北門舉頭四顧望但見松柏園荆棘鬱蹲蹲集作撙撙中有一鳥名杜䳌言是古時蜀帝魂聲音哀苦鳴不息羽毛憔悴似人髠飛走樹間啄集作逐蟲蟻豈憶往日天子尊念此死生變化非常理中心惻愴不能言中庭五株桃一株先作花陽春妖冶二三月從風􅉫蕩落西家西家思婦見悲惋零淚霑衣撫心歎初送我君出户時何言淹留節迴換牀席生塵明鏡垢纎腰痩削髮蓬亂人生不得恒稱意惆悵徙倚至夜半剉蘖染黄絲黄絲歴亂不可治我昔與君始相值爾時自謂可君意結帶與君言死生好惡不相置一作結帯與君同死生好惡不疑相棄置今日見我顔色衰意中索寞一作錯寞與先異還君金一作玉釵玳瑁簪不忍見之益愁思君不見舜華不終朝須臾淹冉零落銷盛年妖艷浮華輩不久亦當詣塜頭一去無還期千秋萬歲無音詞孤魂㷀㷀空隴間獨魄徘徊遶墳基但聞風聲野鳥吟豈憶平生盛年時為此令人多悲悒君當縱意自熙怡君不見枯籜走階庭何時復青著故莖君不見亡靈䝉享祀何時傾杯竭壺罌君當見此起憂思寧及得與時人爭人生儵忽如絶電華年盛徳㡬時見但令縱意存髙尚㫖酒佳肴相胥讌持此從朝竟夕暮差得亡憂消愁怖胡為惆悵不能已難盡此曲今君忤今年陽初花滿林明年冬未雪盈岑推移代謝紛交轉我君邊戍獨稽沈執袂分別已三載邇來寂淹無分音朝悲慘慘遂成滴暮思遶遶最傷心膏沐芳餘久不御蓬頭亂鬢不設簪徒飛輕埃舞空帷粉筐黛器靡復遺自生留世苦不幸心中愓愓恒懷悲春禽喈喈旦暮鳴最傷君子憂思情我初辭家從軍僑榮志溢氣干雲霄流浪漸冉經三齡忽有白髪素髭生今暮臨水拔已盡明日對鏡復已盈但恐羇死為鬼客客思寄滅生空精每懷舊鄉野念我舊人多悲聲忽見過客問向我寧知我家在南城答云我曾居君鄉知君遊宦在此城我行離邑已萬里今方羇役去逺征來時聞君婦閨中孀居獨宿有貞名亦云朝悲泣閑房又聞暮思淚霑裳形容憔悴非昔悦蓬鬢衰顔不復粧見此令人有餘悲當願君懷石暫忘君不見少壯從軍去白首流離不得還故鄉窅窅日夜隔音塵斷絶阻河闗朔風蕭條白雲飛胡笳哀極邊氣寒聴此愁人兮奈何登山逺望得留顔將死胡馬跡能見妻子難男兒生世轗軻欲何道綿憂摧抑起長歎君不見柏梁臺今日丘墟生草萊君不見阿房宫寒雲澤雉栖其中歌妓舞女今誰在髙墳纍纍滿山隅長袖紛紛徒競世非我昔時千金軀隨酒逐樂任意去莫令含歎下黄壚君不見冰上霜表裏隂且寒雖䝉朝日照信得㡬時安民生故如此誰令摧折强相看年去年来自如削白髪零落不勝冠君不見春鳥初至時百草含青俱作花寒風蕭索一旦至竟得㡬時保光華日月流邁不相饒令我愁思怨恨多諸君莫歎貧富貴不由人丈夫四十彊而仕余當二十弱冠辰莫言草木委冬雪會應蘇息遇陽春對酒叙長篇窮途運命委皇天但願樽中九醞滿莫惜牀頭百箇錢直得優游卒一歲何勞辛苦事百年松柏篇并序余患脚上氣四十餘日知舊先借傳𤣥集以余病劇遂見還開袠適見樂府詩龜鶴篇於危病中見長逝詞惻然酸懷抱如此重病彌時不差呼吸乏喘舉目悲矣火藥間缺而擬之松柏受命獨歴代長不衰人生浮且脆鴆若晨風悲東海迸逝川西山導落暉南郭悦籍短蒿里收永歸諒無疇昔時百病起盡期志士惜牛刀忍勉自療治傾家行藥事顛沛去迎醫徒備火石苦奄至不得辭龜齡安可獲岱宗限已迫睿聖不得留為善何所益捨此赤縣居就彼黄壚宅永離九原親長與三辰隔屬纊生望盡闔棺世業埋事痛存人心恨結亡者懷祖葬既云及壙􅎬亦已開室族内外哭親疎同共哀外姻逺近至名列通夜臺扶輿出殯宫低囘戀庭室天地有盡期我去無還日居者今已盡人事從此畢火歇烟既沒形消聲亦滅鬼神來依我生人永辭訣大暮杳悠悠長夜無時節鬱湮重冥下煩寃難具説安寢委沈寞戀戀念平生事業有餘結刊述未及成資儲無擔石兒女皆孩嬰一朝放捨去萬恨纒我情追憶世上事束教已自拘明發靡怡愈夕歸多憂虞轍閒晨徑荒撤宴式酒濡知今暝日苦恨失爾時娛遙遙逺民居獨埋深壤中墓前人跡滅冢上草日豐空林響鳴蜩髙松結悲風長寐無覺期誰知逝者窮生存處交廣連榻舒華茵已沒亦何苦楛哉不容身昔日平居時晨夕對六親今日掩奈何一見無諧因禮席有降殺三齡速過隙凡筵就收撤室宇改疇昔行女遊歸途仕子復王役家世本平常獨有亡者劇時祀望歸來四節靜塋丘孝子撫墳號父兮知來不欲還心依戀欲見絶無由煩寃荒隴側肝心盡崩抽侍宴覆舟山二首勑為柳元景作息雨清上郊開雲照中縣遊軒越丹居暉燭集涼殿凌髙躋飛楹追焱起流宴􅀈苑含靈羣嵓庭藏物變明暉爍神都麗氣冠華甸目逺幽情周醴洽深恩遍又繁霜飛玉闥愛景麗皇州清蹕戒馳路羽蓋佇宣遊神居既崇盛嵓嶮信環周禮俗陶徳聲昌會溢民謳慙無勝化質謬從雲雨浮一作遊登廬山二首懸裝亂水區薄旅次山楹千岩盛阻積萬壑}
