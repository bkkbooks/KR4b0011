  - {type: variant, offset: 27, length: 1, content: 銘, WYG: 迴縈巃嵸髙昔貌紛純襲前名洞澗窺地脈聳樹隱天經松磴上迷密雲竇下縱横隂冰實夏結炎樹信冬榮嘈􅓐晨鵾思呌嘯夜猨清深崖伏化迹穹岫閟長靈乘此樂山性重以逺遊情方躋羽人途永與煙霧井又藝文類聚作登廬山望石門訪世失隱淪從山異靈士明發振雲冠升嶠逺棲趾髙岑隔半天長崖斷千里氛霧承星辰潭壑洞江汜嶄絶類虎牙巑岏象熊耳埋冰或百年韜樹必千祀雞鳴清澗中猨笑白雲裏瑤波逐宂開霞石觸峯起迴互非一形參差悉相似傾聴鳳管賔􅛻望釣龍子松桂盈膝前如何穢城市發長松遇雪土牛既送寒奠陵一作冥陸方浹馳振風搖地局封雪滿空枝江渠合為陸天野浩無涯飲泉凍馬骨斵冰傷役疲昆明豈不慘黍谷寧可吹蒜山被始興王命作暮冬霜朔嚴地閉泉不流𤣥武藏水隂丹鳥一作烏還養羞勞農澤既周役車時亦休髙薄符一作浮好蒨一作清藻駕及時遊鹿苑豈淹睇兔園不足留升嶠眺日軏臨迥望滄洲雲生玉堂裏風靡銀臺陬陂石類星懸嶼木似烟浮形勝信天府珍寳麗皇州白日迴清景芳艷洽歡柔參差出寒吹飉戾江上謳王徳愛文雅飛瀚灑鳴球美哉物會昌衣道服光猷冬至舟遷莊甚笑水流孔急歎景移風度改日至晷迴換眇眇負霜鶴皎皎帶霜鴈長河結瓓玕層冰如玉岸哀哀古老容慘顔愁歲晏催促時節過逼迫聚離散美人還未央鳴箏誰與彈蜀四賢詠司馬相如王褒嚴君平揚雄渤渚水浴鳬春山玉抵鵲皇漢方盛明羣龍滿階閣君平因世閑得還守寂寞閉簾注道徳門卦述天爵相如達生㫖能屯復能躍陵令無人事毫墨時灑落褒氣有逸倫雅繢信炳博如令聖納賢金璫易羈絡良遮神明遊豈伊覃思作𤣥經不期賞蟲篆憂散樂首路或參差投駕均逺托身表既非我生内任一作甚豐薄秋日示休上人枯桑葉易零疲客心易驚今兹亦何早已聞絡緯鳴迴風滅且起巻蓬息復征愴愴簟上寒悽悽帳裏清物色延暮思霜露逼朝榮臨堂觀秋草東西望楚城百物方蕭瑟坐歎從此生和王義興七夕宵月向掩扉夜霧方當白寒機思孀婦秋堂及征客匹命無單年偶影有雙夕暫交金石心須臾雲雨隔答休上人酒出野田稻菊生髙岡草味貌復何奇能令君傾倒玉椀徒自羞為君愧此秋金葢覆牙柈何為心獨愁附贈鮑侍郎釋恵休玳枝兮金英落葉兮紫莖不入君玉杯低彩還自榮想君不相艷酒上視塵生當令芳意重無使盛年傾和王䕶軍秋夕散漫秋雲逺蕭蕭露月寒驚飈西北起孤鴈夜往還開軒當户牖取琴試一彈停歌不能和終曲久辛酸金氣方勁殺隆陽㣲且單泉涸甘井竭節徙芳嵗殘生事各多少誰共知易難投章心藴結千里途輕紈願託孤老暇觴思暫開餐懐逺人哀樂生有端離㑹起無因去事難重念恍惚似如神屬期眇起逺後遇邈無辰馳風掃遙路輕蘿含夕塵思君成首疾欲息眉不伸春羈征人歎道遐去鄉愒路邇佳期每無從淮陽非尺咫春日起遊心勞情出徙倚岫逺雲烟綿谷屈泉靡迤風起花四散露濃條耀彩暄妍正在兹摧抑多嗟思嘶聲名邊堅豈我箱中紙染翰餉君琴新聲憶解子三日氣暄動思心柳青起春懷時艶憐花藥服净俛登臺提觴野中飲愛心煙未開露色染春草泉源潔冰苔泥泥濡露條嫋嫋承風栽鳬雛掇苦薺黄鳥銜櫻梅解衿欣景預臨流競覆杯美人竟何在浮心空自摧苦雨連隂積澆灌滂沱下霖亂沈雲日夕昏驟雨望朝旦蹊濘走獸稀林寒鳥飛宴宻霧㝠下溪聚雲屯髙岸野雀無所依羣雞聚空館川梁日已廣懷人邈渺漫徒酌相思酒空急促明彈三日遊南苑採蘋及華月追節逐芳雲騰蒨溢林疏麗日曄山文清潭圓翠會化薄縁綺紋合樽遽景斜折榮􅈔組芬嵗暮悲霜露迭濡潤草木互榮落日夜改運周今悲復如昨晝色苦沈隂白雪夜迴薄皦潔冒霜鴈飄揚出風鶴天寒多顔苦妍容逐丹壑絲罥千里心獨宿乏然諾歲暮美人還寒壺與誰酌園中秋散一作園中載散負疾固無豫晨衿悵已單氣交蓬門疎風數園草殘荒墟半晩色幽庭憐夕寒既悲月户清復切夜蟲酸流枕商聲苦騷殺年志闌臨歌不知調發興誰與歡儻結絃上情豈孤林下彈詠秋秋蘭徒晩緑流風漸不親飈我垂罳幕驚此梁上塵沈隂安可久風景將逐淪何由忽靈化暫見別離人秋夕慮涕擁心用夜黙發思機幽閨溢涼吹閑庭滿清暉紫蘭花已歇青梧葉方稀江上淒海戾漢曲驚朔霏髮斑悟壯晩物謝知歲微臨宵嗟獨對撫賞怨情違躊躇空明月惆悵徒深帷望水刷􅁂垂秋日登髙觀水長千澗無別源萬壑共一廣流駛巨石轉湍迴急沬上苕苕嶺岸高照照寒洲爽東歸難忖惻日逝誰與賞臨川憶古事目孱千載想河伯自矜大海若沈渺莽詠白雪白珪誠自白不如雪光妍工隨物動氣能逐勢方圓無妨玉顔媚不奪素繒鮮投心障苦節隱迹避榮年蘭焚石既斷何用恃芳堅鮑明逺集巻八欽定四庫全書鮑明逺集巻九宋鮑照撰為柳令謝驃騎表臣言伏承詔書加臣驃騎將軍餘如故顧循空薄屢墜成命仰當天寵伏抱慙灼臣素陋人本絶分望適野謝山川之志輟耕無鴻鵠之歎宦希卿部富期農牧夙當昌朝早值恩洽天綱紛横皇厯歸聖佐輪不殷良馬未汗功半下列爵超上賞奮迹騰光參駕龍服翰起雲飛拂翼虹路雖曩之脱駕拖紫衿擔丹轂方之微臣彼安足齒齊此而歸懼塵王度況遂頻煩重彰濫越伏願天徳曲成資始令終雨露之恵自華及殞特屈慈奬降申愚固則綢繆之施復踰造物不勝感躍惶駭之情謹拜表以聞解謁謝侍郎表臣照言臣孤門賤生操無烱迹鶉棲草澤情不及官不悟天明廣矚騰滯援沈觀光幽節聞道朝年榮多身限思非終報臣云云謝秣陵令表時為中書舍人臣照言即日被尚書召以臣為秣陵令臣負鍤下農執羈末皂情有局塗志無逺立遘命逢天得汙官牒不悟恩澤無窮謬當奬試用謝刀筆猥承宰職豈是闇懦所能克任今便抵召違離省闥係戀罔極不勝下情謹拜表以聞謝賜藥啟臣衛躬不謹養命無術情淪五難妙謝尤法飈落先傷衰痾早及遐撫近臨猥委存䘏􅠰同山嶽䝉靈藥之賜恵非河間謬仙使之屈恩逾脯糗恵重幃席荷對銜慙伏抱衿渥謝永安令解禁止啟臣田茅下第質非謝品志終四民希絶三仕邀世逢辰謬及推擇恩成曲積榮秩兼過雖誓投纖生昊天罔極迄無犬馬孤慙星歲加以淪節雪飈沈誠欵晦值天先燭幽神照廣察澡疊從宥與物更稟遂晞曬陽春湔汰秋水綴翼雲條葺鮮決沼洗膽明目抃手太平重甄再造含氣孰比不悟乾陶彌運復垂埏飾驕迹升等改觀非服振纓珥筆聯承貴寵豈臣浮朽所可恭從實非愚瞢所宜循踐瑣族易灰脆漏已迫空荷載燾終責仰復飲冰肅事懷火畢命不勝屏營之情謹啟事以聞論國制啟臣啟臣聞尺之量錦工者裁之柔丈之木繩墨在焉事無巨細非法不行當今世問政睦藩國相望君舉必書動成准式息躬聖壤十有餘載條制節文宜其備矣諸王列封動靜兼該而竊見國之處事未盡善臣之暗蔽私心有惜伏見彭城國舊制猶有數巻雖多殊革大綱可依愚謂宜令掌故刊而撰之上著朝典藩邦之度下揆國訓繁簡之誼傍酌州府寛猛之中章程久具永為恒制豈伊今美乃足貴之將來臣忝充直員脱以啟聞煩而非要伏追慙悚謹啟謝上除啟臣言被宣賜臣上除臣伏事日淺䝉荷已豐天澤所及且喜且懼但臣自丁常梪來塗階級非所敢冀今日榮願直爾不少冒乞停止上除伏願重許干穢悚息通世子自解僕以常梪無用於世遭逢謬幸被受恩榮誠願論畢久宜捐落仁眷篤終復獲淹停感今惟昔銜佩無已但自無堪尸素累載腹心之愧寤寐為憂今請解所職願䝉矜許自奉清塵于兹六祀墜辰永往遺恩在心執紙哽咽言不自宣重與世子啟奉還誨深承殷勤篤眷之重披讀未終悲愧交集僕以常人所䝉隆厚久應知退非適今日銜恩戀徳用缺進心今者之請必願鑑許且僕棲遲無事咫尺館第餐稟風微非旦則夕居職還私兩者無異而於僕無用有以自處豈非仁念始終之恵重致于日彌深慙感謝假啟二首臣啟臣居家之治上漏下濕暑雨將降有懼崩壓比欲完葺私寡功力板插綯塗必須躬役冒欲請假三十日伏願天恩賜垂矜許千啟復追悚息謹啟臣啟臣所患彌留病顧沈涸自近䝉歸頻更頓處日夜間困或數四委然一弊瞻景待化加以凶衰嬰遘慘􅀈終鮮兄弟仲由所哀臣實百罹孤苦風雨天倫同氣實惟一妹存沒永訣不獲計見封􅙁泉壌臨送私懐感恨情痛兼深臣母年老經離憂傷服麄食淡羸枆增疾心計焦迫進退罔躓冒乞申假百日伏願天慈賜垂矜許臣違福履身事屯悴歎息和景掩淚春風執啟涕結伏追惶悚謹啟侍郎上疏臣言臣北州衰淪身地孤賤衆善必達百行無一生丁昌運自北人曹操乏端槩業謝成迹徂年空往瑣心靡述禠轡投簪於斯終志束菜負薪期與相畢安此定命忝彼公朝不悟乾羅廣收圓明兼覽雕瓠飾笙備雲和之品潢汗流藻充金鼎之實鎩羽暴鮮復見翻躍枯楊寒炭遂起烟華未識微躬猥能及此未知陋生何以為報祗奉恩命憂愧増灼不勝感荷屏營之情謹詣閣拜疏以聞謝解禁止臣言被宣令解臣禁止天光鄭重不可勝逢飛走知感矧臣人類臣聞獲過于神或憑尸祝以請得罪於君可因左右而謝臣自惟孤賤盜幸榮級闇澁大誼猖狂世禮奇非阮籍無保持之助才愧馮衍有􅀈􅀈之困自非聖朝超然覽臣於視聴之外則今日渥澤更成妄遭來辰萎葉終先朝草小人歲暮知能何報徒厚恩華憂懼歎息不任下情謹詣拜疏以聞侍郎滿辭閤臣言臣所居職限滿今便收迹金閨雲路從兹自逺鮪􅀈沉藏方絶光景祗戀遲迴結涕濡泗臣囂机窮賤情嗜踳昧身弱涓甃地幽井谷本應守業墾疁剿芿牧雞圏豕以給征賦而幼性猖狂因頑慕勇釋擔受書廢耕學文畫虎既敗學步無成反抽歸跂還陋燕雀日晏途逺塊然自喪加以無良根孤伎薄既同馮衍負困之累復抱相如痟渴之疾志逐軍離事與襄合東馬埋輪絶游息世宿福餘慶爰遘聖明煦蒸霜霰莩申雲落得從下走叨迹人行操勒負羇班榮扈𨽻矜愚訓短哀有弗及奉此而歸足以沒齒雖摩肌髪無報天徳更冀營魂還能結草不勝感戀之情謹詣闕拜疏奉辭以聞轉常侍上疏臣言即日被中曹板轉臣為左常侍臣自惟常人觸事無可謬被拔擢實為光榮臣既無髣髴上報殊絶之恩有分每豐其過前後輕重輒得原恕奬以君子之方赦其不閑教訓大愆不責矜澤必加是臣所以夙夜自念知遭遇之至深至厚也未冀未望便荷今榮欣喜感悦不敢偽讓庶保終始身命為初不勝下情謹拜疏謝以聞征北世子誕育上疏臣等言臣聞本枝無疆布諸前典衆多彌貴信之華封故徳積則慶深業昌則祚廣伏承王子以中氣正月鍾靈納和誕躬紫閣膺祚朱紱弧矢夙陳珪璋攸覿雲光麗輝巖澤昭采嘉祥爰孚柔顔載睟凡在氓隷莫不忭悦臣霑恩踰物慶倍自中不勝謝隨恩被原表臣言即日被曹宣命元統内外五刑以下浩澤盪汰臣亦預焉得從漢律故謬之辨闇遭周典肆眚之科大喜卒至非願所圖魚愕雞睨且悚且慙臣誠下愚不達義方然君尊臣泰豈同犬馬且常侍臣淵穆疏草即臣所作助人為恭猶加敬憶自已率禮寧敢慢忘由臣悴賤可悔可誣殺曾參人臣豈無過寢病幽棲無援朝列身孤節卑易成論硋幸大明臨下仁道毓物澤泊翾走臣覃末慶然古人有言楊者易生之木也一人植之十人拔之無生楊矣何則植之者難拔之者易況臣一植之功不立衆拔之過屢至同彼風霜異此貞脆書稱天秩有禮易載神福在謙臣之謙禮理謝福秩仰銜俯媿行歎坐戚即欲顛沛拜恩下庭但臣病久柴羸不堪冒涉小得趨馳星駕登路不勝荷佩之誠謹上疏以聞皇孫誕育上疏兼郎中令侍郎臣等言伏承東儲積慶皇孫誕育國啟昌期民迎福運臺禁稱祉井廬相賀伏惟聖懷載深鴻悆不任下情謹詣閣上疏以聞登大雷岸與妹書吾自發寒雨全行日少加秋潦浩汗山溪猥至渡沂無邊險徑遊棧石星飯結荷衣水宿旅客貧辛波路壯闊始以今日食時僅及大雷塗登千里日踰十晨嚴風慘節悲風斷肌去親為客如何如何向因涉頓憑觀川陸遨神清渚流涕方曛東顧三洲之隔西眺九泒之分窺地門之絶景望天際之孤雲長圖大念隱心者久矣南則積山萬狀爭氣負髙含霞飲景參差代雄凌跨長隴前後相屬帶天有匝横地無窮東則砥原逺隰亡端靡際寒蓬夕巻古樹雲平旋風匹起思鳥羣歸靜聴無聞極視不見北則陂池濳演湖脈通連苧蒿攸積菰蘆所繁栖波之鳥水化之蟲智吞禺疆捕八號噪驚䀨紛平其中西則回江永指長波天合滔滔何窮漫漫安竭創古迄今舳艫相接思盡波濤悲滿潭壑煙歸八表終為野塵而是注集長寫不測修靈浩盪知其何故哉西南望廬山又特驚異基壓江湖峯與辰漢連接上常積雲霞雕錦褥若華夕曜巖澤氣通傳明散綵赫似絳天左右青靄表裏紫霄從嶺而上氣甚金光半山純以下為黛色信可以神居帝郊鎮控湘漢者也若衆洞所積溪壑所射鼓怒之所豗撃湧澓之所宕滌則上窮荻浦下至狶洲南薄燕}
