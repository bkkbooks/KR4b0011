  - {type: variant, offset: 15, length: 0, content: '', WYG: 開土膏泉動游塵曝日鳴雉依隴主人拂黄􅃣拭藜杖布􅂼種平圻壤通畔修直膏畆夷敞白莖紫蒂豚耳鴨掌溝東陌西行三畦兩旣區旣鉏乃露乃暵勾萌欲伸藂牙將散爾乃晨露夕隂霏雲四委沉雷逺震飛雨輕灑徐未及晞疾而不靡柔莩爰秀剛甲以解稚葉萍布弱隂競抽萋萋翼翼沃沃油油下葳蕤而被逕上參差而覆疇承朝陽之麗景得傾柯之所投仕非魯相有不㧞之利賔非二仲無逸馬之憂顧堇荼而莫偶豈蘋藻之薦羞若乃鄰老談稼女嫗歸桑拂此葦席炊彼穄粱甃壺援醢曲瓢巻漿乃羮乃瀹堆鼎盈筐甘㫖蒨脆柔滑芬芳消淋逐水潤胃調腸於是旣飫徹盤投筯回小人之腹為君子之慮近觀物運逺訪師聖聲數後彰律理前定烏非黔黒鶴豈浴淨彼圎行而方止固得之於天性伊冬􅝍而夏裘無雙功而並盛盪然任心樂道安命春風夕來秋日一作秋月晨映獨酌南軒擁琴孤聽篇章間作以歌以詠魚深沉而鳥髙飛孰知羙色之為正鮑明逺集巻二欽定四庫全書鮑明逺集巻三宋鮑照撰代東武吟主人且勿諠賤子歌一言僕本寒鄉士出身蒙漢恩始隨張校尉召募到河源後逐李輕車追虜出塞垣密塗亘萬里寜歲猶七奔肌力盡鞍甲心思歴凉温將軍旣下世部曲亦罕存時事一朝異孤績績一作憤誰復論少壯辭家去窮老還入門腰鎌刈葵藿倚杖牧鷄豚昔如鞲上鷹今似檻中猿徒結千載恨空負百年怨棄席思君幄疲馬戀君軒願垂晉主恵不愧田子魂代出自薊北門行羽檄起邊亭烽火入咸陽徵師屯廣武分兵救朔方嚴秋筋竿勁虜陣精且彊天子按劒怒使者遥相望鴈行縁石徑魚貫渡飛梁簫皷流漢思旌甲被胡霜疾風衝塞起沙礫自飄揚馬毛縮如蝟角弓不可張時危見臣節世亂識忠良投軀報明主身死為國殤代結客少年場行騘馬金絡頭錦帶佩吳鈎失意杯酒間白刃起相讎追兵一旦至負劒逺行遊去鄉三十載復得還舊丘昇髙臨四關表裏望皇州九塗平若水雙闕似雲浮扶宫羅將相夾道列王矦日中市朝滿車馬若川流撃鍾陳鼎食方駕自相求今我獨何為埳􅇄懐百憂代東門行傷禽惡弦驚一作驚弦倦客惡離聲離聲斷客情賔御皆涕零涕零心斷絶將去復還訣一息不相知何况異鄉别遥遥征駕逺杳杳白日晩居人掩閨臥行子夜中飯野風吹秋木行子心腸斷食梅常苦酸衣葛常苦寒絲竹徒滿坐憂人不解顔長歌欲自慰彌起長恨端代苦熱行赤坂横西阻火山赫南威身熱頭且痛鳥墜魂來歸湯泉發雲潭焦}
