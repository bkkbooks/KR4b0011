  - {type: variant, offset: 17, length: 1, content: 銘, WYG: 奕奕朱軒馳紛紛縞衣流日氛映山浦暄霧逐風収花木亂平原桑柘盈一作緜平疇攀條弄紫莖藉露折芳柔遇物雖成趣念者不解憂且共傾春酒長歌登山丘代朗月行朗月出東山照我綺窓前窓中多佳人被服妖且妍靚粧坐帳裏當户弄清弦鬢奪衛女迅體絶飛燕先為君歌一曲當作朗月篇酒至顔自解聲和心亦宣千金何足重所存意氣間代堂上歌行四坐且莫諠聽我堂上歌昔仕京洛時髙門臨長河出入重宫裏結友曹與何車馬相馳逐賔朋好容華陽春孟春月朝光散流霞輕歩逐芳風言笑弄丹葩暉暉朱顔酡紛紛織女梭滿堂皆羙人目成對湘娥雖謝侍君閒明粧帶綺羅箏笛更彈吹髙唱好相和萬曲不闗心一曲動情多欲知情厚薄更聽此聲過代貧賤愁苦行湮沒雖死悲貧苦卽生劇長歎至天曉愁苦窮日夕盛顔當少歇鬢髪先老白親友四靣絶朋知斷三益空庭慙樹萱藥餌媿過客貧年忘日時黯顔就人惜俄頃不相酬恧怩靣巳赤或以一金恨便成百年隙心為千條計事未見一獲運圯津塗塞遂轉死溝洫以此窮百年不知還窀穸代邊居行少年逺亰一作荆陽遥遥萬里方陋巷絶人徑茅屋摧山崗不覩車馬迹但見麋鹿場長松何落落丘隴無復行邊地無髙木蕭蕭多白楊盛年日月盡一去萬恨長悠悠世中人爭此錐刀忙不憶貧賤時富貴輒相忘紛紛徒滿目何闗慨予傷不如一畆中髙㑹挹清漿遇樂便作樂莫使候朝光代門有車馬客行門有車馬客問客何鄉士捷歩往相訊果得舊隣里悽悽聲中情慊慊増下理一作俚語昔有故悲論今無新喜清晨相訪慰日暮不能巳歡戚競尋緒談調何終止辭端竟未究忽唱分途始前悲尚未弭後感方復起嘶聲盈我口談言在君耳手迹可傳心願爾駕一作篤行李代悲哉行羇人感淑莭縁感欲回轍我行詎幾時華實驟舒結覩實情有悲瞻華意無恱覽物懷同志如何復乖别翩翩翔禽羅關關鳴鳥列翔鳴尚疇偶所歡獨乖絶代櫂歌行羇客離嬰時飄颻無定所昔秋寓江介兹春客河滸徃戢于役身願言永懷楚泠泠鯈躍潭邕邕鴈循渚飂戾長風振揺曵髙㠶舉驚波無留連舟人不躊竚代邽街行一夲作去邪行竚立出門衢遥望轉蓬飛蓬去舊根在連翩逝不歸念我捨鄉俗親好乆乖違慷慨懷長想惆悵戀音徽人生隨時變遷化焉可祈百年難必果千慮易盈虧代陳思王白馬篇白馬騂角弓鳴鞭乗北風要途問邊急雜虜入雲中閉壁自徃夏清野徑還冬僑裝多闕絶旅服少裁縫埋身守漢節沉命對胡封薄暮塞雲起飛沙披逺松含悲望兩都楚歌登四墉丈夫設計誤懷恨逐邊戎罷别中國愛邀冀胡馬功去來今何道卑賤生所鍾但令塞上兒知我獨為雄代陳思王京洛篇鳯樓十二重四户八綺窻繡桷金蓮花桂柱玊盤龍珠簾無隔露羅愰不勝風寳帳三千所為爾一朝容揚芬紫煙上垂綵緑雲中春吹回白日霜歌落塞鴻但懼秋塵起盛愛逐衰蓬坐視靑苔滿臥對錦筵空琴瑟縱横散舞衣不復縫古來共歇薄君意豈獨濃唯見雙黄鵠千里一相從代陸平原君子有所思行西上登雀臺東下望雲闕層閣肅天居馳道直如髪繡甍結飛霞璇題納行月築山擬蓬壼穿池類溟渤選色遍齊岱徴聲匝卭越陳鍾陪夕讌笙歌待明發年貌不可還身意㑹盈歇蟻壤漏山阿絲涙毁金骨器惡含滿欹物忌厚生没智哉衆多士服理辨昭昧代白紵曲二首朱唇動素袖舉洛陽少童一作年邯鄲女古稱緑水今白紵催絃急管為君舞窮秋九月荷葉黄北風驅雁天雨霜夜長酒多樂未央春風澹蕩俠思多天色淨渌氣妍和含桃紅蕚蘭紫芽朝日灼爍發園華巻幌結帷羅玊筵齊謳秦吹盧女絃千金顧笑買芳年代白紵舞歌詞四首奉始興三神作并啟侍郎臣鮑照啟被教作白紵舞歌詞謹竭庸陋裁為四曲附啟上呈識方淟悴思塗猥局言既無雅聲未能文不足以宣贊聖㫖抽抜妙實謹遣簡餘慙隨悚盈謹啟詞吳刀楚製為佩褘纎羅霧縠垂羽衣含商咀徴歌露晞珠履颯沓紈紬飛淒風夏起素雲回車怠馬煩客忘歸蘭膏明燭承夜暉桂宫栢寢擬天居朱爵文窻韜碧䟽象牀瑤席鎮犀渠雕屏合匝組帷一作帳舒秦箏趙瑟挾笙竿垂璫散佩盈玊除停觴不御欲誰須三星參差露霑濕絃悲管清月將入寒光蕭條候蟲急荆王流歎楚妃泣紅顔難長時易戢凝華結綵久延立非君之故豈安集池中赤鯉庖所捐琴髙乗去飛上天命逢福世丁溢恩簪金藉綺昇曲筵恩厚徳深委如山潔誠洗志期暮年烏白馬角寜足言鮑明逺集巻三欽定四庫全書鮑明逺集巻四宋鮑照撰擬古八首魯客事楚王懷金襲丹素既荷主人恩又䝉令尹顧日宴罷朝歸輿馬塞衢路宗黨生光輝賓僕逺傾慕富貴人所欲道得亦何懼南國有儒生迷方獨淪誤伐木清江湄設罝守毚兎十五諷詩書篇翰靡不通弱冠參多士飛步游秦宫一作紫宫側觀君子論預見古人風兩説窮舌端五車摧筆鋒羞當白璧貺耻受聊城功晩節從世務乗障逺和戎解佩襲犀渠巻袠奉盧弓始願力不及安知今所終幽并重騎射少年好馳逐氊帶佩雙鞬象弧挿彫服獸肥春草短飛空越平陸朝逰雁門上暮還樓煩宿石梁有餘勁驚雀無全目漢虜方未和邊城屢飜覆留我一白羽將以分符竹鑿井北陵隈百丈不及泉生事本瀾漫何用獨精堅幼壯重寸隂衰暮及經年放鷹息朝歌提爵止山田日夕登城隅周廻視洛川街衢積凍草城郭宿寒煙繁華悉何在宫闕久崩填空謗齊景非徒稱夷叔賢伊昔不治業倦逰觀五都海岱饒壯士䝉泗多宿儒結髪起躍馬垂白對講書呼我升上席陳觶發瓢壺管仲死巳久墓在西北隅後面崔嵬者桓公舊塜廬君來誠既晩不覩崇明初玉琬徒見傳交友義漸踈束薪幽篁裏刈黍寒澗隂朔風傷我肌號鳥驚思心嵗暮井賦訖程課相追尋田租送函谷獸藁輸上林河渭冰未開關隴雪正深笞撃官有罰呵辱吏見侵不謂乗軒意伏􅌴還至今河畔草未黄朔鴈已矯翼秋蛩扶户吟寒婦成夜織去嵗征人還流傳舊相識聞君上隴時東望久歎息宿昔改衣帶朝旦異容色念此憂如何夜長愁更多明鏡塵匣中寳琴生網羅蜀漢多竒山仰望與雲平隂崖積夏雪陽谷散秋螢朝朝見雲歸夜夜聞猿鳴憂人本自悲孤客易傷情臨堂設樽酒留酌思平生石以堅為性君勿慙一作輕素誠擬靑靑陵上栢涓涓亂江泉綿綿横海煙浮生旅昭世空事歎華年書翰幸閒暇我酌子縈絃飛鑣出荆路騖服指秦川渭濱富皇居鱗館匝河山輿童唱乘椒櫂女歌采蓮孚愉鸞閣上窈窕鳯楹前娛生信非謬安用求多賢學劉公幹體五首欲宦乏王事結主逺恩私為身不為名散書徒滿帷連冰上冬月披雪拾園葵聖靈燭區外小臣良見遺曀曀寒野霧蒼蒼隂山栢樹逈霧縈集山寒野風急嵗物盡淪傷孤貞為誰立賴樹自能貞不計迹幽澁胡風吹朔雪千里渡龍山集君瑤臺上飛舞兩楹前兹晨自為美當避艷陽天艷陽桃李節皎潔不成妍荷生渌泉中碧葉齊如規廻風蕩流霧珠水逐條垂彪炳此金塘藻耀君王池不愁世賞絶但畏盛明移白日正中時天下共明光北園有細草當晝正含霜乖榮頓如此何用獨芬芳抽琴為爾歌絃斷不成章擬阮公夜中不能寐漏分不能臥酌酒亂繁憂恵氣􅑀夜清素景縁隟流鳴鶴時一聞千里絶無儔佇立為誰久寂寞空自愁學陶彭澤體奉和王義典長憂非生意短願不須多但使尊酒滿朋舊數相過秋風七八月清露潤綺羅提琴當户坐歎息望天河保此無傾動寜復滯風波紹古辭七首橘生湘水側菲陋人莫傳逢君金華宴得在玊几前三川窮名利京洛富妖妍恩榮難久恃隆寵易衰偏觀席妾悽愴覩翰君泫然徒抱忠孝志猶為葑菲遷昔與君别時蠶妾初獻絲何言年月駛寒衣已𢷬治縧繡多廢亂篇帛久塵緇離心壯為劇飛念如懸旗石席我不爽徳音君勿欺瑟瑟凉海風竦竦寒山木紛紛羇思盈慊慊夜弦促訪言山海路千里歌别鶴絃絶空咨嗟形音誰賞録辛苦異人狀美貌改如玉徒畜巧言鳥不解心欵曲孤鴻散江嶼連翩遵渚飛含嘶衡桂浦馳顧河朔畿攅攅勁秋木昭昭淨冬暉窻前滌歡爵帳裏縫舞衣芳嵗猶自可日夜望君歸􅑀楹翫夜月逈眺出谷雲還山路已逺往海不及羣徘徊清淮汭顧慕廣江濆物情乖喜歇守操古難聞三越豐少姿容態傾動君開黛覩容一作朝顔臨鏡訪遙塗君子事河源彌祀闕還書春風掃地起飛塵生綺䟽文袿為誰設羅帳空巻舒不怨身孤寂但念星隱隅暖嵗節物早萬萌迎春逹春風夜㛹娟春霧朝晻靄軟蘭葉可采柔桑條易捋怨咽對風景悶瞀守閨闥天賦愁民命含生但契闊憂來無行伍厯亂如覃葛幽蘭五首傾輝引暮色孤景㽞恩顔梅歇春欲罷期渡徃不還簾委蘭蕙露帳含桃李風攬帯昔何道坐令芳節終結佩徒分明抱梁輙乖忤華落知不終空愁坐相誤眇𦕈蛸掛網漠漠蠶弄絲空慙不自信怯與君畫期陳國鄭東門古今共所知長䄂暫徘徊駟馬停路岐學古一作北風雪北風十二月雪下如亂巾實是愁苦節惆悵憶一作别情親㑹得両少妾同是洛陽人嬛緜好眉目閑麗羙腰身凝膚皎若雪明凈色如神驕愛生盼矚聲媚起朱唇衿服雜緹繢首飾亂􅌦珍調絃俱起舞為我唱梁塵人生貴得意懷願待君申幸值嚴冬暮幽夜方未晨齊衾乆両設角枕巳䨇陳願君早休息㽞歌待三春鮑明逺集巻四欽定四庫全書鮑明逺集巻五宋鮑照撰潯陽還都道中昨夜宿南陵今旦入蘆洲客行惜日月崩波不可留侵星赴早路畢景逐前儔鱗鱗夕雲起獵獵晩風遒騰沙鬱黄霧飜浪揚白鷗登艫眺淮甸掩泣望荆流絶目盡平原時見逺煙浮倐忽坐還合俄思甚兼秋未嘗違户庭安能千里遊誰令乏古節貽此越鄉憂還都道中三首悦懌遂還心踊躍貪至勤鳴鷄戒征路暮息落日分急流騰飛沬囘風起江濆孤獸啼夜侣離鴻噪霜羣物衰心交横聲切思紛紜歎慨訴同旅美人無相聞風急訊灣浦裝高偃檣舳夕聴江上波逺極千里目寒律驚窮蹊爽氣起喬木隱隱日沒岫瑟瑟風發谷鳥還暮林諠潮上冰結洑夜分霜下淒悲端出遙陸愁來攢人懷羇心苦獨宿久宦迷逺川川廣每多懼薄止閭邊亭闗歴險程路霮䨴㝠隅岫濛昧江上霧時涼籟爭吹流洊浪奔趣一作注惻焉增愁起搔首東南顧茫然荒野中舉目皆凜素囘風揚江泌雅寒棲動樹太息終晨漏企我歸飊遇還都口號分壤蕃帝華列正藹皇宫禮讌及年暇朝奏因歲通維舟歇金景結棹俟昌風鉦歌首寒物歸吹踐開冬隂沈煙塞合蕭瑟涼海空馳霜急歸節幽雲慘天容旌鼓貫𤣥塗羽鷁被長江君王遲京國遊子思鄉邦恩世共渝洽身願兩扳逢勉哉河濟客勤爾尺波功還都至三山望石頭城泉源安首流川末澄逺波晨光被水族曉氣歇林阿兩江皎平迥三山鬱駢羅南帆望越嶠北榜指齊河闗扃繞天邑襟帶抱尊華長城非壑嶮峻岨似荆芽攢樓貫白日摛堞隱丹霞征夫喜觀國遊子遲見家流連入京引躑躅望鄉歌彌前歎景促逾近勌路多偕萃猶如兹𢎞易將謂何遇銅山掘黄精土肪閟中經水芝韜内䇿寳餌緩童年命藥駐衰厯矧蓄終古情重拾煙霧迹羊角棲斷雲榼口流隘石銅溪晝森沈乳竇夜涓滴既類風門磴復象天井壁蹀蹀寒葉離灇灇秋水積松色隨野深月露依草白空守江海思豈愧梁鄭客得仁古無怨順道今何惜日落望江贈荀丞旅人乏愉樂薄暮増思深日落嶺雲歸延頸望江隂亂流灇大壑長霧匝髙林林際無窮極雲邊不可尋惟見獨飛鳥千里一揚音推其感物情則知遊子心君居帝京内髙會日揮金豈念慕羣客咨嗟戀景沈行藥至城東橋雞鳴闗吏起伐鼓早通晨嚴車臨迥陌延瞰歴城闉蔓草縁髙隅修楊夾廣津迅風首旦發平路塞飛塵擾擾遊宦子營營市井人懷金近從利撫劍逺辭親爭先萬里塗各事百年身開芳及稚節含綵吝驚春尊賢永照灼孤賤長隱淪容華坐銷歇端為誰苦辛荅客幽居屬有念含意未連詞會客從外來問君何所思澄神自惆悵嘿慮久迴疑謂賔少安席方為子陳之我以蓽門士負學謝前基愛賞好偏越放縱少矜持專求遂性樂不計緝名期歡至獨斟酒憂來輙賦詩聲交一作交反稍希歇此意更堅滋浮生急馳電物道險弦絲深憂寡情謬進伏兩暌時願賜卜身要得免後賢嗤白雲探靈喜解骨測化善騰天情髙不戀俗厭世樂尋仙鍊金宿明館屑玉止瑤淵鳳歌出林闕龍駕戾蓬山凌崖采三露攀鴻戲五煙昭昭景臨霞湯湯風媚泉命娥雙月際要媛兩星間飛虹眺巻河汎霧弄輕絃笛聲謝廣賔神道不復傳一逐白雲去千齡猶未旋和王丞限生歸有窮長意一作憶無已年秋心日迥絶春思坐連綿銜協曠古願斟酌高代賢遯迹俱浮海採藥共還山夜聴横石波朝望宿巖煙明澗子㳂越飛蘿予縈牽性好必齊遂迹幽非妄傳滅志身世表藏名琴酒間秋夜二首夜久膏既竭啓明旦未央環情倦始復空閨起晨裝幸承天光轉曲影入幽堂徘徊集通隟宛轉燭迴梁帷風自巻舒簾露視成行歲役急窮晏生慮備溫涼絲紈夙染濯綿綿夜裁張冬雪旦夕至公子乏衣裳華心愛零落非直惜容光願君翦衆念且共覆前觴又遁跡避紛喧貨農棲寂寞荒徑馳野䑕空庭聚山雀既逺人世歡還賴泉卉樂折柳樊場圃負綆汲潭壑霽旦見雲峰風夜聞海鶴江介早寒來白露先秋落麻壟方結葉瓜田已掃籜傾暉忽西下迴景思華幕攀蘿席中軒臨觴不能酌終古自多恨幽悲共淪鑠觀圃人藝植善賈笑蠶漁巧宦賤農牧逺養遍闗市深利窮海陸乘軺實金羈當壚信珠服居無逸身伎安得坐粱肉徒承屬生幸政緩吏平睦春畦及耘藝秋場早芟築澤閲既繁髙山營又登熟抱鍤壠上飡結茅野中宿空識已尚淳寧知俗飜覆詠採桑季春梅始落工女事蠶作一本下有明鏡淨桂枝光顔畢苕萼二句採桑淇洧間還戲上宫閣早蒲時結隂晩篁初解籜藹藹霧灑閨融融景盈幕乳燕逐草蟲巢蜂拾花萼是節最暄妍佳服又新爍綿歎對迥塗揚歌弄場藿抽琴試抒思薦珮果成託承君郢中美服義久心諾衛風古愉艷鄭俗舊浮薄靈願悲渡湘宓賦笑瀍洛盛明難重來淵意為誰涸君其且調絃桂酒妾行酌詠雙燕二首雙燕戲雲崖羽翰始差池出入南閨裏經過北堂陲意欲巢君幕層楹不可窺沈吟芳歲晩徘徊韶景移悲歌辭舊愛銜淚覔新知可憐雲中燕旦去暮來歸自知羽翅弱不與鵠爭飛寄聲謝飛鵠往事子毛衣瑣心誠貧薄叵􅈔節榮衰隂山饒苦霧危節多勁威豈但避霜雪當一作復儆野人機發後渚江上氣早寒仲秋始霜雪從軍乏衣糧方冬與家別蕭條背鄉心悽愴清渚發涼埃晦平皋飛潮隱修樾孤光獨徘徊空煙視昇滅塗隨前峰逺意逐後雲結華志分馳年韶顔慘驚節推琴三起歎聲為君斷絶數詩一身仕闗西家族滿山東二年從車駕齋祭甘泉宫三朝國慶畢休沐還舊邦四牡輝長路輕蓋若飛鴻五矦相餞送髙會集新豐六樂陳廣坐祖帳揚春風七盤起長袖庭下列歌鐘八珍盈雕俎綺肴紛錯重九族共瞻遲賔友仰徽容十載學無就善宦一朝通建除建旗出燉煌西討屬國羌除去徒與騎戰車羅萬箱滿山又填谷投鞍合營牆平原亘千里旗鼓轉相望定舍後未休候騎勅前裝執㦸無暫頓彎弧不解張破滅西零國生虜郅支王危亂悉平蕩萬里置闗梁成軍入玉門士女獻壺漿收功在一時歴世荷餘光開壤襲朱紱左右佩金章閉帷草太𤣥兹事殆愚狂從過舊宫肅裝屬雲旅奉靷承末塗嚴恭履桑梓加敬覽枌榆靈命蘊川瀆帝寳伏篇圖虎變由石細龍翔自鼎湖功冠生民始道妙神器初宫陛留前一作皆制歌思溢今衢餘祥見雲物遺像存陶漁泉流信清泌原野實甘荼豈伊愛酆鄗天險兼上腴東秦邦北門非親誰克居仁聲日月懋恵澤雲雨敷盧令美何歇唐風久不渝微臣逢世慶征賦備人徒空費行葦徳採束謝生芻從拜陵登京峴孟冬十月交殺盛隂欲終風烈無勁草寒甚有凋松軍井冰晝結士馬氊夜重晨登峴山首霜雪凝未通息鞍循隴上支劔望雲峰表裏觀地嶮昇降究天容東嶽覆如礪瀛海安足窮傷哉良永矣馳光不再中衰賤謝逺願疲老還舊邦深徳竟何報徒令田陌空臨川王服竟還田里送舊禮有終事居慙懦薄税駕罷朝衣歸志願巢壑尋思邈無報退命愧天爵捨耨將十齡還得守場藿道經盈竹笥農書滿塵閣愴愴秋風生戚戚寒緯作豐霧粲草華髙月麗雲崿屏跡勤躬稼衰疾倚芝藥顧此謝人羣豈直止商洛鮑明逺集巻五欽定四庫全書鮑明逺集巻六宋鮑照撰行京口至竹里髙柯危且竦鋒石横復仄複澗隱松聲重崖伏雲色冰閉寒方壯風動鳥傾翼斯志逢凋嚴孤遊值曛逼兼塗無憇鞍半菽不遑食君子樹令名細人効命力不見長河水清濁俱不息登飜車峴髙山絶雲霓深谷斷無光晝夜淪霧雨冬夏結寒霜淖坂既馬嶺磧路又羊腸畏塗疑旅人忌轍覆行箱昇岑望原陸四眺極川梁遊子思故居離客遲新鄉新知有客慰追故遊子傷冬日嚴風亂山起白日欲還次曛霧蔽窮天夕隂晦寒地煙霾有氛氳清光無明異風急野田空饑禽稍相棄含生共通閉懷賢敦為利天規茍平圓寧得已偏媚寫海有歸潮衰容不還稚君今且安歌無念老方至詠史五都矜財雄三川養聲利百金不市死明經有髙位京城十二衢飛甍各鱗次仕子彯華纓遊客竦輕轡明星晨未晞軒蓋已雲至賔御紛颯沓鞍馬光照地寒暑在一時繁華及春媚君平獨寂寞身世兩相棄從庾中郎遊園山石室荒塗趣山楹雲崖隱靈一作虚室崗澗紛縈抱林障沓重密昬昬磴路深活活梁水疾幽隅秉晝燭地牖窺朝日怪石似龍章瑕璧麗錦質洞庭安可窮漏井終不溢沈空絶景聲崩危坐驚慄神化豈有方妙象竟無述至哉鍊玉人處此長自畢自礪山東望震澤瀾漫潭洞波合沓崿嶂雲漲島逺不測崗澗近難分幽篁愁暮見思鳥傷夕聞以此藉沈痾棲迹別人羣結言非盡書有念豈敷文登雲陽九里埭一作塜宿心不復歸流年抱衰疾既成雲雨人悲緒終不一徒憶江南聲空録齊后瑟方絶縈絃思豈見繞梁日與伍侍郎別民生如野鹿知愛不知命飲齕具攢聚翹陸歘驚迸傷我慕類心感爾食苹性漫漫鄢郢塗渺渺淮海逕子無金石質吾有犬馬病憂樂安可言離會孰能定欽哉慎所宜砥徳乃為盛貧游不可忘久交念敦敬呉興黄浦亭庾中郎別風起洲渚寒雲上日無輝連山眇烟霧長波迥難依旅鴈方南過浮客未西歸已經江海別復與親眷違奔景易有窮離袖安可揮懽觴為悲酌歌服成泣衣溫念終不渝藻志逺存追役人多牽滯顧路慙奮飛昧心附逺翰烱言藏佩韋送別王宣城發郢流楚思涉淇興衛情既逢青春獻復值白蘋生廣望周千里江郊藹微明舉爵自惆悵歌管為誰清潁隂騰前藻淮陽流昔聲樹道慕髙華屬路佇深馨送從弟道秀別參差生密念躑躅行思凝疑疑一作悲思戀光景密念盈一作彌歲時歲時多阻折光景乏安怡以此苦風情日夜驚懸旗登山臨朝日揚袂別所思浸淫旦潮廣瀾漫宿雲滋天隂懼先發路逺常早辭篇詩後相憶杯酒今無持游子苦行役冀會非逺期贈傅都曹別輕鴻戲江潭孤鴈集洲沚邂逅兩相親縁念共無已風雨好東西一隔頓萬里追憶栖宿時聲容滿心耳落日川渚寒愁雲繞天起短翮不能翔徘徊烟霧裏和傅大農與僚故別絶節無緩響傷鴈有哀音非同年歲意誰共別離心伊昔謬通塗冠屣預人林浮江望南嶽登潮窺海隂孰謂游居淺慕美久相深萋萋春草秀嚶嚶喜候禽辰物盡明茂尊盛獨幽沈之子安所適我方栖舊岑墜歡豈更接明愛邈難尋送盛侍郎餞候亭霑霜襲冠帶驅駕越城闉北臨出塞道南望入鄉津高墉宿寒霧平野起秋塵君為坐堂子我乃負羇人欣悲豈等志甘苦誠異身結睇園中草憔悴悲此春與荀中書别勞舟厭長浪疲斾倦行風連翩感孤志契濶傷賤躬親交篤離愛眷戀置酒終敷文勉征念發藻慰愁容思君吟涉淆撫已謡渡江慙無黄鶴翅安得久相從願遂宿知意不使舊山空喜雨奉勑作營社達羣隂屯雲揜積陽河井起龍蒸日魄斂遊光族雲飛泉室震風沈羽鄉升雰浹地維傾潤㵼天潢平灑周海嶽曲潦溢川莊驚雷鳴桂渚迴涓流玉堂珍木抽翠條炎卉擢朱芳闗市欣九賦京廩開萬箱無謝堯為君何用知柏篁詠蕭史蕭史愛少年嬴女􅈔童顔火粒願排棄霞霧好登攀龍飛送天路鳳起出秦闗身去長不返簫聲時往還贈故人馬子喬六首躑躅城上羊攀隅食𤣥草俱共日月輝昬明獨何早夕風飄野籜飛塵被長道親愛難重見懷憂坐空老其二寒灰滅更燃夕華晨更鮮春冰雖暫解冬水復還堅佳人捨我去賞愛長絶縁歡至不留日感物輒傷年其三松生隴坂上百尺下無枝東南望河尾西北隱崑崖野風振山籟朋鳥夜驚離悲涼貫年節䓗翠恒若斯安得草木心不怨寒暑移其四種橘南池上種杏北池中池北既少露池南又多風早寒逼晩歲衰恨滿秋容湘濵有靈鳥其字曰鳴鴻一挹繒繳痛長別逺無雙其五皎如川上鵠赫似握中丹宿心誰不欺明白古所難憑楹觀皓露灑酒盪憂顔永念平生意窮光不忍還淹留徒攀桂延佇空結蘭其六雙劍將離别先在匣中鳴煙雨交將夕從此忽分形雌沈呉江裏雄飛入楚城呉江深無底楚闕有崇扃一為天地別豈直限幽明神物終不隔千祀儻還并鮑明逺集巻六欽定四庫全書鮑明逺集巻七宋鮑照撰見賣玉器者}
