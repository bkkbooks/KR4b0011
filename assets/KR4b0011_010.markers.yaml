  - {type: variant, offset: 16, length: 0, content: '', WYG: 起石圻一作磯日月有恒昬雨露未嘗晞丹蛇踰百尺𤣥蜂盈十圍含沙射流影吹蠱病行暉瘴氣晝薫體菵露夜霑衣饑猨莫下食晨禽不敢飛毒涇尚多死渡瀘寜具腓生軀蹈死地昌志登禍機戈船榮旣薄伏波賞亦微爵輕君尚惜士重安可希代白頭吟直如朱絲繩清如玉壺冰何慙宿昔意猜恨坐相仍人情賤恩舊世議逐衰興毫髪一為瑕丘山不可勝食苗實碩䑕㸃一作玷白信蒼蠅鳬鵠逺成美薪芻前見陵申黜褒女進班去趙姬昇周王日淪惑漢帝益嗟稱心賞猶難恃貌恭豈易慿古來共如此非君獨撫膺代蒿里行同盡無貴賤殊願有窮申馳波催永夜零露逼短晨結我幽山駕去此滿堂親虗容遺劒佩實貌戢衣巾斗酒安可酌尺書誰復陳年代稍推逺懷抱日幽淪人生良自劇天道與何人齎我長恨意歸為狐兎塵代放歌行蓼蟲避葵堇習苦不言非小人自齷齪安知曠士懷鷄鳴洛城裏禁門平旦開􅃣蓋縱横至車騎四方來素帶曵長飇華纓結逺埃日中安能止鍾鳴猶未歸夷世不可逢賢君信愛才明慮自天斷不受外嫌猜一言分珪爵片善辭草萊豈伊白璧賜將起黄金臺今君有何疾臨路獨遲廻代昇天行家世宅闗輔勝帶宦王城僃聞十帝事委曲兩都情倦見物興衰驟覩俗屯平翩翻若回掌恍惚似朝榮窮途悔短計晩志重長生從師入逺嶽結友事仙靈五圖發金記九籥隱丹經風餐委松宿雲臥恣天行冠霞登綵閣解玉飲椒庭蹔遊越萬里少别數千齡鳳臺無還駕簫管有遺聲何時與汝曹啄腐共吞腥代别鶴操雙鶴俱起時徘徊滄海間長弄若天漢輕軀似雲懸幽客時結侶提擕逰三山青繳凌瑤䑓丹羅籠紫煙海上悲風急三山多雲霧散亂一相失驚孤不得住􅃡然日月馳逺矣絶音儀有願而不遂無怨以生離鹿鳴隱深草蟬鳴隠髙枝心自有所存旁人那得知代雉朝飛雉朝飛振羽翼専場挾兩一本下有雌字恃彊力媒巳驚翳又逼蒿間濳彀盧矢直刎繡頸碎錦臆絶命君前無怨色握君手執杯酒意氣相傾死何有代淮南王淮南王好長生服食練氣讀仙經琉璃作椀牙作盤金鼎玊匕合神丹合神丹戲紫房紫房綵女弄明璫鸞歌鳳舞斷君腸朱城九門門九閨􅂅逐明月入君懷入君懷結君佩怨君恨君恃君愛築城思堅劒思利同盛同衰莫相棄代空城雀雀乳四鷇空城之阿朝食野粟夕飲冰河髙飛畏鴟鳶下飛畏網羅辛傷伊何言怵迫良巳多誠不及青鳥逺食玊山禾猶勝吳宫鷰無罪得焚窠賦命有厚薄長歎欲如何代鳴鴈行邕邕鳴鴈鳴始旦齊行命侶入雲漢中夜相失羣離亂留連徘徊不忍散憔悴容儀君不知辛苦風霜亦何為代夜坐吟冬夜沉沉夜坐吟含聲未發巳知心霜入幕風度林朱燈滅朱顔尋體君歌逐君音不貴聲貴意深代北風涼行北風涼雨雪雱京洛女兒多妍粧遥豔帷中自悲傷沉吟不語若有忘問君得行何當歸苦使妾坐自傷悲慮年至慮顔衰情易逺恨難追代春日行獻歲發吾將行春山茂春日明園中鳥多嘉聲梅始發桃始青汎舟艫齊櫂驚奏採菱歌鹿鳴風微起波微生弦亦發酒亦傾入蓮池折桂枝芳䄂動芬葉披兩相思兩不知代少年時至衰老行憶昔少年時馳逐好名晨結友多貴門出入富兒隣綺羅艶華風車馬自揚塵歌唱青琴女彈筝燕趙人好酒多芳氣餚味厭時新今日每相念此事邈無因寄語後生子作樂當及春代陽春登荆山行荆一作京旦登荆山頭﨑嶇道難㳺早行犯霜露苔滑不可留極眺入雲表窮目盡帝州方都列萬室層城帶髙}
