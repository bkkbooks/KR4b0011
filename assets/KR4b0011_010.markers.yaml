  - {type: variant, offset: 11, length: 1, content: 佛, WYG: 有獻野鵝於臨川王世子愍其樊縶命為之賦其辭曰集陳之隼以自逺而稱神栖漢之雀乃出幽而見珍此璅禽其何取亦厠景而承仁捨水澤之驩逸對鍾鼓之悲辛豈狥利而輕命將感愛而投身入長羅之逼脅悵髙繳之樊縈邈辭朋而别偶超煙騖而風行跨日月以遥逝忽瞻國而望城踐菲迹於瑶塗昇弱羽於丹庭瞰東西之繡戸眺左右之金扄貌纎殺而含一作悆悴心翻越而慙驚若墜而墮谷怳不知其所寜惟君囿之珍麗實妙物之所殷翔海澤之輕鷗巢天宿之鳴鶉鶡程材於梟猛翬薦體之雕文旣敷容以照景亦避翮而排雲雖居物以成偶終在我以非羣望征雲而延悼顧委翼而自傷無青雀之衘命乏赤鴈之嘉祥空穢君之園池徒慙君之稻粱願引身而剪迹抱末志而幽蔵於是流歲遂逺慘節方崇雲纒海岱風拂崤潼飛雲一作雰馳霰飄沙舞蓬視清池之初涸望綠林之始空立菰蒲之寒渚託隻}
  - {type: page-break, offset: 11, content: '', id: KR4b0011_WYG_002-4a, image: WYG1063/WYG1063-0569c.png}
  - {type: page-break, offset: 11, content: '', id: KR4b0011_WYG_002-4b, image: WYG1063/WYG1063-0569d.png}
  - {type: variant, offset: 13, length: 1, content: 頌, WYG: 而為雙宛㧞啄而掩眥悲結悵而滿胷處朝晝而雖念假外見而遷排渉修夜之長寂信專思而知哀風梢梢而過樹月蒼蒼而照臺冰依㟁而早結霜託草而先摧歛雙翮於水裔翹孤趾於林隈情無方而雨集事有限而星乖在俄頃而猶悼矧窮生之所懷聞宿世之髙賢澤無微而不均育草木而明義愛禽鳥而昭仁全殞卵而來鳳放乳麑而感麟雖陋生於萬物若沙漠之一塵茍全軀而畢命庶魂報以自申傷逝賦晨登南山望羙中阿露團秋槿風巻寒蘿悽愴傷心悲如之何盡若窮煙離若剪絃如影滅地猶星殞天棄華宇於明世閉金扄於下泉永山河以自畢𦕈千齡而弗旋思一言於向時邈衆代於古年逰稍逺而變體浸幽明而改時覽篇迹之如旦婉遺意而在兹忽若謂其不然自惆悵而驚疑循堂廡而下降歴幃戸而升基服委襟而禠帯器蒙管而韜絲志存業而遺績身先物而長辭豈重歡而可覯追前感之無期寒徃暑來而不窮哀極樂反而有終燧巳遷而禮革月旣逾而慶通心微微而就逺跡離離而絶容白日藹而回隂閨舘寂而深重冀慿靈於前物佇美目乎房櫳徒望思於永乆邈歸來其何從結單心於暮條掩行淚於晨風念沉悼而誰劇獨嬰哀於逝躬草忌霜而逼秋人惡老而逼衰誠衰耄之可忌或甘願而志違彼一息之短景乃累恨之長暉尋平生之好醜成黄塵之是非將㓕耶而尚在何有去而無歸惟桃李之零落生有促而非夭觀龜鶴之干祀年能富而情少反靈質於二塗亂感恱於雙抱日月飄而不留命倐忽而誰保譬明隙之在梁如風露之停草髪迎憂而送華貌先悴而收藻共甘苦其幾人曾無得而偕老拂埃琴而抽思啓陳書而遐討自古來而有之夫何怨乎天道園葵賦風煖}
