  - {type: variant, offset: 20, length: 1, content: 藥, WYG: 見賣玉器者或人欲買疑其是珉不肎成市聊作此詩以戲買者涇渭不可雜珉玉當早分子實舊楚客䝉俗謬前聞安知理孚采豈識質明溫我方歴上國從洛入函轅揚光十貴室馳譽四豪門奇聲振朝邑髙價服鄉村寧能與爾曹瑜瑕稍辨論從登香爐峯辭宗盛荆夢登髙美鳬繹徒收杞梓饒曾非羽人宅羅景藹雲扃沾光扈龍䇿御風親列涂乘山窮禹迹含嘯對霧岑延蘿倚峯璧青冥搖煙樹穹跨負天石霜崖滅土膏金澗測泉脈旋淵抱星漢乳竇通海碧谷館駕鴻人巖樓咀丹客殊物藏珍怪奇心隱仙籍高世伏音華綿古遁精魄簫瑟生哀聴參差逺驚覿慙無獻賦才洗汙奉毫帛夢歸鄉銜淚出郭門撫劒無人逵沙風暗空起離心眷鄉畿夜分就孤枕夢想慙言歸孀婦當户歎搔絲復鳴機慊欵論久別相將還綺闈歴歴簷下涼朧朧帳裏輝刈蘭爭芬芳採菊競葳蕤開}
