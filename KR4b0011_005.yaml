body:
  text: 鮑氏集卷第五潯陽還都道中還都道中三首還都口號還都至三山望石頭城過銅山掘黃精日落望江贈荀丞行樂至城東橋答客白雲和王丞秋夜二首觀圃人藝植詠採桑詠雙燕二首發後渚數詩建除從過舊宫從拜陵登京峴臨川王服竟還田里潯陽還都道中昨夜宿南陵今旦入蘆洲客行惜日月崩波不可留侵星赴早路畢景逐前儔鱗鱗夕雲起獵獵晚風遒騰沙鬱黃霧翻浪楊白鷗登艫眺淮甸掩泣望荆流絶目盡平原時見逺煙浮倐忽坐還合俄思甚兼秋未嘗違戶庭安能千里逰誰令乏古節貽此越鄉憂還都道中三首恱懌遂還心踊躍貪至勤鳴雞戒征路暮息落日分急流騰飛沫回風起江濆孤獸啼夜侶離鴻噪霜群物哀心交橫聲切思紛紜歎慨訴同旅美人無相聞風急訊灣浦裝高偃檣舳夕聽江上波逺極千里目寒律驚窮蹊爽氣起喬木隱隱日沒岫瑟瑟風發谷鳥還暮林喧潮上氷結洑夜分霜下淒悲端出遙陸愁來攢人懷羇心苦獨宿久宦迷逺川川廣每多懼薄止閭邉亭關歷險程路霮䨴冥寓岫濛昧江上霧時涼籟爭吹流洊浪奔趣一作注測焉增愁起搔首東南顧茫然荒野中舉目皆凛素回風揚江泌寒棲動樹太息終晨漏企我歸飈遇還都口號分壤蕃帝華列正藹皇宫禮宴及年暇朝奏因歲通維舟歇金景結棹俟昌風鉦歌首寒物歸吹踐開冬隂沉煙塞合蕭瑟涼海空馳霜急歸節幽雲慘天容旌鼓貫玄塗羽鷁𬒳長江君王遲京國逰子思鄉邦恩世共渝洽身願兩扳逢勉哉河濟客勤爾尺波功還都至三山望石頭城泉源安首流川末澄逺波晨光𬒳水族曉氣歇林阿兩江皎平逈三山鬱駢羅南帆望越嶠北榜指齊河關扄繞天邑襟帶抱尊華長城非壑嶮峻岨似荆芽攢樓貫白日摛堞隱丹霞征夫喜觀國逰子遲見家流連入京引躑躅望鄉歌彌前歎景促逾近倦路多偕萃猶如兹弘易將謂何遇銅山掘黃精土肪閟中經水芝韜內䇿寶餌緩童年命藥駐衰曆矧蓄終古情重拾煙霧迹羊角捿斷雲榼口流隘石銅溪沉晝森乳竇夜㳙滳既類風門磴後象天井壁蹀蹀寒葉離灇灇秋水積松色隨野深月露依草白空守江海思豈愧梁鄭客得仁古無怨順道今何惜日落望江贈荀丞旅人乏愈樂薄暮增思深日落嶺雲歸延頸望江隂亂流灇大壑長霧匝高林林際無窮極雲邉不可尋惟見獨飛鳥千里一楊音推其感物情則知逰子心君居帝京內高會日揮金豈念慕群客咨嗟戀景沉行樂至城東橋雞鳴關吏起伐鼓早通晨嚴車臨逈陌延瞰歷城闉蔓草緣髙隅修楊夾廣津迅風首旦發平路塞飛塵擾擾逰宦子營營市井人懷金近從利撫劒逺辭親爭先萬里塗各事百年身開芳及稚節含綵吝驚春尊賢永照灼孤賤長隱淪容華坐銷歇端為誰苦辛答客幽居屬有念含意未連詞㑹客從外來問君何所思澄神自惆悵默慮久回疑謂賓少安席方為子陳之我以蓽門士負學謝前基愛賞好偏越放縱少矝持專求遂性樂不計緝名期歡至獨斟酒憂來輒賦詩聲交一作交友稍希歇此意更堅滋浮生急馳電物道險絃絲深憂寡情謬進伏兩睽時願賜卜身要得免後賢嗤白雲探靈喜解骨測化善騰天情高不戀俗猒世樂尋仙鍊金宿明館屑玉止瑤淵鳯歌出林闕龍駕渡蓬山凌崖采三露攀鴻戲五煙昭昭景臨霞湯湯風媚泉命娥雙月際要媛兩星間飛虹眺卷河泛霧弄輕絃笛聲謝廣賓神道不復傳一逐白雲去千齡猶未旋和王丞限生歸有窮長意一作憶無巳年秋心日逈絶春思坐連綿銜協曠舌願斟酌高代賢遁迹俱浮海採藥共還山夜聽橫石波朝望宿巖煙明澗豫㳂越飛蘿子縈牽性好必齊遂迹幽非妄傳滅志身世表藏名琴酒間秋夜二首夜久膏既竭啓明旦未央環情倦始復空暗一作閣起晨裝幸承天光轉曲景入幽堂徘徊集通隟宛轉燭迥梁帷風自卷舒簾露視成行歲役急窮晏生慮備溫涼絲紈夙染濯綿綿夜裁張冬雪旦夕至公子乏衣裳華心愛零落非直惜容光願君翦衆念且共覆前觴遁跡避紛喧貿農棲寂寞荒徑馳野鼠空庭聚山雀既逺人世歡還賴泉卉樂折柳樊場圃負綆汲潭壑霽旦見雲峯風夜聞海鶴江介早寒來白露先秋落麻壟方結葉瓜田巳掃籜傾暉忽西下回景思華幕攀蘿席中軒臨觴不能酌終古自多恨幽悲共淪鑠觀圃人藝植善賈笑𧖟漁巧宦賤農牧逺養遍關市深利窮海陸乘軺實金羈當爐信珠服居無逸身伎安得坐梁肉徒承屬生幸政緩吏平睦春畦及耘藝秋埸早芟築澤閲既繁高山營又登熟抱插壠上餐結茅野中宿空織巳尚淳寧知俗翻覆詠採桑季春梅始落工女事𧖟作本下有明鏡淨挂光顔畢苕蕚句採桑淇洧間還戲上宫閣早蒲時結隂晚篁初解籜藹藹霧灑閨融融景盈幕乳燕逐草蟲巢蜂拾花藥是節最暄妍佳服又新爍綿歎對逈塗揚歌弄埸藿抽琴試杼思薦珮果成託承君郢中美服義久心諾衛風古愈艷鄭俗舊浮薄靈願悲渡湘宓賦笑湹洛盛明難重來淵意為誰涸君其且調絃桂酒妾行酌詠雙燕二首雙燕戲雲崖羽翰始差池出入南閨裏經過北堂陲意欲巢君幕層楹不可窺沉吟芳歲晚徘徊韶景移悲歌辭舊愛銜淚覔新知可憐雲中燕旦去暮來歸自知羽翅弱不與鵠爭飛寄聲謝飛鵠往事子毛衣瑣心誠貧薄叵吝節榮衰隂山饒苦霧危節多徑威豈但避霜雪當一作復警野人機發後渚江上氣早寒仲秋始霜雪從軍乏衣糧方冬與家别蕭條背鄉心悽愴清渚發涼埃晦平皋飛潮隱修樾孤光獨徘徊空煙視升滅塗隨前峯逺意逐後雲結華志公馳年韶顔慘驚節推琴三起歎聲為君斷絶數詩一身仕關西家族滿山東二年從車駕齊祭甘泉宫三朝國慶畢休沐還舊邦四牡輝長路輕蓋若飛鴻五侯相餞送高㑹集新豐六樂陳廣坐祖帳揚春風七盤起長䄂庭下列歌鍾八珍盈雕爼綺肴紛錯重九族共瞻遲賓友仰徽容十載學無就善宦一朝通建除建旗出燉煌西討屬國羌除去徒與騎戰車羅萬箱滿山又填谷投鞍合營墻平原亘千里旗鼓轉相望定舍後未休後驛敕前裝執戟無暫傾彎弧不解張破滅西零國生虜郅支玉危亂悉平蕩萬里置關梁成軍入玉門士女獻壼漿收功在一時歷世荷餘光開壤襲朱紱左右佩金章閉帷草太玄兹事殆愚狂從過舊宫肅裝屬雲旅奉靷承末塗嚴恭履桑梓加敬覽枌榆靈命藴川瀆帝寶伏篇圖虎變由石細龍翔自鼎胡功冠生民始道妙神器初宫陛留前一作皆制歌思溢今衢餘祥見雲物遺像存陶漁泉流信清泌原野實甘荼豈伊愛酆鄗天險兼上腴東秦邦北門非親誰克居仁聲日月懋惠澤雲雨敷盧令美何歇唐風久不渝微臣逢世慶征賦備人徒空費行葦德採東謝生芻從拜陵登京峴孟冬十月交殺盛隂欲終風烈無徑草寒甚有凋松軍井冰晝結士馬氊夜重晨登峴山首霜雪凝未通息鞍循隴上支劒望雲峯表裏觀地嶮升降究天容東嶽覆如礪瀛海安足窮傷哉良永矣馳光不再中衰賤謝逺願疲老還舊邦深德竟何報徒令田陌空臨川王服竟還田里送佳禮有終事居慙懦薄稅駕罷朝衣歸志願巢壑尋思邈無報退命愧天爵捨耨將十齡還得守場藿道經盈竹笥農書滿塵閣愴愴秋風生戚戚寒緯作豐霧粲草華高月麗雲崿屏跡勤躬稼衰疾倚芝藥顧此謝人群豈直止商洛鮑氏集卷第五
