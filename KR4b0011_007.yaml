body:
  text: 鮑氏集卷第七見賣玉器者從登香爐峯夢歸鄕從臨江王上荆𥘉發新渚望孤石登黃鶴磯𡵨陽守風在江陵歎年傷老翫月城西門廨中代挽歌夜聽妓梅花落古辭可愛夜聽声酒後講易王昭君中與歌曲十首呉歌二首與謝尚書莊三連句在荆州與張史君李居士連句月下登樓連句字謎三首見賣玉器者并序見賣玉器者或人欲買疑其是珉不肎成市聊作此詩以戲買者涇渭不可雜珉玉當早分子實舊楚客蒙俗謬前聞安知理孚采豈識質明温我方歴上國從洛入函轅揚光十貴室馳譽四豪門竒聲振朝邑髙價服郷村寜能與爾曹瑜瑕稍辨論從登香爐峯辭宗盛荆夢登歌美鳬繹徒收𣏌梓饒曾非羽人宅羅景藹雲扄沾光扈龍策御風親列涂乗山窮禹迹含嘯對霧岑延蘿倚峯壁青冥搖煙樹穹跨負天石霜崖㓕土膏金澗測泉脉旋淵抱星漢乳竇通海碧谷館駕鴻人巖棲咀丹客殊物藏珍怪竒心隱仙籍高世伏音華綿古遁精魄簫瑟生哀聽參差逺驚覿慙無獻賦才洗汙奉毫帛夢歸鄕銜淚岀郭門撫劒無人逵沙風暗空起離心眷鄕畿夜分就孤枕夢想暫言歸孀婦當戸歎搔絲復鳴機慊欵論乆別相將還綺闈歷歷簷下涼朧朧帳裏輝刈蘭争芬芳採菊競葳蕤開奩奪香蘇探䄂解纓徽寐中長路近覺後大江違驚起空歎息恍惚神魂飛白水漫浩浩高山壯巍巍波瀾異徃復風雲改榮衰此土非吾土慷慨當告誰從臨海王上荆初發新渚客行有苦樂但問客何行扳龍不待翼附驥絶塵冥梁珪分楚牧羽鷁指全荆雲艫掩江汜千里𬒳連旌戾戾旦風遒嘈嘈晨皷鳴收䌫辭帝郊揚棹發皇京狐兎懷窟志犬馬戀主情撫襟同太息相顧俱涕零奉役塗未啓思歸思巳盈望孤石江南多暖谷雜樹茂寒峯朱華抱白雪陽條熈朔風蚌節流騎藻輝石亂煙虹泄雲去無極馳波徃不窮肅歌清漏畢徘徊朝景終浮生會當㡬歡酌每盈衷登黃鶴磯木落江渡寒鴈還風送秋臨流斷商絃瞰川悲棹謳適郢無東轅還夏有西浮三崖隱丹磴九派引滄流淚竹感湘別弄珠懷漢逰豈伊藥餌泰得奪旅人憂𡵨陽守風差池玉繩高掩映一作藹瑤井沒廣岸屯宿隂懸崖棲歸月役人喜先馳軍令申早發洲逈風正悲江寒霧未歇飛雲日東西别鶴方楚越塵衣孰揮澣蓬思亂光髮在江陵歎年傷老五難未易夷三命戒淵抱方瞳起松髓頳髮疑桂腦役生良自休大患安足保開簾窺景夕備屬雲物好翾翾燕弄風嫋嫋柳垂道池瀆亂蘋萍園援美花草節如驚灰異零落就衰老翫月城西門廨中始見西南樓纎纎如玉鈎未映東北墀姢姢似娥眉娥眉蔽珠櫳玉鉤隔瑣窓三五二八時千里與同君夜移衡漢落徘徊入戸中歸華先委露別葉早辭風客逰猒苦辛仕子倦飄塵休澣自公日宴慰及私辰蜀琴抽白雪郢曲發陽春肴乾酒未闋金壼啓久淪廻軒駐輕葢留酌待情人代挽歌獨處重冥下憶昔登髙臺傲岸平生中不爲物所裁埏門只復閉白蟻相將來生時芳蘭體小蟲今爲災玄鬢無復根枯髏依青苔憶昔好飲酒素盤進青梅彭韓及廉藺疇昔巳成灰壯士皆死盡餘人安在哉夜聽妓二首夜來坐㡬時銀漢傾露落澄愴入閨景葳蕤被園藿絲管感暮情哀音遶梁作芳盛不可恒及歳共爲樂天明坐當散琴酒駛弦酌蘭膏消耗夜轉多亂筵雜坐更絃歌傾情逐節寧不苦特爲盛年惜容華梅花落中庭雜樹多偏爲梅咨嗟問君何獨然念其霜中能作花露中能作實摇蕩春風媚春日念爾零落逐寒風徒有霜華無霜質古辭容華不待年何爲客逰梁九月寒隂合悲風斷君腸歎息空房婦幽思坐自傷勞心結逺路惆悵獨未央可愛風帷關珠帶月幌垂霧羅魏粲縫秋裳趙豔習春歌夜聽聲辭鄉不覺逺歡寡憂自繁何用慰秋望清燭視夜飜酒後晨節無兩淹年意不俱處自非羽酌歡何用慰愁旅講易雲澤翔羽姬横益招益人賁園無金尚履道易書紳王昭君旣事轉蓬逺心隨鴈路絶霜輝旦夕驚邊笳中夜咽中興歌十首千冬逢一春萬夜見朝日生平值中興歡起百憂畢中興太運平化清四海樂祥景照玉䑓紫煙逰鳯閣碧樓舎夜月紫殿争朝光綵墀散蘭麝風起自生芳白日照前窓玲瓏綺羅中美人掩輕扇含思歌春風三五容色滿四五妙華歇巳輸春日歡分隨秋光設北岀湖邉戲前還苑中逰飛縠繞長松馳管逐波流九月秋水清三月春花滋千金逐良日皆競中興時窮泰巳有分壽天復屬天旣見中興樂莫持憂自煎襄陽是小地壽陽非帝城今日中興樂遥治在上亰梅花一時艷竹葉千年色願君松栢心採照無窮極呉歌二首夏口樊城岸魯都却丹樓觀見流水還識是儂淚流人言荆江狹荆江定自闊五兩了無聞風聲郍得逹與謝尚書莊三連句霞輝兮澗朗日靜兮川澄風輕桃欲開露重蘭未勝水光溢兮松霧動山煙疊兮石露凝晻映晨物綵連綿夕羽興在荆州與張史君李居士連句橋磴支古轍篁路拂輕鞍三尹無喜色一適或垂竿月下登樓連句髴髣拂月光繽紛篁霧隂樂來亂憂念酒至歇憂心鮑博士露入覺牗髙劳深測苑深清氣澄永夜流吹不可臨王延秀密峯集浮碧踈瀾道瀛潯嗽玉延幽性扳桂藉知音荀原之辰意事淪晦良歡戒勿祲昭景有遣駟孤賈無留金荀中書萬秋字謎三首二形二體四支八頭四八二八飛泉仰流頭如刀尾如鉤中央横廣四角六抽右面負兩刃左邊雙屬牛乾之一九隻立無偶坤之二六宛然雙宿鮑氏集卷第七
