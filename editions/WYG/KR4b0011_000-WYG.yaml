body:
  text: 鮑明逺集别集類一宋提要臣等謹案鮑明逺集十巻宋鮑照撰照字明逺東海人晁公武讀書志作上黨人盖誤讀虞炎序中本上黨人之語照或作昭盖唐人避武后諱所改韋莊詩有欲將張翰松江雨畫作屏風寄鮑昭句押入平聲殊失其實案宋禮部貢舉條式稱齊桓避諱作齊威可用於句中不可押入㣲韻知此詩押作鮑昭之非沈約宋書李延夀南北史作于武后稱制前者實皆作照不作昭也照為臨川王子頊參軍没于亂兵遺文零落齊散騎侍郎虞炎始編次成集隋書經籍志著録十巻而註曰梁六巻然則後人又續增矣此本為明正徳庚午朱應登所刋云得自都穆家巻數與隋志合而冠以炎序未審即隋志舊本否考其編次既以樂府别為一巻而采桑梅花落行路難亦皆樂府乃别入詩中唐以前人皆解聲律不應舛互若此又行路難第七首蹲蹲字下註曰集作樽樽啄字下註曰集作逐使果原集何得又稱集作此為後人重輯之明驗矣然文章皆有首尾詩賦亦往往有自序自註與六朝他集從類書採出者不同殆因相傳舊本而稍為竄亂歟鍾嶸詩品云學鮑照纔能日中市朝滿學謝朓劣得黄鳥度青枝今集中無此一句益知非梁時本也乾隆四十六年十月恭校上總纂官臣紀昀臣陸錫熊臣孫士毅總校官臣陸費墀鮑明逺集原序鮑照字明逺本上黨人家世貧賤少有文思宋臨川王愛其才以為國侍郎王薨始興王濬又引為侍郎孝武初除海虞令遷太學博士兼中書舍人一本云時主多忌以文自髙照侍左右深逹夙㫖作此賦􅄒不復盡其才思出為秣陵令又轉永嘉令大眀五年除前軍行參軍侍臨海王鎮荆州掌知内命尋遷前軍刑獄參軍事宋眀帝初江外拒命及義嘉敗荆土震擾江陵人宋景因亂掠城為景所殺時年五十餘身既遇難萹章無遺流遷人間者往往見在儲皇博採羣言逰好文藝片辭隻韻㒺不收集照所賦述雖乏精典而有超麗爰命陪趨僃加研訪年代稍逺零落者多今所存者儻能半焉虞炎奉敕序
