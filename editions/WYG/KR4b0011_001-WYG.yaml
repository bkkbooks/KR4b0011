  text: 欽定四庫全書
  hash: sha256:64d9ff2e7643d8cd3464e7f4c9e75c7d6d85eb6ee80c540d6dcbeeab187b9ddc
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4b0011_WYG_001-1a, image: WYG1063/WYG1063-0565a.png}
body:
  text: 鮑明逺集巻一宋鮑照撰舞鶴賦散幽經以驗物偉胎化之仙禽鍾浮曠之藻質抱清逈之明心指蓬壺而飜翰望崐閬而揚音匝日域以廻騖窮天歩而髙尋踐神區其旣逺積靈祀而方多精含丹而星耀頂凝紫而煙華引圓吭之纎婉頓修趾之洪姱疊霜毛而弄影振玉羽而臨霞朝戲於芝田夕飲乎瑶池厭江海而㳺澤掩雲羅而見覊去帝鄉之岑寂歸人寰之喧卑嵗崢嶸而催暮心惆悵而哀離於是窮隂殺節急景凋年凉沙振野箕風動天嚴嚴苦霧皎皎悲泉冰塞長河雪滿羣山旣而雰昏夜歇景物澄廓星飜漢回曉月將落感寒雞之早晨憐霜鴈之違漠臨驚風之蕭條對流光之照灼唳清響於丹墀舞飛容於金閣始連軒以鳳蹌終宛轉而龍躍躑躅徘徊振迅騰摧驚身蓬集矯翅雲飛離綱别赴合緒相依將興中止若往而歸䬃沓矜顧遷延遲暮逸翮後塵翺翥先路指㑹䂓翔臨岐矩歩態有遺妍貌無停􅃐奔機逗節角睞分形長揚一作揚翹緩騖並翼連聲輕迹凌亂浮影交横衆變繁姿參差洊密煙交霧凝若無毛質風去雨還不可談悉旣散魂而盪目迷不知其所之忽星離而雲罷整神容而自持仰天居之崇絶更惆愓以驚思當是時也燕姬色沮巴童心耻巾拂兩停丸劒雙止雖邯鄲其敢倫豈陽阿之能擬入衛國而乘軒出吳都而傾市守馴養於千齡結長悲於萬里蕪城賦登廣陵城作濔迆平原南馳蒼梧漲海北走紫塞鴈門柂以漕渠軸以崑崗重江複闗之奥四㑹五逹之莊當昔全盛之時車挂轊人駕肩㕓閈撲地歌吹沸天孶貨鹽田鏟利銅山才力雄富士馬精妍故能侈秦法佚周今劃崇墉刳濬洫圖修世以休命是以板築雉堞之殷井幹烽櫓之勤格高五嶽袤廣三墳崪若斷岸矗似長雲製磁石以禦衝糊赬壤以飛文觀基扄之固護將萬祀而一君出入三代五百餘載竟𤓰剖而豆分澤葵依井荒葛罥途壇羅虺蜮階鬭麕鼯木魅山鬼野䑕城狐風嘷雨嘯昏見晨趨饑鷹厲吻寒鴟嚇雛伏􅕝藏虎乳血餐膚崩榛塞路崢嶸古馗白楊早落塞草前衰稜稜霜氣蔌蔌風威孤蓬自振驚沙坐飛灌莽杳而無際叢薄紛其相依通池旣巳夷峻隅又巳頽直視千里外唯見起黄埃凝思寂聽心傷巳摧若夫藻扄黼帳歌堂舞閣之基璇淵碧樹弋林釣渚之館吳蔡齊秦之聲魚龍爵馬之玩皆薫歇燼滅光沈響絶東都妙姬南國麗人蕙心紈質玉貌綘唇莫不埋魂幽石委骨窮塵豈憶同輦之愉樂離宫之苦辛哉天道如何吞恨者多抽琴命操為蕪城之歌歌曰邊風急兮城上寒井徑滅兮丘隴殘千齡兮萬代共盡兮何言芙蓉賦感衣裳於楚賦詠憂思於陳詩訪羣英之艶絶標高名於澤芝㑹春陂乎夕張搴芙蓉而水嬉抽我衿之桂蘭點子吻之瑜辭選羣芳之徽號抱茲性之清芬禀若華之驚絶單蓲陽之妙手測淲池之光潔爍彤輝之明媚粲雕霞之繁悅顧椒丘而非偶豈園桃而能埒彪炳以蒨藻翠景而紅波青房兮䂓接紫的兮圓羅樹妖遥之弱幹散菡萏之輕荷上星光而倒景下龍鱗而隠波戲錦鱗而夕映曜繡羽以晨過結游童之湘吹起榜妾之江歌僃日月之温麗非盛明而謂何若乃當融風之暄盪承暑雨之平渥被瑶塘之周流繞金渠之屈曲排積霧而楊芬鏡洞泉而含綠葉折水以為珠條集露而成玉潤蓬山之瓊膏輝䓗河之銀燭冠五華於仙草超四照於靈木雜衆姿於開巻閱羣貌於昏明無長䄂之容止信不笑之空城森紫葉以上擢紛湘蘂而不傾根雖割而琯徹柯旣解而絲縈感盛衰之可懷質始終而常清故其為芳也綢繆其為媚也奔發對粧則色姝比蘭則香越泛明彩於宵波飛澄華於曉月陋荆姬之朱顔笑夏女之光髪恨狎世而貽賤徒愛存而賞没雖凌羣以擅竒終從歲而零歇遊思賦雲徑兮海衝上潮兮送風秋水兮駕浦涼煙兮冐江暮氣起兮逺岸黒陽精㓕兮天際紅波沄沄兮無底山森森兮萬重平隰兮亘㟁通川兮㵼壑仰盡兮天經俯窮兮地絡望波際兮曇曇眺雲間兮灼灼乃江南之斷山信海上之飛鶴指煙霞而問鄉窺林嶼而訪泊撫身事而識苦念親愛而知樂苦與樂其何言悼人生之長役捨堂宇之密親坐江潭而為客對蒹葭之遂黄視零露之方白鴻晨驚以響湍泉夜下而鳴石結中洲之雲蘿託綿思於遥夕瞻荆吳之逺山望邯鄲之長陌塞風馳兮邊草飛驚沙起兮鴈揚翮雖燕越之異心在禽鳥而同戚悵収情而抆涙遣繁悲而自抑此日中其幾時彼月滿而將蝕生無患於不老奚引憂以自逼物因節以巻舒道與運而升息賤賣卜以當壚隠我耕而子織誠愛秦王之奇男不願絶筋而稱力巳矣哉使豫章生而可知夫何異乎叢棘飛蛾賦仙䑕伺闇飛蛾候明均靈舛化詭欲齊生觀齊生而欲詭各㑹往以慿方凌燋煙之浮景赴熈燄之明光㧞身幽草下畢命在此堂本輕死以邀得雖縻爛其何傷豈學山南之文豹避雲霧而巖藏鮑明逺集巻一
