body:
  text: 鮑明逺集巻五宋鮑照撰潯陽還都道中昨夜宿南陵今旦入蘆洲客行惜日月崩波不可留侵星赴早路畢景逐前儔鱗鱗夕雲起獵獵晩風遒騰沙鬱黄霧飜浪揚白鷗登艫眺淮甸掩泣望荆流絶目盡平原時見逺煙浮倐忽坐還合俄思甚兼秋未嘗違户庭安能千里遊誰令乏古節貽此越鄉憂還都道中三首悦懌遂還心踊躍貪至勤鳴鷄戒征路暮息落日分急流騰飛沬囘風起江濆孤獸啼夜侣離鴻噪霜羣物衰心交横聲切思紛紜歎慨訴同旅美人無相聞風急訊灣浦裝高偃檣舳夕聴江上波逺極千里目寒律驚窮蹊爽氣起喬木隱隱日沒岫瑟瑟風發谷鳥還暮林諠潮上冰結洑夜分霜下淒悲端出遙陸愁來攢人懷羇心苦獨宿久宦迷逺川川廣每多懼薄止閭邊亭闗歴險程路霮䨴㝠隅岫濛昧江上霧時涼籟爭吹流洊浪奔趣一作注惻焉增愁起搔首東南顧茫然荒野中舉目皆凜素囘風揚江泌雅寒棲動樹太息終晨漏企我歸飊遇還都口號分壤蕃帝華列正藹皇宫禮讌及年暇朝奏因歲通維舟歇金景結棹俟昌風鉦歌首寒物歸吹踐開冬隂沈煙塞合蕭瑟涼海空馳霜急歸節幽雲慘天容旌鼓貫𤣥塗羽鷁被長江君王遲京國遊子思鄉邦恩世共渝洽身願兩扳逢勉哉河濟客勤爾尺波功還都至三山望石頭城泉源安首流川末澄逺波晨光被水族曉氣歇林阿兩江皎平迥三山鬱駢羅南帆望越嶠北榜指齊河闗扃繞天邑襟帶抱尊華長城非壑嶮峻岨似荆芽攢樓貫白日摛堞隱丹霞征夫喜觀國遊子遲見家流連入京引躑躅望鄉歌彌前歎景促逾近勌路多偕萃猶如兹𢎞易將謂何遇銅山掘黄精土肪閟中經水芝韜内䇿寳餌緩童年命藥駐衰厯矧蓄終古情重拾煙霧迹羊角棲斷雲榼口流隘石銅溪晝森沈乳竇夜涓滴既類風門磴復象天井壁蹀蹀寒葉離灇灇秋水積松色隨野深月露依草白空守江海思豈愧梁鄭客得仁古無怨順道今何惜日落望江贈荀丞旅人乏愉樂薄暮増思深日落嶺雲歸延頸望江隂亂流灇大壑長霧匝髙林林際無窮極雲邊不可尋惟見獨飛鳥千里一揚音推其感物情則知遊子心君居帝京内髙會日揮金豈念慕羣客咨嗟戀景沈行藥至城東橋雞鳴闗吏起伐鼓早通晨嚴車臨迥陌延瞰歴城闉蔓草縁髙隅修楊夾廣津迅風首旦發平路塞飛塵擾擾遊宦子營營市井人懷金近從利撫劍逺辭親爭先萬里塗各事百年身開芳及稚節含綵吝驚春尊賢永照灼孤賤長隱淪容華坐銷歇端為誰苦辛荅客幽居屬有念含意未連詞會客從外來問君何所思澄神自惆悵嘿慮久迴疑謂賔少安席方為子陳之我以蓽門士負學謝前基愛賞好偏越放縱少矜持專求遂性樂不計緝名期歡至獨斟酒憂來輙賦詩聲交一作交反稍希歇此意更堅滋浮生急馳電物道險弦絲深憂寡情謬進伏兩暌時願賜卜身要得免後賢嗤白雲探靈喜解骨測化善騰天情髙不戀俗厭世樂尋仙鍊金宿明館屑玉止瑤淵鳳歌出林闕龍駕戾蓬山凌崖采三露攀鴻戲五煙昭昭景臨霞湯湯風媚泉命娥雙月際要媛兩星間飛虹眺巻河汎霧弄輕絃笛聲謝廣賔神道不復傳一逐白雲去千齡猶未旋和王丞限生歸有窮長意一作憶無已年秋心日迥絶春思坐連綿銜協曠古願斟酌高代賢遯迹俱浮海採藥共還山夜聴横石波朝望宿巖煙明澗子㳂越飛蘿予縈牽性好必齊遂迹幽非妄傳滅志身世表藏名琴酒間秋夜二首夜久膏既竭啓明旦未央環情倦始復空閨起晨裝幸承天光轉曲影入幽堂徘徊集通隟宛轉燭迴梁帷風自巻舒簾露視成行歲役急窮晏生慮備溫涼絲紈夙染濯綿綿夜裁張冬雪旦夕至公子乏衣裳華心愛零落非直惜容光願君翦衆念且共覆前觴又遁跡避紛喧貨農棲寂寞荒徑馳野䑕空庭聚山雀既逺人世歡還賴泉卉樂折柳樊場圃負綆汲潭壑霽旦見雲峰風夜聞海鶴江介早寒來白露先秋落麻壟方結葉瓜田已掃籜傾暉忽西下迴景思華幕攀蘿席中軒臨觴不能酌終古自多恨幽悲共淪鑠觀圃人藝植善賈笑蠶漁巧宦賤農牧逺養遍闗市深利窮海陸乘軺實金羈當壚信珠服居無逸身伎安得坐粱肉徒承屬生幸政緩吏平睦春畦及耘藝秋場早芟築澤閲既繁髙山營又登熟抱鍤壠上飡結茅野中宿空識已尚淳寧知俗飜覆詠採桑季春梅始落工女事蠶作一本下有明鏡淨桂枝光顔畢苕萼二句採桑淇洧間還戲上宫閣早蒲時結隂晩篁初解籜藹藹霧灑閨融融景盈幕乳燕逐草蟲巢蜂拾花萼是節最暄妍佳服又新爍綿歎對迥塗揚歌弄場藿抽琴試抒思薦珮果成託承君郢中美服義久心諾衛風古愉艷鄭俗舊浮薄靈願悲渡湘宓賦笑瀍洛盛明難重來淵意為誰涸君其且調絃桂酒妾行酌詠雙燕二首雙燕戲雲崖羽翰始差池出入南閨裏經過北堂陲意欲巢君幕層楹不可窺沈吟芳歲晩徘徊韶景移悲歌辭舊愛銜淚覔新知可憐雲中燕旦去暮來歸自知羽翅弱不與鵠爭飛寄聲謝飛鵠往事子毛衣瑣心誠貧薄叵􅈔節榮衰隂山饒苦霧危節多勁威豈但避霜雪當一作復儆野人機發後渚江上氣早寒仲秋始霜雪從軍乏衣糧方冬與家別蕭條背鄉心悽愴清渚發涼埃晦平皋飛潮隱修樾孤光獨徘徊空煙視昇滅塗隨前峰逺意逐後雲結華志分馳年韶顔慘驚節推琴三起歎聲為君斷絶數詩一身仕闗西家族滿山東二年從車駕齋祭甘泉宫三朝國慶畢休沐還舊邦四牡輝長路輕蓋若飛鴻五矦相餞送髙會集新豐六樂陳廣坐祖帳揚春風七盤起長袖庭下列歌鐘八珍盈雕俎綺肴紛錯重九族共瞻遲賔友仰徽容十載學無就善宦一朝通建除建旗出燉煌西討屬國羌除去徒與騎戰車羅萬箱滿山又填谷投鞍合營牆平原亘千里旗鼓轉相望定舍後未休候騎勅前裝執㦸無暫頓彎弧不解張破滅西零國生虜郅支王危亂悉平蕩萬里置闗梁成軍入玉門士女獻壺漿收功在一時歴世荷餘光開壤襲朱紱左右佩金章閉帷草太𤣥兹事殆愚狂從過舊宫肅裝屬雲旅奉靷承末塗嚴恭履桑梓加敬覽枌榆靈命蘊川瀆帝寳伏篇圖虎變由石細龍翔自鼎湖功冠生民始道妙神器初宫陛留前一作皆制歌思溢今衢餘祥見雲物遺像存陶漁泉流信清泌原野實甘荼豈伊愛酆鄗天險兼上腴東秦邦北門非親誰克居仁聲日月懋恵澤雲雨敷盧令美何歇唐風久不渝微臣逢世慶征賦備人徒空費行葦徳採束謝生芻從拜陵登京峴孟冬十月交殺盛隂欲終風烈無勁草寒甚有凋松軍井冰晝結士馬氊夜重晨登峴山首霜雪凝未通息鞍循隴上支劔望雲峰表裏觀地嶮昇降究天容東嶽覆如礪瀛海安足窮傷哉良永矣馳光不再中衰賤謝逺願疲老還舊邦深徳竟何報徒令田陌空臨川王服竟還田里送舊禮有終事居慙懦薄税駕罷朝衣歸志願巢壑尋思邈無報退命愧天爵捨耨將十齡還得守場藿道經盈竹笥農書滿塵閣愴愴秋風生戚戚寒緯作豐霧粲草華髙月麗雲崿屏跡勤躬稼衰疾倚芝藥顧此謝人羣豈直止商洛鮑明逺集巻五
