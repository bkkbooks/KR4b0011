  text: 欽定四庫全書
  hash: sha256:64d9ff2e7643d8cd3464e7f4c9e75c7d6d85eb6ee80c540d6dcbeeab187b9ddc
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4b0011_WYG_004-1a, image: WYG1063/WYG1063-0578a.png}
body:
  text: 鮑明逺集巻四宋鮑照撰擬古八首魯客事楚王懷金襲丹素既荷主人恩又䝉令尹顧日宴罷朝歸輿馬塞衢路宗黨生光輝賓僕逺傾慕富貴人所欲道得亦何懼南國有儒生迷方獨淪誤伐木清江湄設罝守毚兎十五諷詩書篇翰靡不通弱冠參多士飛步游秦宫一作紫宫側觀君子論預見古人風兩説窮舌端五車摧筆鋒羞當白璧貺耻受聊城功晩節從世務乗障逺和戎解佩襲犀渠巻袠奉盧弓始願力不及安知今所終幽并重騎射少年好馳逐氊帶佩雙鞬象弧挿彫服獸肥春草短飛空越平陸朝逰雁門上暮還樓煩宿石梁有餘勁驚雀無全目漢虜方未和邊城屢飜覆留我一白羽將以分符竹鑿井北陵隈百丈不及泉生事本瀾漫何用獨精堅幼壯重寸隂衰暮及經年放鷹息朝歌提爵止山田日夕登城隅周廻視洛川街衢積凍草城郭宿寒煙繁華悉何在宫闕久崩填空謗齊景非徒稱夷叔賢伊昔不治業倦逰觀五都海岱饒壯士䝉泗多宿儒結髪起躍馬垂白對講書呼我升上席陳觶發瓢壺管仲死巳久墓在西北隅後面崔嵬者桓公舊塜廬君來誠既晩不覩崇明初玉琬徒見傳交友義漸踈束薪幽篁裏刈黍寒澗隂朔風傷我肌號鳥驚思心嵗暮井賦訖程課相追尋田租送函谷獸藁輸上林河渭冰未開關隴雪正深笞撃官有罰呵辱吏見侵不謂乗軒意伏􅌴還至今河畔草未黄朔鴈已矯翼秋蛩扶户吟寒婦成夜織去嵗征人還流傳舊相識聞君上隴時東望久歎息宿昔改衣帶朝旦異容色念此憂如何夜長愁更多明鏡塵匣中寳琴生網羅蜀漢多竒山仰望與雲平隂崖積夏雪陽谷散秋螢朝朝見雲歸夜夜聞猿鳴憂人本自悲孤客易傷情臨堂設樽酒留酌思平生石以堅為性君勿慙一作輕素誠擬靑靑陵上栢涓涓亂江泉綿綿横海煙浮生旅昭世空事歎華年書翰幸閒暇我酌子縈絃飛鑣出荆路騖服指秦川渭濱富皇居鱗館匝河山輿童唱乘椒櫂女歌采蓮孚愉鸞閣上窈窕鳯楹前娛生信非謬安用求多賢學劉公幹體五首欲宦乏王事結主逺恩私為身不為名散書徒滿帷連冰上冬月披雪拾園葵聖靈燭區外小臣良見遺曀曀寒野霧蒼蒼隂山栢樹逈霧縈集山寒野風急嵗物盡淪傷孤貞為誰立賴樹自能貞不計迹幽澁胡風吹朔雪千里渡龍山集君瑤臺上飛舞兩楹前兹晨自為美當避艷陽天艷陽桃李節皎潔不成妍荷生渌泉中碧葉齊如規廻風蕩流霧珠水逐條垂彪炳此金塘藻耀君王池不愁世賞絶但畏盛明移白日正中時天下共明光北園有細草當晝正含霜乖榮頓如此何用獨芬芳抽琴為爾歌絃斷不成章擬阮公夜中不能寐漏分不能臥酌酒亂繁憂恵氣􅑀夜清素景縁隟流鳴鶴時一聞千里絶無儔佇立為誰久寂寞空自愁學陶彭澤體奉和王義典長憂非生意短願不須多但使尊酒滿朋舊數相過秋風七八月清露潤綺羅提琴當户坐歎息望天河保此無傾動寜復滯風波紹古辭七首橘生湘水側菲陋人莫傳逢君金華宴得在玊几前三川窮名利京洛富妖妍恩榮難久恃隆寵易衰偏觀席妾悽愴覩翰君泫然徒抱忠孝志猶為葑菲遷昔與君别時蠶妾初獻絲何言年月駛寒衣已𢷬治縧繡多廢亂篇帛久塵緇離心壯為劇飛念如懸旗石席我不爽徳音君勿欺瑟瑟凉海風竦竦寒山木紛紛羇思盈慊慊夜弦促訪言山海路千里歌别鶴絃絶空咨嗟形音誰賞録辛苦異人狀美貌改如玉徒畜巧言鳥不解心欵曲孤鴻散江嶼連翩遵渚飛含嘶衡桂浦馳顧河朔畿攅攅勁秋木昭昭淨冬暉窻前滌歡爵帳裏縫舞衣芳嵗猶自可日夜望君歸􅑀楹翫夜月逈眺出谷雲還山路已逺往海不及羣徘徊清淮汭顧慕廣江濆物情乖喜歇守操古難聞三越豐少姿容態傾動君開黛覩容一作朝顔臨鏡訪遙塗君子事河源彌祀闕還書春風掃地起飛塵生綺䟽文袿為誰設羅帳空巻舒不怨身孤寂但念星隱隅暖嵗節物早萬萌迎春逹春風夜㛹娟春霧朝晻靄軟蘭葉可采柔桑條易捋怨咽對風景悶瞀守閨闥天賦愁民命含生但契闊憂來無行伍厯亂如覃葛幽蘭五首傾輝引暮色孤景㽞恩顔梅歇春欲罷期渡徃不還簾委蘭蕙露帳含桃李風攬帯昔何道坐令芳節終結佩徒分明抱梁輙乖忤華落知不終空愁坐相誤眇𦕈蛸掛網漠漠蠶弄絲空慙不自信怯與君畫期陳國鄭東門古今共所知長䄂暫徘徊駟馬停路岐學古一作北風雪北風十二月雪下如亂巾實是愁苦節惆悵憶一作别情親㑹得両少妾同是洛陽人嬛緜好眉目閑麗羙腰身凝膚皎若雪明凈色如神驕愛生盼矚聲媚起朱唇衿服雜緹繢首飾亂􅌦珍調絃俱起舞為我唱梁塵人生貴得意懷願待君申幸值嚴冬暮幽夜方未晨齊衾乆両設角枕巳䨇陳願君早休息㽞歌待三春鮑明逺集巻四
