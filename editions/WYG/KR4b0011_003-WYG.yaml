body:
  text: 鮑明逺集巻三宋鮑照撰代東武吟主人且勿諠賤子歌一言僕本寒鄉士出身蒙漢恩始隨張校尉召募到河源後逐李輕車追虜出塞垣密塗亘萬里寜歲猶七奔肌力盡鞍甲心思歴凉温將軍旣下世部曲亦罕存時事一朝異孤績績一作憤誰復論少壯辭家去窮老還入門腰鎌刈葵藿倚杖牧鷄豚昔如鞲上鷹今似檻中猿徒結千載恨空負百年怨棄席思君幄疲馬戀君軒願垂晉主恵不愧田子魂代出自薊北門行羽檄起邊亭烽火入咸陽徵師屯廣武分兵救朔方嚴秋筋竿勁虜陣精且彊天子按劒怒使者遥相望鴈行縁石徑魚貫渡飛梁簫皷流漢思旌甲被胡霜疾風衝塞起沙礫自飄揚馬毛縮如蝟角弓不可張時危見臣節世亂識忠良投軀報明主身死為國殤代結客少年場行騘馬金絡頭錦帶佩吳鈎失意杯酒間白刃起相讎追兵一旦至負劒逺行遊去鄉三十載復得還舊丘昇髙臨四關表裏望皇州九塗平若水雙闕似雲浮扶宫羅將相夾道列王矦日中市朝滿車馬若川流撃鍾陳鼎食方駕自相求今我獨何為埳􅇄懐百憂代東門行傷禽惡弦驚一作驚弦倦客惡離聲離聲斷客情賔御皆涕零涕零心斷絶將去復還訣一息不相知何况異鄉别遥遥征駕逺杳杳白日晩居人掩閨臥行子夜中飯野風吹秋木行子心腸斷食梅常苦酸衣葛常苦寒絲竹徒滿坐憂人不解顔長歌欲自慰彌起長恨端代苦熱行赤坂横西阻火山赫南威身熱頭且痛鳥墜魂來歸湯泉發雲潭焦煙起石圻一作磯日月有恒昬雨露未嘗晞丹蛇踰百尺𤣥蜂盈十圍含沙射流影吹蠱病行暉瘴氣晝薫體菵露夜霑衣饑猨莫下食晨禽不敢飛毒涇尚多死渡瀘寜具腓生軀蹈死地昌志登禍機戈船榮旣薄伏波賞亦微爵輕君尚惜士重安可希代白頭吟直如朱絲繩清如玉壺冰何慙宿昔意猜恨坐相仍人情賤恩舊世議逐衰興毫髪一為瑕丘山不可勝食苗實碩䑕㸃一作玷白信蒼蠅鳬鵠逺成美薪芻前見陵申黜褒女進班去趙姬昇周王日淪惑漢帝益嗟稱心賞猶難恃貌恭豈易慿古來共如此非君獨撫膺代蒿里行同盡無貴賤殊願有窮申馳波催永夜零露逼短晨結我幽山駕去此滿堂親虗容遺劒佩實貌戢衣巾斗酒安可酌尺書誰復陳年代稍推逺懷抱日幽淪人生良自劇天道與何人齎我長恨意歸為狐兎塵代放歌行蓼蟲避葵堇習苦不言非小人自齷齪安知曠士懷鷄鳴洛城裏禁門平旦開􅃣蓋縱横至車騎四方來素帶曵長飇華纓結逺埃日中安能止鍾鳴猶未歸夷世不可逢賢君信愛才明慮自天斷不受外嫌猜一言分珪爵片善辭草萊豈伊白璧賜將起黄金臺今君有何疾臨路獨遲廻代昇天行家世宅闗輔勝帶宦王城僃聞十帝事委曲兩都情倦見物興衰驟覩俗屯平翩翻若回掌恍惚似朝榮窮途悔短計晩志重長生從師入逺嶽結友事仙靈五圖發金記九籥隱丹經風餐委松宿雲臥恣天行冠霞登綵閣解玉飲椒庭蹔遊越萬里少别數千齡鳳臺無還駕簫管有遺聲何時與汝曹啄腐共吞腥代别鶴操雙鶴俱起時徘徊滄海間長弄若天漢輕軀似雲懸幽客時結侶提擕逰三山青繳凌瑤䑓丹羅籠紫煙海上悲風急三山多雲霧散亂一相失驚孤不得住􅃡然日月馳逺矣絶音儀有願而不遂無怨以生離鹿鳴隱深草蟬鳴隠髙枝心自有所存旁人那得知代雉朝飛雉朝飛振羽翼専場挾兩一本下有雌字恃彊力媒巳驚翳又逼蒿間濳彀盧矢直刎繡頸碎錦臆絶命君前無怨色握君手執杯酒意氣相傾死何有代淮南王淮南王好長生服食練氣讀仙經琉璃作椀牙作盤金鼎玊匕合神丹合神丹戲紫房紫房綵女弄明璫鸞歌鳳舞斷君腸朱城九門門九閨􅂅逐明月入君懷入君懷結君佩怨君恨君恃君愛築城思堅劒思利同盛同衰莫相棄代空城雀雀乳四鷇空城之阿朝食野粟夕飲冰河髙飛畏鴟鳶下飛畏網羅辛傷伊何言怵迫良巳多誠不及青鳥逺食玊山禾猶勝吳宫鷰無罪得焚窠賦命有厚薄長歎欲如何代鳴鴈行邕邕鳴鴈鳴始旦齊行命侶入雲漢中夜相失羣離亂留連徘徊不忍散憔悴容儀君不知辛苦風霜亦何為代夜坐吟冬夜沉沉夜坐吟含聲未發巳知心霜入幕風度林朱燈滅朱顔尋體君歌逐君音不貴聲貴意深代北風涼行北風涼雨雪雱京洛女兒多妍粧遥豔帷中自悲傷沉吟不語若有忘問君得行何當歸苦使妾坐自傷悲慮年至慮顔衰情易逺恨難追代春日行獻歲發吾將行春山茂春日明園中鳥多嘉聲梅始發桃始青汎舟艫齊櫂驚奏採菱歌鹿鳴風微起波微生弦亦發酒亦傾入蓮池折桂枝芳䄂動芬葉披兩相思兩不知代少年時至衰老行憶昔少年時馳逐好名晨結友多貴門出入富兒隣綺羅艶華風車馬自揚塵歌唱青琴女彈筝燕趙人好酒多芳氣餚味厭時新今日每相念此事邈無因寄語後生子作樂當及春代陽春登荆山行荆一作京旦登荆山頭﨑嶇道難㳺早行犯霜露苔滑不可留極眺入雲表窮目盡帝州方都列萬室層城帶髙樓奕奕朱軒馳紛紛縞衣流日氛映山浦暄霧逐風収花木亂平原桑柘盈一作緜平疇攀條弄紫莖藉露折芳柔遇物雖成趣念者不解憂且共傾春酒長歌登山丘代朗月行朗月出東山照我綺窓前窓中多佳人被服妖且妍靚粧坐帳裏當户弄清弦鬢奪衛女迅體絶飛燕先為君歌一曲當作朗月篇酒至顔自解聲和心亦宣千金何足重所存意氣間代堂上歌行四坐且莫諠聽我堂上歌昔仕京洛時髙門臨長河出入重宫裏結友曹與何車馬相馳逐賔朋好容華陽春孟春月朝光散流霞輕歩逐芳風言笑弄丹葩暉暉朱顔酡紛紛織女梭滿堂皆羙人目成對湘娥雖謝侍君閒明粧帶綺羅箏笛更彈吹髙唱好相和萬曲不闗心一曲動情多欲知情厚薄更聽此聲過代貧賤愁苦行湮沒雖死悲貧苦卽生劇長歎至天曉愁苦窮日夕盛顔當少歇鬢髪先老白親友四靣絶朋知斷三益空庭慙樹萱藥餌媿過客貧年忘日時黯顔就人惜俄頃不相酬恧怩靣巳赤或以一金恨便成百年隙心為千條計事未見一獲運圯津塗塞遂轉死溝洫以此窮百年不知還窀穸代邊居行少年逺亰一作荆陽遥遥萬里方陋巷絶人徑茅屋摧山崗不覩車馬迹但見麋鹿場長松何落落丘隴無復行邊地無髙木蕭蕭多白楊盛年日月盡一去萬恨長悠悠世中人爭此錐刀忙不憶貧賤時富貴輒相忘紛紛徒滿目何闗慨予傷不如一畆中髙㑹挹清漿遇樂便作樂莫使候朝光代門有車馬客行門有車馬客問客何鄉士捷歩往相訊果得舊隣里悽悽聲中情慊慊増下理一作俚語昔有故悲論今無新喜清晨相訪慰日暮不能巳歡戚競尋緒談調何終止辭端竟未究忽唱分途始前悲尚未弭後感方復起嘶聲盈我口談言在君耳手迹可傳心願爾駕一作篤行李代悲哉行羇人感淑莭縁感欲回轍我行詎幾時華實驟舒結覩實情有悲瞻華意無恱覽物懷同志如何復乖别翩翩翔禽羅關關鳴鳥列翔鳴尚疇偶所歡獨乖絶代櫂歌行羇客離嬰時飄颻無定所昔秋寓江介兹春客河滸徃戢于役身願言永懷楚泠泠鯈躍潭邕邕鴈循渚飂戾長風振揺曵髙㠶舉驚波無留連舟人不躊竚代邽街行一夲作去邪行竚立出門衢遥望轉蓬飛蓬去舊根在連翩逝不歸念我捨鄉俗親好乆乖違慷慨懷長想惆悵戀音徽人生隨時變遷化焉可祈百年難必果千慮易盈虧代陳思王白馬篇白馬騂角弓鳴鞭乗北風要途問邊急雜虜入雲中閉壁自徃夏清野徑還冬僑裝多闕絶旅服少裁縫埋身守漢節沉命對胡封薄暮塞雲起飛沙披逺松含悲望兩都楚歌登四墉丈夫設計誤懷恨逐邊戎罷别中國愛邀冀胡馬功去來今何道卑賤生所鍾但令塞上兒知我獨為雄代陳思王京洛篇鳯樓十二重四户八綺窻繡桷金蓮花桂柱玊盤龍珠簾無隔露羅愰不勝風寳帳三千所為爾一朝容揚芬紫煙上垂綵緑雲中春吹回白日霜歌落塞鴻但懼秋塵起盛愛逐衰蓬坐視靑苔滿臥對錦筵空琴瑟縱横散舞衣不復縫古來共歇薄君意豈獨濃唯見雙黄鵠千里一相從代陸平原君子有所思行西上登雀臺東下望雲闕層閣肅天居馳道直如髪繡甍結飛霞璇題納行月築山擬蓬壼穿池類溟渤選色遍齊岱徴聲匝卭越陳鍾陪夕讌笙歌待明發年貌不可還身意㑹盈歇蟻壤漏山阿絲涙毁金骨器惡含滿欹物忌厚生没智哉衆多士服理辨昭昧代白紵曲二首朱唇動素袖舉洛陽少童一作年邯鄲女古稱緑水今白紵催絃急管為君舞窮秋九月荷葉黄北風驅雁天雨霜夜長酒多樂未央春風澹蕩俠思多天色淨渌氣妍和含桃紅蕚蘭紫芽朝日灼爍發園華巻幌結帷羅玊筵齊謳秦吹盧女絃千金顧笑買芳年代白紵舞歌詞四首奉始興三神作并啟侍郎臣鮑照啟被教作白紵舞歌詞謹竭庸陋裁為四曲附啟上呈識方淟悴思塗猥局言既無雅聲未能文不足以宣贊聖㫖抽抜妙實謹遣簡餘慙隨悚盈謹啟詞吳刀楚製為佩褘纎羅霧縠垂羽衣含商咀徴歌露晞珠履颯沓紈紬飛淒風夏起素雲回車怠馬煩客忘歸蘭膏明燭承夜暉桂宫栢寢擬天居朱爵文窻韜碧䟽象牀瑤席鎮犀渠雕屏合匝組帷一作帳舒秦箏趙瑟挾笙竿垂璫散佩盈玊除停觴不御欲誰須三星參差露霑濕絃悲管清月將入寒光蕭條候蟲急荆王流歎楚妃泣紅顔難長時易戢凝華結綵久延立非君之故豈安集池中赤鯉庖所捐琴髙乗去飛上天命逢福世丁溢恩簪金藉綺昇曲筵恩厚徳深委如山潔誠洗志期暮年烏白馬角寜足言鮑明逺集巻三
