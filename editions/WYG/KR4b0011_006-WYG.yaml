  text: 欽定四庫全書
  hash: sha256:64d9ff2e7643d8cd3464e7f4c9e75c7d6d85eb6ee80c540d6dcbeeab187b9ddc
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4b0011_WYG_006-1a, image: WYG1063/WYG1063-0586a.png}
body:
  text: 鮑明逺集巻六宋鮑照撰行京口至竹里髙柯危且竦鋒石横復仄複澗隱松聲重崖伏雲色冰閉寒方壯風動鳥傾翼斯志逢凋嚴孤遊值曛逼兼塗無憇鞍半菽不遑食君子樹令名細人効命力不見長河水清濁俱不息登飜車峴髙山絶雲霓深谷斷無光晝夜淪霧雨冬夏結寒霜淖坂既馬嶺磧路又羊腸畏塗疑旅人忌轍覆行箱昇岑望原陸四眺極川梁遊子思故居離客遲新鄉新知有客慰追故遊子傷冬日嚴風亂山起白日欲還次曛霧蔽窮天夕隂晦寒地煙霾有氛氳清光無明異風急野田空饑禽稍相棄含生共通閉懷賢敦為利天規茍平圓寧得已偏媚寫海有歸潮衰容不還稚君今且安歌無念老方至詠史五都矜財雄三川養聲利百金不市死明經有髙位京城十二衢飛甍各鱗次仕子彯華纓遊客竦輕轡明星晨未晞軒蓋已雲至賔御紛颯沓鞍馬光照地寒暑在一時繁華及春媚君平獨寂寞身世兩相棄從庾中郎遊園山石室荒塗趣山楹雲崖隱靈一作虚室崗澗紛縈抱林障沓重密昬昬磴路深活活梁水疾幽隅秉晝燭地牖窺朝日怪石似龍章瑕璧麗錦質洞庭安可窮漏井終不溢沈空絶景聲崩危坐驚慄神化豈有方妙象竟無述至哉鍊玉人處此長自畢自礪山東望震澤瀾漫潭洞波合沓崿嶂雲漲島逺不測崗澗近難分幽篁愁暮見思鳥傷夕聞以此藉沈痾棲迹別人羣結言非盡書有念豈敷文登雲陽九里埭一作塜宿心不復歸流年抱衰疾既成雲雨人悲緒終不一徒憶江南聲空録齊后瑟方絶縈絃思豈見繞梁日與伍侍郎別民生如野鹿知愛不知命飲齕具攢聚翹陸歘驚迸傷我慕類心感爾食苹性漫漫鄢郢塗渺渺淮海逕子無金石質吾有犬馬病憂樂安可言離會孰能定欽哉慎所宜砥徳乃為盛貧游不可忘久交念敦敬呉興黄浦亭庾中郎別風起洲渚寒雲上日無輝連山眇烟霧長波迥難依旅鴈方南過浮客未西歸已經江海別復與親眷違奔景易有窮離袖安可揮懽觴為悲酌歌服成泣衣溫念終不渝藻志逺存追役人多牽滯顧路慙奮飛昧心附逺翰烱言藏佩韋送別王宣城發郢流楚思涉淇興衛情既逢青春獻復值白蘋生廣望周千里江郊藹微明舉爵自惆悵歌管為誰清潁隂騰前藻淮陽流昔聲樹道慕髙華屬路佇深馨送從弟道秀別參差生密念躑躅行思凝疑疑一作悲思戀光景密念盈一作彌歲時歲時多阻折光景乏安怡以此苦風情日夜驚懸旗登山臨朝日揚袂別所思浸淫旦潮廣瀾漫宿雲滋天隂懼先發路逺常早辭篇詩後相憶杯酒今無持游子苦行役冀會非逺期贈傅都曹別輕鴻戲江潭孤鴈集洲沚邂逅兩相親縁念共無已風雨好東西一隔頓萬里追憶栖宿時聲容滿心耳落日川渚寒愁雲繞天起短翮不能翔徘徊烟霧裏和傅大農與僚故別絶節無緩響傷鴈有哀音非同年歲意誰共別離心伊昔謬通塗冠屣預人林浮江望南嶽登潮窺海隂孰謂游居淺慕美久相深萋萋春草秀嚶嚶喜候禽辰物盡明茂尊盛獨幽沈之子安所適我方栖舊岑墜歡豈更接明愛邈難尋送盛侍郎餞候亭霑霜襲冠帶驅駕越城闉北臨出塞道南望入鄉津高墉宿寒霧平野起秋塵君為坐堂子我乃負羇人欣悲豈等志甘苦誠異身結睇園中草憔悴悲此春與荀中書别勞舟厭長浪疲斾倦行風連翩感孤志契濶傷賤躬親交篤離愛眷戀置酒終敷文勉征念發藻慰愁容思君吟涉淆撫已謡渡江慙無黄鶴翅安得久相從願遂宿知意不使舊山空喜雨奉勑作營社達羣隂屯雲揜積陽河井起龍蒸日魄斂遊光族雲飛泉室震風沈羽鄉升雰浹地維傾潤㵼天潢平灑周海嶽曲潦溢川莊驚雷鳴桂渚迴涓流玉堂珍木抽翠條炎卉擢朱芳闗市欣九賦京廩開萬箱無謝堯為君何用知柏篁詠蕭史蕭史愛少年嬴女􅈔童顔火粒願排棄霞霧好登攀龍飛送天路鳳起出秦闗身去長不返簫聲時往還贈故人馬子喬六首躑躅城上羊攀隅食𤣥草俱共日月輝昬明獨何早夕風飄野籜飛塵被長道親愛難重見懷憂坐空老其二寒灰滅更燃夕華晨更鮮春冰雖暫解冬水復還堅佳人捨我去賞愛長絶縁歡至不留日感物輒傷年其三松生隴坂上百尺下無枝東南望河尾西北隱崑崖野風振山籟朋鳥夜驚離悲涼貫年節䓗翠恒若斯安得草木心不怨寒暑移其四種橘南池上種杏北池中池北既少露池南又多風早寒逼晩歲衰恨滿秋容湘濵有靈鳥其字曰鳴鴻一挹繒繳痛長別逺無雙其五皎如川上鵠赫似握中丹宿心誰不欺明白古所難憑楹觀皓露灑酒盪憂顔永念平生意窮光不忍還淹留徒攀桂延佇空結蘭其六雙劍將離别先在匣中鳴煙雨交將夕從此忽分形雌沈呉江裏雄飛入楚城呉江深無底楚闕有崇扃一為天地別豈直限幽明神物終不隔千祀儻還并鮑明逺集巻六
