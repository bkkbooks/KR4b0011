  text: 鮑氏集卷第二
  hash: sha256:13c5c0c7f904d67b9b667752fcbce1989528a353837fb16cb6b9f3b313398e45
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4b0011_SBCK_002-1a}
body:
  text: 尺蠖賦觀漏賦野鵝賦傷逝賦園葵賦尺蠖賦智哉尺蠖觀機而作申非向厚屈非向薄當靜泉渟遇躁風驚起軒軀以曠跨伏累氣而併形氷炭弗觸鋒刃歷迕逢嶮蹙蹐值夷舒歩忌好退之見猜哀必進而爲蠧毎驤首以瞰途常佇景而飜露故身不豫託地無前期動靜必觀於物消息各隨乎時從方而應何慮何思是以軍筭慕其權國容擬其變髙賢圖之以隱淪智士以之而藏見笑靈虵之久蟄羞龍德之方戰理害道而爲尤事傷生而感賤苟見義而守勇豈專取於弦箭觀漏賦并丙客有觀於漏者退而歎曰夫及逺者箭也而定逺非箭之功爲生者我也而制生韭我之情故自箭而爲心不可慿者絃因生以觀我不可恃者馬慿其不可恃故以悲哉況乎沉華密逺輕波潛耗而感神嬰慮者又自外而傷壽以是思生生亦勤矣乃爲賦云佩流歎於驗年纓華思於奔月結蘭苕以望楚弄參差以歌越撫凝肌於遷滯鑑雕容於髣髴景有墜而易昬憂無方而難歇歴玫階而升隩訪金壷之盈闕觀騰波之吞冩視驚箭之登沒箭旣沒而復登波長㵼而弗歸注沉穴而海漏射懸塗而電飛墐戸牗而知天掩雲霧而測暉創百齡於纎隱積千里於空微彼崢崢而行溢此冉冉而逾衰撫寸心而未改指分光而永違昔傷矢之奔禽聞虚弦之顚仆徒嬰刄而知懼豈濳機之能覺惟生經之靃靡亦悲長而懽促横證古而秉心抱空意其如玉波沉沉而東注日滔滔而西屬落繁馨於纎草殞豐華於喬木對􅉴離而後歌㨿窮蹊而方哭雖接薪之更傳寜絶明之還續貫古今而并念信寡易而多難時不留乎激矢生乃急於走丸旣河源之莫壅又吹波而助瀾神怵逈而多慮心􆄛􅰬而尠歡望天涯而佇念擢雄劒而長歎嗟生民之永迷躬與後而皆恤死零落而無二生差池之非一理幽分於化前筭冥定於天秩與艾骨而招病猶刳腸而興疾情殊用而俱盡事離方而同失聊弭志以高歌順煙雨而沉逸於是隨秋鴻而汎渚逐春鷰而登梁進賦詩而展念退陳酒以排傷物不可以兩大得無得而雙昌薫晚華而後落槿早秀而前亡姑屏憂以愉思樂茲情於寸光從江河之紆直委天地之回方漏盈兮漏虚長無絶兮芬芳野鵝賦并序有獻野鵝於臨川王世子愍其樊縶命爲之賦其辭曰集陳之隼以自逺而稱神栖漢之雀乃出幽而見珍此璅禽其何取亦厠景而承仁捨水澤之驩逸對鍾鼓之悲辛豈狥利而輕命將感愛而投身入長羅之逼脅恨髙繳之樊縈邈辭朋而别偶超煙鶩而風行跨日月而遥逝忽瞻國而望城踐菲迹於瑤塗昇弱羽於丹庭震東西之繡戶眺左右之金扄貌纎殺而含一作悆悴心翻越而慙驚若墜而墮谷怳不知其所寜惟君囿之珍麗實妙物之所殷翔海澤之輕鷗巢天宿之鳴鶉鶡程材於梟猛翬薦體之雕文旣敷容以照景亦選翮以排雲雖居物以成偶終在我以非群望征雲而延悼顧委翼而自傷無青雀之衘命乏赤鴈之嘉祥空穢君之園池徒慙君之稻梁願引身而剪迹抱末志而幽蔵於是流歳遂逺慘節方崇雲纒海岱風拂崤潼飛雲一作雰馳霰飄沙舞蓬視清池之初涸望緑林之始空立菰蒲之寒渚託隻影而爲雙宛㧞啄而掩眥悲結悵而滿胷處朝晝而雖念假外見而遷排渉翛夜之長寂信專思而知哀風梢梢而過樹月蒼蒼而照䑓氷依岸而早結霜託草而先摧歛雙翮於水裔翹孤趾於林隈情無方而雨集事有限而星乖在俄頃而猶悼矧窮生之所懷聞宿世之高賢澤無微而不均育草木而明義愛禽鳥而昭仁全殞卵而來鳯放乳麑而感麟雖陋生於萬物若沙漠之一塵苟全軀而畢命庶魂報以自申傷逝賦晨登南山望美中阿露團秋槿風卷寒蘿悽愴傷心悲如之何盡若窮煙離若剪絃如影滅地猶星殞天棄華宇於明世閉金扄於下泉永山河以自畢眇千齡而弗旋思一言於向時邈衆代於古年逝稍逺而變體浸幽明而改時覽篇迹之如旦婉遺意而在兹忽若謂其不然自惆悵而驚疑循堂廡而下降歷幃戸而升基服委襟而禠帶器蒙管而韜絲志存業而遺績身先物而長辭豈重歡而可覯追前感之無期寒徃暑來而不窮哀極樂反而有終燧巳遷而禮革月旣逾而慶通心微微而就逺跡離離而絶容白日藹而回隂閨館寂而深重冀慿靈於前物佇美目乎房櫳徒望思以永久邈歸來其何從結單心於暮條掩行淚於晨風念沉悼而誰劇獨嬰哀於逝躬草忌霜而逼秋人惡老而逼衰誠衰耄之可忌或甘願而志違彼一息之短景乃累恨之長暉㝷平生之好醜成黃塵之是非將滅耶而尚在何有去而無歸惟桃李之零落生有促而非夭觀龜鵠之千祀年能富而情少反靈質於二塗亂感恱於雙抱日月飄而不留命倐忽而誰保譬明隙之在梁如風露之停草髪迎憂而送華貌先悴而收藻共甘苦其㡬人曾無得而偕老拂埃琴而抽思啓陳書而遐討自古來而有之夫何怨乎天道園葵賦風暖凌開土冒泉動㳺塵曝日鳴雉依隴主人拂黃冠拭藜杖布𬞞種平圻壤通畔修直膏畒夷敞白莖紫蔕豚耳鴨掌溝東陌西行三畦兩旣區旣鉏乃露乃映勾萌欲伸藂牙將散爾乃晨露夕隂霏雲四委沉雷逺震飛雨輕灑徐未及晞疾而不靡柔莩爰秀剛甲以解稚葉萍布弱隂􅔡抽萋萋翼翼沃沃油油下葳蕤而𬒳逕上參差而覆疇承朝陽之麗景得傾柯之所投仕非魯相有不㧞之利賓惟二仲無逸馬之憂顧堇荼而莫偶豈蘋藻之薦羞若乃鄰老談稼女嫗歸桑拂此葦席炊彼穄梁甃壷援醢曲瓢卷漿乃羹乃瀹堆鼎盈筐甘㫖蒨脆柔滑芬芳消淋逐水潤胃調腸於是旣飫徹盤投筯囘小人之腹爲君子之慮近觀物運逺訪師聖聲數後彰律理前定烏非黔黒鶴豈浴浄彼圓行而方止固行之於天性伊冬􅝍而夏裘無雙功而並盛盪然任心樂道安命春風夕來秋日一作秋月晨映獨酌南軒擁琴孤聽篇章間作以歌以詠魚深沉而鳥高飛孰知美色之爲正鮑氏集卷第二鮑氏集卷第二
