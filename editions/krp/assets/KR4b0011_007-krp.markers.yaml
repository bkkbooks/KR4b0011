  - {type: variant, offset: 1378, length: 461, content: 玉䑓紫煙逰鳯閣碧樓舎夜月紫殿争朝光綵墀散蘭麝風起自生芳白日照前窓玲瓏綺羅中美人掩輕扇含思歌春風三五容色滿四五妙華歇巳輸春日歡分隨秋光設北岀湖邉戲前還苑中逰飛縠繞長松馳管逐波流九月秋水清三月春花滋千金逐良日皆競中興時窮泰巳有分壽天復屬天旣見中興樂莫持憂自煎襄陽是小地壽陽非帝城今日中興樂遥治在上亰梅花一時艷竹葉千年色願君松栢心採照無窮極呉歌二首夏口樊城岸魯都却丹樓觀見流水還識是儂淚流人言荆江狹荆江定自闊五兩了無聞風聲郍得逹與謝尚書莊三連句霞輝兮澗朗日靜兮川澄風輕桃欲開露重蘭未勝水光溢兮松霧動山煙疊兮石露凝晻映晨物綵連綿夕羽興在荆州與張史君李居士連句橋磴支古轍篁路拂輕鞍三尹無喜色一適或垂竿月下登樓連句髴髣拂月光繽紛篁霧隂樂來亂憂念酒至歇憂心鮑博士露入覺牗髙劳深測苑深清氣澄永夜流吹不可臨王延秀密峯集浮碧踈瀾道瀛潯嗽玉延幽性扳桂藉知音荀原之辰意事淪晦良歡戒勿祲昭景有遣駟孤賈無留金荀中書萬秋字謎三首二形二體四支八頭四八二八飛泉仰流頭如刀尾如鉤中央横廣四角六抽右面負兩刃左邊雙屬牛乾之一九隻立無偶坤之二六宛然雙宿鮑氏集卷第七, WYG: 撰}
