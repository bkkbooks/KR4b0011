  - {type: variant, offset: 6, length: 3, content: 奉敕撰, WYG: 始編次成集隋書經籍志著録十巻而註曰梁六巻然則後人又續增矣此本為明正徳庚午朱應登所刋云得自都穆家巻數與隋志合而冠以炎序未審即隋志舊本否考其編次既以樂府别為一巻而采桑梅花落行路難亦皆樂府乃别入詩中唐以前人皆解聲律不應舛互若此又行路難第七首蹲蹲字下註曰集作樽樽啄字下註曰集作逐使果原集何得又稱集作此為後人重輯之明驗矣然文章皆有首尾詩賦亦往往有自序自註與六朝他集從類書採出者不同殆因相傳舊本而稍為竄亂歟鍾嶸詩品云學鮑照纔能日中市朝滿學謝朓劣得黄鳥度青枝今集中無此一句益知非梁時本也乾隆四十六年十月恭校上總纂官臣紀昀臣陸錫熊臣孫士毅總校官臣陸費墀鮑明逺集原序}
