  - {type: variant, offset: 4, length: 0, content: '', WYG: 中本上黨人之語照或作昭盖唐人避武后諱所改韋莊詩有欲將張翰松江雨畫作屏風寄鮑昭句押入平聲殊失其實案宋禮部貢舉條式稱齊桓避諱作齊威可用於句中不可押入㣲韻知此詩押作鮑昭之非沈約宋書李延夀南北史作于武后稱制前者實皆作照不作昭也照為臨川王子頊參軍没于亂兵遺文零落齊}
