  text: 鮑氏集卷第一
  hash: sha256:71c06ce223e3feaed27685aa6bfde1101b6f801ae11d2c2f9dbefeaf5e3a018c
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4b0011_SBCK_001-1a}
body:
  text: 舞鶴賦蕪城賦芙蓉賦逰思賦飛蛾賦舞鶴賦散幽經以驗物偉胎化之仙禽鍾浮曠之藻質抱清逈之明心指蓬壼而飜翰望崑閬而揚音匝日域以廻騖窮天歩而高㝷踐神區其旣逺積靈祝而方多精含丹而星耀頂凝紫而煙華引圓吭之纎婉頓脩趾之鴻姱疊霜毛而弄影振玉羽而臨霞朝戯於芝田夕飲乎瑤池厭江海而遊澤掩雲羅而見羈去帝鄕之岑寂歸人寰之喧卑歳崢嶸而催暮心惆悵而哀離於是窮隂殺節急景凋年涼沙振野箕風動天嚴嚴苦霧皎皎悲泉氷塞長河雪滿群山旣而雰昏夜歇景物澄廓星飜漢回曉月將落感寒鷄之早晨憐霜鴈之違漠臨驚風之蕭條對流光之照灼唳青響於丹墀舞容飛於金閣始連軒以鳯蹌終宛轉而龍躍躑躅徘徊振迅騰摧驚身蓬集矯翅雪飛離網别赴合渚相依將興中止若徃而歸䬃沓矝顧遷延遲暮逸翮後塵翶翥先路指㑹䂓翔臨𡵨矩歩態有遺妍貌無停趣奔機逗節角睞分形長揚一作揚翹緩鶩並翼連聲輕迹凌亂浮影交横衆變繁姿參差洊密煙交霧凝若無毛質風去雨還不可談悉旣散魂而盪目迷不知其所之忽星離而雲罷整神容而自持仰天居之崇絶更惆惕而驚思當是時也燕姬色沮巴僮心恥巾拂兩停丸劒雙止雖邯鄲其敢倫豈陽阿之能擬入衞國而乗軒出吳都而傾市守馴養於千齡結長悲於萬里蕪城賦登廣陵城作濔迆平原南馳蒼梧漲海北走𬗋塞鴈門拖以漕渠軸以崑崗重關複江之奥四會五逹之莊當昔全盛之時車掛轊人駕肩㕓閈撲地歌吹沸天孳貨鹽田鏟利銅山才力雄富士馬精妍故能侈秦法佚周令劃崇墉刳濬洫圖修世以休命是以板築雉堞之殷井幹烽櫓之勤格高五嶽袤廣三墳崪若斷岸矗似長雲製磁石以禦衝糊頳壤以飛文觀基扃之固護將萬祀而一君出入三代五百餘載竟瓜割而豆分澤葵依井荒葛罥途壇羅虺蜮階鬪麕鼯木魅山鬼野䑕城狐風嘷雨嘯昏見晨趨饑鷹礪吻寒鴟嚇雛伏暴藏虎乳血餐膚崩榛塞路峥嶸古馗白楊早落塞草前衰稜稜霜氣蔌蔌風威孤蓬自振驚沙坐飛灌莾杳而無際叢薄紛其相依通池旣巳夷峻隅又巳頽直視千里外唯見起黃埃凝思寂聽心傷巳摧若夫藻扃黼帳歌堂舞閣之基璇淵碧樹弋林釣渚之館吳蔡齊秦之聲魚龍爵馬之玩皆薫歇燼滅光沉響絶東都妙姬南國佳人蕙心紈質玉貌絳脣莫不埋魂幽石委骨窮塵豈憶同輦之愉樂離宫之苦辛哉天道如何吞恨者多抽琴命操爲蕪城之歌歌曰邉風起兮城上寒井徑㓕兮丘隴殘千齡兮萬代共盡兮何言芙蓉賦感衣裳於楚賦詠憂思於陳詩訪群英之艶絶標高名於澤芝㑹春陂乎夕張搴芙蓉而水嬉抽我袊之桂蘭點子吻之瑜辭選群芳之徽號抱兹性之清芬禀若華之驚絶單蓲陽之妙手測淲池之光噄爍􅊮輝之明媚粲雕霞之繁恱顧椒丘而非偶豈園桃而能埒彪炳以蒨藻翠景而紅波青房兮規接紫的兮圓羅樹妖遥之弱幹散菡蓞之輕荷上星光而倒景下龍鱗而隱波戯錦鱗而夕暎曜繡羽以晨過結遊童之湘吹起榜妾之江歌備日月之温麗非盛明而謂何若乃當融風之暄盪承暑雨之平渥𬒳瑶塘之周流繞金渠之屈曲排積霧而楊芬鏡洞泉而含緑葉折水以爲珠條集露而成玉潤蓬山之瓊膏輝䓗河之銀燭冠五華於仙草超四照於靈木雜衆姿於開卷閱群貌於昏明無長䄂之容止信不笑之空城森𬗋葉以上擢紛湘蘂而不傾根雖割而琯徹柯旣解而絲縈感盛衰之可懷質始終而常清故其爲芳也綢繆其爲媚也奔發對粧則色姝比蘭則香越泛明綵於宵波飛澄華於曉月陋荆姬之朱顔笑夏女之光髪恨狎世而貽賤徒愛存而賞没雖凌群以檀奇終從歳而零歇逰思賦雲徑兮海衝上潮兮送風秋水兮駕浦涼煙兮冐江暮氣起兮逺岸黒陽精滅兮天際紅波沄沄兮無底山森森兮萬重平隰兮亘岸通川兮㵼壑仰盡兮天經俯窮兮地絡望波際兮曇曇眺雲間兮灼灼乃江南之斷山信海上之飛鶴指煙霞而問鄕窺林嶼而訪泊撫身事而識苦念親愛而知樂苦與樂其何言悼人生之長役捨堂宇之密親坐江潭而爲客對蒹葭之遂黃視零露之方白鴻晨驚以響湍泉夜下而鳴石結中洲之雲蘿託綿思於遥夕瞻荆吳之逺山望邯鄲之長陌塞風馳兮邉草飛胡沙起兮鴈揚翮雖燕越之異心在禽鳥而同戚悵收情而抆淚遣繁悲而自抑此日中其㡬時彼月滿而將蝕生無患於不老奚引憂以自逼物因節以卷舒道與運而升息賤賣卜以當壚隱我耕而子織誠愛秦王之奇勇不願絶筋而稱力巳矣哉使豫章生而可知夫何異乎叢棘飛蛾賦仙䑕伺闇飛蛾候明均靈舛化詭欲齊生觀齊生而欲詭各會住以慿方陵燋煙之浮景赴熈𦦨之明光㧞身幽草下畢命在此堂本輕死以邀得雖糜爛其何傷豈學山南之文豹避雲霧而巖藏鮑氏集卷第一鮑氏集卷第一
