body:
  text: 代東武吟一本已下並無代字代出自薊北門行代結客少年埸行代東門行代苦熱行代白頭吟代蒿里行代放歌行代昇天行代别鶴操代雉朝飛代淮南王二首代空城雀代鳴鴈行代夜坐吟代北風涼行代春日行代少壯時至衰老行代陽春登荆山行荆一作京代朗月行代堂上歌代貧賤愁苦行代邉居行代門有車馬客行代悲哉行代櫂歌行代邽街行一本作去邪行代陳思王白馬篇代陳思王京洛篇代陸平原君子有所思行代白紵曲二首代白紵舞歌詞四首奉始興王命作并啓代東武吟主人且勿諠賤子歌一言僕本寒鄕士出身蒙漢恩始隨張校尉召募到河源後逐李輕車追虜出塞垣密塗亘萬里寜歳猶七奔肌力盡鞍甲心思歷涼温將軍旣下世部曲亦罕存時事一朝異孤績績一作憤誰復論少壯辭家去窮老還乆門腰鎌刈葵藿倚杖牧鷄豚昔如韝上鷹今似檻中猿徒結干載恨空負百年怨棄席思君幄疲馬戀君軒願垂晉主惠不媿田子魂代出自薊北門行羽檄起邉亭烽火入咸陽徴師屯廣武分兵救朔方嚴秋筋竿勁虜陣精且彊天子按劒怒使者遥相望鴈行縁石徑魚貫渡飛梁簫皷流漢思旌甲𬒳胡霜疾風衝塞起沙礫自飄揚馬毛縮如蝟角弓不可張時危見臣節世亂識忠良投軀報明主身死為國殤代結客少年塲行􅍡馬金絡頭錦帶佩吳鉤失意杯酒間白刃起相讎追兵一旦至負劒逺行遊去鄕三十載復得還舊丘昇髙臨四關表裏望皇州九塗平若水雙闕似雲浮扶宫羅將相夾道列王侯日中市朝滿車馬若川流擊鍾陳鼎食方駕自相求今我獨何爲塪壈懷百憂代東門行傷禽惡弦驚一作驚弦倦客惡離聲離聲斷客情賓御背涕零涕零心斷絶將去復還訣一息不相知何況異鄕别遥遥征駕逺杳杳白日晚居人掩閨卧行子夜中飯野風吹秋木行子心腸斷食梅常苦酸衣葛常苦寒絲竹徒滿坐憂人不解顔長歌欲自慰彌起長恨端代苦熱行赤坂横西阻火山赫南威身熱頭且痛鳥墜魂來歸湯泉發雲潭焦煙起石圻一作磯日月有恒昬雨露未嘗晞丹蛇踰百尺玄蜂盈十圍含沙射流影吹蠱病行暉瘴氣晝薫體草露夜霑衣饑猨莫下食晨禽不敢飛毒涇尚多死渡瀘寜具腓生軀蹈死地昌志登禍機戈船榮旣薄伏波賞亦微爵輕君尚惜士重安可希代白頭吟直如朱絲繩清如玉壷氷何慙宿昔意猜恨坐相仍人情賤恩舊世議逐衰興毫髪一爲瑕丘山不可勝食苗實碩䑕點一作玷白信蒼蠅鳬鵠逺成美薪芻前見陵申黜襃女進斑去趙姬昇周王日淪惑漢帝益嗟稱心賞猶難恃貌恭豈易慿古來共如此非君獨撫膺代蒿里行同盡無貴賤殊願有窮申馳波催永夜零露逼結晨短我幽山駕去此滿堂親虚容遺劒佩實貌戢衣巾斗酒安可酌尺書誰復陳年代稍推逺懷抱日幽淪人生良自劇天道與何人齎我長恨意歸爲狐兎塵代放歌行蓼蟲避葵堇習苦不言排小人自齷齪安知曠士懷鷄鳴洛城裏禁門平旦開冠蓋縱横至車騎四方來素帶曳長飈華纓結逺埃日中安能止鐘鳴猶未歸夷世不可逢賢君信愛才明慮自天斷不受外嫌猜一言分珪爵片善辭草萊豈伊白璧賜將起黃金䑓今君有何疾臨路獨遲廻代昇天行家世宅關輔勝帶宦王城備聞十帝事委曲兩都情倦見物興衰驟覩俗屯平翩翻若回掌怳愡似朝榮窮途悔短計晚志重長生從師入逺嶽結友事仙靈五圖發金記九籥隱丹經風餐委松宿雲卧恣天行冠霞登綵閣解玉飲椒庭蹔逰越萬里少别數千齡鳯䑓無還駕簫管有遺聲何時與汝曹啄腐共吞腥代别鶴操雙鶴俱起時徘徊滄海間長弄若天漢輕軀似雲懸幽客時結侣提擕逰三山青繳凌瑶䑓丹羅籠紫煙海上悲風急三山多雲霧散亂一相失驚孤不得住𬗟然日月馳逺矣絶音儀有願而不遂無怨以生離鹿鳴隱深草蟬鳴隱高枝心自有所存旁人郍得知代雉朝飛雉朝飛振羽翼專埸挾兩一本下有雌字恃彊力媒巳驚翳又逼黄間濳彀盧矢直刎繡頸碎錦臆絶命君前無怨色握君手執杯酒意氣相傾死何有代淮南王二首淮南王好長生服食練氣讀仙經琉璃作椀牙作盤金鼎玉七合神丹合神丹戯紫房𬗋房綵女弄明璫鸞歌凰舞㫁君腸朱城九門門九閨願逐明月入君懷入君懷結君佩怨君恨君恃君愛築城思堅劒思利同盛同衰莫相棄代空城雀雀乳四鷇空城之阿朝食野粟夕飲冰河高飛畏鴟鳶下飛畏網羅辛傷伊何言怵迫良巳多誠不及青鳥逺食玉山禾猶勝呉宫鷰無罪得焚窠賦命有厚薄長歎欲如何代鳴鴈行邕邕鳴鴈鳴始旦齊行命侣入雲漢中夜相失群離亂留連徘徊不忍散憔悴容儀君不知辛苦風霜亦何爲代夜坐吟冬夜沉沉夜坐吟含聲未發巳知心霜入幕風度林朱燈滅朱顔㝷體君歌逐君音不貴聲貴意深代北風涼行北風涼雨雪雱京洛女兒多嚴粧遥豔帷中自悲傷沉吟不語若有忘問君得行何當歸苦使妾坐自傷悲慮年至慮顔衰情易逺恨難追代春日行獻歳發吾將行春山茂春日明園中鳥多嘉聲梅始發桃始青汎舟艫齊櫂驚奏採菱歌鹿鳴風微起波微生絃亦發酒亦傾入蓮池折桂枝芳神動芬葉披兩相思兩不知代少年時至衰老行憶昔少年時馳逐好名晨結友多貴門出入富兒鄰綺羅艶華風車馬自揚塵歌唱青琴女彈箏燕趙人好酒多芳氣餚味厭時新今日每相念此事邈無因寄語後生子作欒當及春代陽春登荆山行荆一作京旦登荆山頭崎嶇道難㳺早行犯霜露苔滑不可留極眺入雲表窮目盡帝州方都列萬室層城帶高樓奕奕朱軒馳紛紛高衣流日氛映山浦暄霧逐風收花木亂平原桑柘盈一作緜平疇攀條弄𬗋莖藉露折芳柔遇物雖成趣念者不解憂且共傾春酒長歌登山丘代朗月行朗月出東山照我綺窓前窓中多佳人𬒳服妖且妍靚粧坐帳裏當戶弄清絃鬢奪衞女迅體絶飛燕先爲君歌一曲當作朗月篇酒至顔自解聲和心亦宣千金何足重所存意氣間代堂上歌行四坐且莫諠聽我堂上歌昔仕京洛時高門臨長河出入重宫裏結友曹與何車馬相馳逐賓朋好容華陽春孟春月朝光散流霞輕歩逐芳風言笑弄丹葩暉暉朱顔􅋳紛紛織女梭滿堂皆羙人自我對湘娥雖謝侍君閑明粧帶綺羅箏笛更彈吹高唱好相和萬曲不關心一曲動情多欲知情厚薄更聽此聲過代貧賤愁苦行湮沒雖死悲貧苦即生劇長歎至天曉愁苦窮日夕盛顔當少歇鬢髪先老白親友四面絶朋知斷三益空庭慙樹萱藥餌媿過客貧年忘日時黯顔就人惜俄頃不相酬恧怩面已赤或以一金恨便成百年隙心爲千條計事未見一獲運圯津塗塞遂轉死溝洫以此窮百年不如還窀穸伐邉居行少年逺亰一作荆陽遥遥萬里方陋巷絶人徑茅屋摧山崗不覩車馬迹但見糜鹿埸長松何落落丘隴無復行邉地無高木蕭蕭多白楊盛年日月盡一去萬恨長悠悠世中人争此錐刀忙不億貧賤時富貴輒相忘紛紛徒滿目何關慨子傷不如一畒中高㑹挹清漿遇樂便作樂莫使候朝光代門有車馬客行門有車馬客問客何鄕士捷歩徃相訊果得舊鄰里悽悽聲中情慊慊増下理一作俚語昔有故悲論今無新喜清晨相訪慰日暮不能巳歡戚競㝷緒談調何終止辭端竟未䆒忽唱分途始前悲尚未弭後感方復起嘶聲盈我口談言在君耳手迹可傳心願爾駕一作䔍行李代悲哉行羇人感淑景縁感欲回轍我行詎㡬時華實驟舒結覩實情有悲瞻華意無恱覽物懷同志如何復乖别翩翩翔禽羅關關鳴鳥列翔鳴尚疇偶所歎獨乖絶代櫂歌行羇客離嬰時飄颻無定所昔秋寓江介兹春客河滸徃戢于役身願言永懐楚泠泠篠䟽潭邕邕鴈循渚飂戾長風振摇曵高㠶舉驚波無留連舟人不躊竚代邽街行一本作去邪行竚立出門衢遥望轉蓬飛蓬去舊根在連翩逝不歸念我捨鄕俗親好乆乖違慷慨懷長想惆悵戀音徽人生隨時變遷化焉可祈百年難必果千慮易盈虧代陳思王白馬篇白馬騂角弓鳴鞭乗北風要途間邊急雜虜入雲中閉壁自徃夏清野徑還冬僑裝多闕絶旅服少裁縫埋身守漢節沉命對胡封薄暮塞雲起飛沙披逺松含悲望兩都楚歌登四墉丈夫設計誤懷恨逐邉戎罷别中國愛邀冀胡馬功去來今何道單賤生所鍾但令塞上兒知我獨爲雄代陳思王京洛篇鳯樓十二重四戸八綺窓繡桷金蓮花桂柱玉盤龍珠簾無隔露羅愰不勝風寳帳三千所爲爾一朝容揚芬紫煙上垂綵緑雲中春吹回白日霜歌落塞鴻但懼秋塵越盛愛逐衰蓬坐視靑苔滿卧對錦筵空琴瑟縱横散舞衣不復縫古來共歇薄君意豈獨濃唯見雙黃鵠千里一相從代陸平原君子有所思行西出登雀䑓東下望雲闕層閣肅天居馳道直如髮繡甍結飛霞璇題納行月築山擬蓬壼穿池類溟渤選色遍齊岱徴聲匝卭越陳鐘陪夕讌笙歌待明發年貌不可還身意會盈歇蟻壌漏山阿絲涙毀金骨器惡含滿欹物忌厚生沒智哉衆多士服理辨昭昧代白紵曲二首朱脣動素䄂舉洛陽少童一作年邯鄲女古稱緑水今白紵催絃急管爲君舞窮秋九月荷葉黃北風驅鴈天雨霜夜長酒多樂未央春風澹蕩俠思多天色凈緑氣研和含桃紅蕚蘭紫牙朝日灼爍發園華卷幌結帷羅玉筵齊謳秦吹盧女絃千金顧笑買芳年代白紵舞歌詞四首奉始興王神作并啓侍郎臣鮑照啓𬒳敎作白紵舞歌詞謹竭庸陋裁爲四曲附啓上呈識方淟悴思塗猥局言旣無雅聲未能文不足以宣賛聖㫖抽㧞妙實謹遣簡餘慙隨悚盈謹啓詞吳刀楚製爲佩褘纎羅霧縠垂羽衣含商咀徴歌露晞珠履颯沓紈䄂飛淒風夏起素雲囘車怠馬煩客忘歸蘭膏明燭承夜暉桂宫栢寢擬天居朱爵文窓韜碧䟽象牀瑤席鎮犀渠雕屏合匝組帷一作帳舒秦箏趙瑟挾笙竽垂璫散佩盈玉除停觴不御欲誰湏三星差池露霑濕絃悲管清月將入寒光簫條候蟲急荆王流歎楚妃泣紅顔難長時易戢凝華結綵乆延立非君之故豈妄集池中赤鯉庖所捐琴高乗去飛上天命逢福世丁溢恩簮金藉綺昇曲筵恩厚德深委如山潔誠洗志期暮年烏白馬角寜足言鮑氏集卷第三
