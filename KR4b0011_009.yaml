body:
  text: 鮑氏集卷第九為柳令謝驃騎表解褐謝侍郎表謝秣陵令表時為中書舍人謝賜藥啓謝永安令解禁止啓論國制啓謝上除啓通世子自解重與世子啓謝假啓二首侍郎上疏謝解禁止侍郎滿辭閣轉常侍上疏征北世子誕育上疏謝隨恩𬒳原表皇孫誕育上疏登大雷岸與妹書為栁令謝驃騎表臣言伏承詔書加臣驃騎將軍餘如故顧循空薄屢墜成命仰當天寵伏抱慙灼臣素陋人本絶分望適野謝山川之志輟耕無鴻鵠之歎宦希鄉部富期農牧夙當昌朝早值恩洽天綱紛橫皇曆歸聖左輪不殷良馬未汗功半下互爵超上賞奮迹騰光參駕龍服翰起雲飛拂翼虹路雖曩之脫駕拖紫捨檐丹轂方之微臣彼安足齒齊此而歸懼塵王度況遂頻煩重彰濫越伏願天德曲成資始令終雨露之惠自華及殞特屈慈奬降申愚固則綢繆之施復踰造物不勝感躍惶駭之情謹拜表以聞解褐謝侍郎表臣照言臣孤門賤生操無炯迹鶉棲草澤情不及官不悟天明廣矚騰滯援沉觀光幽節聞道朝年榮多身限思非終報臣云云謝秣陵令表時為中書舍人臣照言即日被尚書召以臣為秣陵令臣負插下農執羈末皂情有局塗志無逺立遘命逢天得汗官牒不悟恩澤無窮謬當奬試用謝刀筆猥承宰職豈是暗懦所能克任今便抵召違離省闥係戀罔極不勝下情謹拜表以聞謝賜藥啓臣衛躬不謹養命無術情淪五難妙謝尤法飈落先傷衰痾早及遐近臨猥委存恤同山嶽蒙靈藥之賜惠非河間謬仙使之屈恩逾脯糗惠重帷席荷對銜慙伏抱襟渥謝永安令解禁止啓臣田茅下第質非謝品志終四民希絶三仕邀世逢辰謬及推擇恩成曲積榮秩兼過雖誓投纎生昊天罔極迄無犬馬孤慙星歲加以淪節雪飈沉誠欵晦值天光燭幽神照廣察澡疊從宥與物更禀遂晞曬陽春湔汰秋水綴翼雲條葺鮮決沼洗膽明目抃手太平重甄再造含氣孰比不悟乾陶彌運復垂埏飾驕迹升等改觀非服振纓珥筆聯承貴寵豈臣浮朽所可恭從實非愚瞢所冝循踐瑣族易灰脆漏巳迫空荷載燾終貴仰復飲氷肅事懷火畢命不勝屏營之情謹啓事以聞論國制啓臣啓臣聞尺之量錦工者裁之袤丈之木繩墨在焉事無巨細非法不行當今世問政睦藩國相望君舉必書動成准式息躬聖壤十有餘載條制節文宜其備矣諸王列封動靜兼該而竊見國之處事未盡善臣之暗蔽私心有惜伏見彭城國舊制猶有數卷雖多殊革大綱可依愚謂冝令掌固刋而撰之上著朝典藩邦之度下揆國訓繁簡之誼傍酌州府寬猛之中章程久具永為恆制豈伊今美惟昔銜佩無巳但自無堪尸素纍載腹心之愧窹寐為憂令請解所職願蒙矜許自奉清塵于茲六祀墜辰永往遺恩在心執紙哽咽言不自宣重與世子啓奉還誨深承殷勤篤眷之重披讀未終悲愧交集僕以常人所蒙隆厚久應知退非適今日銜恩戀德用缺進心今者之請必願鑑許且僕棲遲無事咫尺館第餐稟風微非旦則夕居職還私兩者無異而於僕無用有以自處豈非仁念始終之惠重致于日彌深慙感謝假啓二首臣啓臣居家之治上漏下濕暑雨將降有懼崩壓比欲完葺私寡功力板插綯塗必須躬役冒欲請假三十日伏願天恩賜垂矜許千啓復追悚息謹啓臣啓臣所患彌留病願沉痼自近蒙歸頻更頓處日衣間困或數四委然一弊瞻景待化加以凶衰嬰遘慘終鮮兄弟仲由所哀臣實百罹孤苦夙雨天倫同氣實惟一妹存沒永訣不獲計見封瘞泉壤臨送私懷感恨情痛兼深臣母年老經離憂傷服麁食淡羸耗增疾心計焦迫進退罔躓冒乞申假百日伏願天慈賜垂矝許臣違福履身事屯悴歎息和景掩淚春風執啓涕結伏追惶悚謹啓侍郎上疏臣言臣北州衰淪身地孤賤衆善必逹百行無一生丁昌運自比人曹操乏端槩業謝成迹徂年空往瑣心靡述禠轡投簮於斯終志束菜負薪期與相畢安此定命忝彼公朝不悟乾羅廣收圓明兼覽雕瓠飾笙備雲和之品潢汗流藻充金鼎之實鎩羽暴鱗復見翻躍枯楊寒炭遂起煙華未識微躬猥能及此未知陋生何以為報祗奉恩命憂愧增灼不勝感荷屏營之情謹詣閣拜疏以聞謝解禁止臣言被宣令解臣禁止天光鄭重不可勝逢飛走知感矧臣人類臣聞獲過于神或慿尸祝以請得罪於君可因左右而謝臣自惟孤賤盜幸榮級暗澀大誼猖狂世禮竒非阮籍無保持之助才愧馮衍有之困自非聖朝超然覽臣於視聽之外則今日渥澤更成妄遭來辰萎葉終先朝草小人歲暮知能何報徒厚恩華憂懼歎息不任下情謹詣拜疏以聞侍郎滿辭閣臣言臣所居職限滿今便收迹金閨雲路從茲自逺鮪沉藏方絶光景祗戀遲回結涕濡泗臣嚚機窮賤情嗜蹖昧身弱㳙甃地幽井谷本應守業墾疁剿芿牧雞圈豕以給征賦而幼性猖狂因頑慕勇釋擔受書廢耕學文畫虎既敗學步無成反拙歸跂還陋燕雀日晏途繞塊然自喪加以無良根孤伎薄既同馮衍負困之纍復抱相如痟渴之疾志逐軍離事與襄合束馬埋輪絶遊息世宿福餘慶爰遘聖明煦蒸霜霰莩申雲落得從下走叨迹人行操勒負羇班榮扈隸矜愚訓短哀有弗及奉此而歸足以沒齒雖摩肌髮無報天德更冀營魂逺能結草不勝感戀之情謹詣闕拜疏奉辭以聞轉常侍上疏臣言即日𬒳中曹板轉臣為左常侍臣自惟常人觸事無可謬𬒳拔擢實為光榮臣既無髣佛上報殊絶之恩有分每豐其過前後輕重輒得原恕奬以君子之方赦其不間教訓大愆不責矜澤必加是臣所以夙夜自念知遭遇之至深至厚也未冀未望便荷今榮欣喜感恱不敢僞讓庶保終始身命為𥘉不勝下情謹詣閣拜疏謝以聞征北世子誕育上疏臣等言臣聞本枝無疆布諸前典衆多彌貴信之華封故德積則慶深業昌則祚廣伏承王子以中氣正月鍾靈納和誕躬紫閣祚朱紱弧矢夙陳圭璋攸覿雲光麗輝巖澤昭采嘉祥爰孚柔顔載睟凡在氓隸莫不抃恱臣霑恩踰物慶倍目中不勝殊歡溢喜謹奉表以聞謝隨恩𬒳原表臣言即日𬒳曹宣命元統內外五刑以下浩澤蕩汰臣亦預焉得從漢律故謬之辨暗遭周典肆眚之科大喜卒至非願所圖魚愕雞睨且悚且慙臣誠下愚不逹義方然君尊臣泰豈同犬馬且常侍臣淵穆疏草即臣所作助人為恭猶加敬憶自己率禮寧敢慢忘由臣悴賤可悔可誣殺曾參人臣豈無過寢病幽栖無援朝列身孤節卑易成論硋幸大明臨下仁道育物澤泊翾走臣覃末慶然古人有言楊者易生之木也一人植之十人拔之無生楊矣何則植之者難拔之者易況臣一植之功不立衆拔之過屢至同彼風霜異此貞脆書稱天秩有禮易載神福在謙臣之謙禮理謝福秩仰銜俯愧行歎坐戚即欲顚沛拜恩下庭但臣病久柴羸不堪冒涉小得趨馳星駕登路不勝荷佩之誠謹上疏以聞皇孫誕育上疏兼郎中令侍郎臣等言伏承東儲積慶皇孫誕育國啓昌期民迎福運臺禁稱祉井廬相賀伏惟聖懷載深鴻悆不任下情謹詣閣上疏以聞登大雷岸與妹書吾自發寒雨全行日少加秋潦浩汗山溪猥至渡泝無邊險徑逰棧石星飯結荷衣水宿旅客貧辛波路壯闊始以今日食時僅及大雷塗登千里日踰十晨嚴風慘節悲風斷肌去親為客如何如何向因涉頓慿觀川陸遨神清渚流涕方曛東顧三洲之隔西眺九派之分窺地門之絶景望天際之孤雲長圖大念隱心者久矣南則積山萬狀爭氣負高含霞飲景參差代雄凌跨長隴前後相屬帶天有匝橫地無窮東則砥原逺隰亡端靡際寒蓬夕卷古樹雲平旋風四起思鳥群歸靜聽無聞極視不見北則陂池潛演湖脉通連苧蒿攸積菰蘆所繁栖波之鳥水化之蟲智吞禺彊捕小號噪驚聒紛平其中西則回江永指長波天合滔滔何窮漫漫安竭創古迄今舳艫相接思盡波濤悲滿潭壑煙歸八表終為野塵而是注集長寫不測修靈浩蕩知其何故哉西南望廬山又特驚異基壓江潮峯與辰漢連接上常積雲霞雕錦褥若華夕曜巖澤氣通傳明散綵赫似絳天左右青靄表裏紫霄從嶺而上氣甚金光半山純以下為黛色信可以神居帝郊鎮控湘漢者也若潨洞所積溪壑所射鼓怒之所豗擊湧澓之所宕滌則上窮荻浦下至狶洲南薄燕瓜北極雷澱削長埤短可數百里中騰波觸天高浪灌日吞吐百川寫泄萬壑輕煙不流華鼎振涾弱草朱靡洪漣隴蹙散渙長驚電透箭疾穹溘崩聚坻飛嶺覆回沫冠山奔濤空谷砧石為之摧碎倚岸為之落仰視大火俯聽波聲愁魄脅息心驚慓矣至於繁化殊育詭質怪章則有江鵝海鴨魚鮫水虎之類豚首象鼻芒鬚針尾之族石蟹土蚌燕箕雀蛤之疇折甲曲牙逆鱗返舌之屬掩沙漲𬒳草渚浴雨排風吹潦弄翮夕景欲沉曉霧將合孤雛寒嘯逰鴻逺吟樵蘇一歎舟子再泣誠足悲憂不可說也風久雷飈夜戒前路下弦內外望逹所屇寒暑難適汝專自慎夙夜戒護勿我為念恐欲知之聊書所覩臨塗草蹙辭意不周鮑氏集卷第九
